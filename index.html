<!DOCTYPE html>
<!-- AMECO Spot Planner v3.9.1 — hotfix de roles y permisos -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMECO Spot Planner — Gestión de Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
  :root{
    --bg:#f2f3ef;
    --panel:#ffffff;
    --steel:#232c35;
    --steel-2:#2f3944;
    --ink:#1b1f23;
    --sub:#6b7178;
    --line:#dfe1db;
    --accent:#e2571f;
    --accent-ink:#7a2c0d;
    --amber:#e0951a;
    --good:#2f8f4e;
    --good-bg:#e6f4ea;
    --warn:#b9790f;
    --warn-bg:#fbf0dc;
    --bad:#c8342f;
    --bad-bg:#faeaea;
    --grey-bg:#eceeea;
    --radius:10px;
    --shadow:0 1px 2px rgba(20,20,15,.06), 0 6px 20px rgba(20,20,15,.05);
    --sidebar-width:220px;
    --turno-name-width:190px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3,.disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
  .disp{text-transform:uppercase;font-weight:700;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:13px;}

  #shell{display:flex;min-height:100vh;}

  #sidebar{width:220px;flex:0 0 220px;background:var(--steel);color:#e9ebe6;display:flex;flex-direction:column;padding:18px 0;}
  .brand{padding:0 20px 18px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px;}
  .brand .tag{font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.03em;color:#fff;line-height:1.05;}
  .brand .sub{font-size:11px;color:#9aa1a6;margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#c7cbc4;font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:.15s;}
  .nav-item:hover{background:rgba(255,255,255,.04);color:#fff;}
  .nav-item.active{background:rgba(226,87,31,.14);border-left-color:var(--accent);color:#fff;}
  .nav-item .ic{width:16px;text-align:center;font-size:14px;}
  .nav-count{margin-left:auto;background:rgba(255,255,255,.1);border-radius:20px;padding:1px 7px;font-size:11px;font-family:'JetBrains Mono';}
  .nav-count.alert{background:var(--accent);color:#fff;}
  .sidebar-foot{margin-top:auto;padding:14px 20px 0 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8c939a;line-height:1.5;}

  #main{flex:1;min-width:0;display:flex;flex-direction:column;}
  #topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:14px;}
  #topbar h1{font-size:22px;margin:0;font-weight:700;color:var(--steel);}
  .search-box{flex:1;max-width:340px;position:relative;}
  .search-box input{width:100%;padding:8px 12px 8px 30px;border:1px solid var(--line);border-radius:8px;background:var(--bg);}
  .search-box .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:12px;}
  .btn{border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:#c94a17;}
  .btn-ghost{background:var(--grey-bg);color:var(--ink);}
  .btn-ghost:hover{background:#e2e4de;}
  .btn-danger{background:var(--bad-bg);color:var(--bad);}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
  #content{flex:1;padding:22px 26px;overflow:auto;}
  .save-pill{font-size:11px;color:var(--sub);margin-left:auto;display:flex;align-items:center;gap:6px;}
  .dot-live{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .kpi .num{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1;color:var(--steel);}
  .kpi .lbl{font-size:12px;color:var(--sub);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .kpi.warn .num{color:var(--warn);}
  .kpi.bad .num{color:var(--bad);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;}
  .panel-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .panel-head h2{font-size:16px;margin:0;color:var(--steel);font-weight:700;}
  .panel-body{padding:6px 0;}
  .alert-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid #f0f1ec;font-size:13px;}
  .alert-row:last-child{border-bottom:none;}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .chip.good{background:var(--good-bg);color:var(--good);}
  .chip.warn{background:var(--warn-bg);color:var(--warn);}
  .chip.bad{background:var(--bad-bg);color:var(--bad);}
  .chip.grey{background:var(--grey-bg);color:var(--sub);}
  .empty{padding:30px 18px;text-align:center;color:var(--sub);font-size:13px;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.12s;}
  .wcard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .wcard-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .wcard .name{font-weight:700;font-size:15px;color:var(--steel);}
  .wcard .cargo{font-size:12px;color:var(--sub);margin-top:1px;}
  .wcard .rut{font-size:11.5px;color:var(--sub);margin-top:6px;}
  .status-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;margin-top:3px;}
  .sticker-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
  .sticker{width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.15);display:inline-block;}
  .sticker-empty{font-size:11px;color:var(--sub);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--sub);padding:9px 14px;border-bottom:1px solid var(--line);background:#fafaf8;position:sticky;top:0;}
  td{padding:9px 14px;border-bottom:1px solid #f0f1ec;font-size:13px;vertical-align:middle;}
  tr:hover td:not(.daycell){background:#fafaf8;}
  .table-wrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);}

  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  select, .filter-bar input{padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:var(--panel);}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,22,20,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--panel);border-radius:14px;width:660px;max-width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal-sm{width:400px;}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--panel);z-index:2;}
  .modal-head h2{margin:0;font-size:18px;color:var(--steel);}
  .modal-close{background:none;border:none;font-size:20px;color:var(--sub);}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--bg);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .section-title{font-size:13px;font-weight:700;color:var(--steel);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .section-title:first-child{border-top:none;padding-top:0;margin-top:0;}
  .repeat-row2{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;background:var(--bg);padding:8px;border-radius:8px;}
  .icon-btn{background:none;border:none;color:var(--bad);font-size:15px;padding:2px 6px;}
  .link-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:12.5px;padding:0;}

  .exam-card{background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:10px;}
  .exam-card-title{font-weight:700;font-size:13px;color:var(--steel);margin-bottom:8px;}
  .exam-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .exam-card-fields label{display:block;font-size:10px;color:var(--sub);text-transform:uppercase;margin-bottom:3px;}
  .exam-card-fields input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);}
  .file-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:8px;}
  .file-row input[type=file]{display:none;}
  .file-pill-label{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;}
  .file-pill-label:hover{border-color:var(--accent);}
  .file-name{font-size:12px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-chip-list{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
  .file-chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:3px 4px 3px 9px;font-size:11.5px;}
  .file-chip-name{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .cert-block{background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:10px;}
  .cert-top-row{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
  .cert-top-row select, .cert-top-row input{padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);}

  .cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .cal-toolbar .month-lbl{font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:var(--steel);min-width:180px;text-align:center;text-transform:capitalize;}
  .legend{display:flex;gap:14px;margin-left:auto;font-size:12px;color:var(--sub);align-items:center;}
  .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .grid-table{border-collapse:collapse;font-size:11.5px;user-select:none;}
  .drag-highlight{outline:2px dashed #1b1f23;outline-offset:-3px;}
  .grid-table th, .grid-table td{border:1px solid #eceeea;padding:0;text-align:center;}
  .grid-table th{background:#fafaf8;padding:6px 2px;font-weight:600;color:var(--sub);position:sticky;top:0;z-index:1;}
  .grid-table td.namecell, .grid-table th.namecell{position:sticky;left:0;background:var(--panel);z-index:2;text-align:left;padding:7px 12px;font-weight:600;min-width:170px;border-right:2px solid var(--line);}
  .grid-table th.namecell{z-index:3;background:#fafaf8;}
  .daycell{width:26px;height:32px;cursor:pointer;position:relative;}
  .daycell:hover{outline:2px solid var(--accent);outline-offset:-2px;}
  .st-trabajo{background:#2f3944;}
  .st-descanso{background:#e7e8e3;}
  .st-extra{background:var(--accent);}
  .st-permiso{background:#c8342f33;}
  .weekend-col{background-color:#f6f2ea;}

  .helptext{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.5;}
  .doc-cell-link{font-size:11px;color:var(--accent);font-weight:600;cursor:pointer;}
  .doc-cell-none{font-size:11px;color:#b7bab3;}
  .tbl-worker-link{cursor:pointer;color:var(--steel);border-bottom:1px dashed var(--accent);}
  .tbl-worker-link:hover{color:var(--accent);}

  .ring-extra{box-shadow: inset 0 0 0 2px #ffffff;}
  .ring-permiso{box-shadow: inset 0 0 0 2px var(--bad);}
  .daycell-label{font-size:8.5px;font-weight:800;color:#fff;line-height:32px;display:block;text-align:center;letter-spacing:.01em;text-shadow:0 1px 1px rgba(0,0,0,.4);pointer-events:none;}

  .size-toggle{display:flex;gap:2px;background:var(--grey-bg);border-radius:8px;padding:2px;margin-left:10px;}
  .size-toggle button{background:none;border:none;padding:6px 11px;font-size:12px;font-weight:600;border-radius:6px;color:var(--sub);}
  .size-toggle button.active-size{background:var(--panel);color:var(--steel);box-shadow:var(--shadow);}

  .grid-table.size-comfortable .daycell{width:36px;height:42px;}
  .grid-table.size-comfortable .daycell-label{font-size:10.5px;line-height:42px;}
  .grid-table.size-comfortable th{font-size:12px;padding:8px 3px;}
  .grid-table.size-comfortable .namecell{font-size:13.5px;min-width:190px;}
  .grid-table.size-large{font-size:13px;}
  .grid-table.size-large .daycell{width:48px;height:54px;}
  .grid-table.size-large .daycell-label{font-size:13px;line-height:54px;font-weight:800;}
  .grid-table.size-large th{font-size:13px;padding:10px 4px;}
  .grid-table.size-large .namecell{font-size:15px;min-width:210px;}

  .worker-link-btn{display:block;margin-top:4px;font-size:11px;}

  .month-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
  .month-cal-weekday{font-size:11px;font-weight:700;color:var(--sub);text-align:center;text-transform:uppercase;padding-bottom:2px;}
  .daycell-lg{border-radius:9px;min-height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;padding:4px;gap:2px;}
  .daycell-lg:hover{outline:2px solid var(--accent);outline-offset:-2px;}
  .daycell-lg .daynum{position:absolute;top:4px;left:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.75);}
  .daycell-lg.st-descanso .daynum{color:#9a9d94;}
  .daycell-lg .biglabel{font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.35);}
  .daycell-lg.st-descanso .biglabel{color:#464a41;text-shadow:none;}
  .daycell-lg .faename{font-size:9px;color:#fff;text-align:center;line-height:1.15;text-shadow:0 1px 1px rgba(0,0,0,.35);padding:0 3px;word-break:break-word;}
  .faena-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:var(--sub);}
  .fl-item{display:flex;align-items:center;gap:5px;}
  .fl-sw{width:12px;height:12px;border-radius:3px;display:inline-block;}
  .fl-btn{border:1px solid transparent;background:none;cursor:pointer;padding:4px 10px;border-radius:20px;font:inherit;color:var(--sub);}
  .fl-btn:hover{background:var(--grey-bg);}
  .fl-btn.fl-active{background:var(--steel);color:#fff;}
  .fl-btn.fl-active .fl-sw{box-shadow:0 0 0 2px #fff;}
  .fl-clear{border:1px solid var(--line);background:var(--panel);cursor:pointer;padding:4px 10px;border-radius:20px;font:inherit;color:var(--bad);font-weight:600;}

  .bulk-toolbar{display:flex;gap:8px;align-items:center;margin:6px 0 4px;}
  .bulk-count{font-size:12px;color:var(--sub);margin-left:auto;}
  .bulk-list-wrap{max-height:220px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:4px;background:var(--panel);}
  .bulk-worker-row{display:flex;align-items:center;gap:9px;padding:7px 12px;border-bottom:1px solid #f0f1ec;font-size:13px;cursor:pointer;}
  .bulk-worker-row:last-child{border-bottom:none;}
  .bulk-worker-row:hover{background:#fafaf8;}
  .bulk-worker-row .w-cargo{margin-left:auto;color:var(--sub);font-size:11.5px;}

  /* ============================= FIREBASE LOGIN ============================= */
  [hidden]{display:none !important;}
  .auth-gate{
    position:fixed; inset:0; z-index:1000;
    display:grid; place-items:center; padding:24px;
    background:
      radial-gradient(circle at 82% 12%, rgba(226,87,31,.22), transparent 32%),
      linear-gradient(145deg,#1d252d,#303b45);
  }
  .auth-card{
    width:min(420px,100%);
    background:var(--panel);
    border:1px solid rgba(255,255,255,.45);
    border-radius:16px;
    padding:30px;
    box-shadow:0 28px 80px rgba(0,0,0,.34);
  }
  .auth-brand{
    font-family:'Barlow Condensed',sans-serif;
    font-size:31px; font-weight:800; color:var(--steel);
  }
  .auth-sub{font-size:12px;color:var(--sub);margin:3px 0 24px;}
  .auth-form{display:grid;gap:14px;}
  .auth-form .field{margin:0;}
  .auth-form input{background:#fff;padding:11px 12px;}
  .auth-submit{width:100%;justify-content:center;margin-top:2px;}
  .auth-error{min-height:18px;font-size:12px;font-weight:600;color:var(--bad);}
  .auth-foot{
    border-top:1px solid var(--line); margin-top:19px; padding-top:15px;
    color:var(--sub); font-size:11px; text-align:center;
  }
  .session-email{
    color:var(--sub); font-size:11px; max-width:190px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cloud-pill{
    font-size:11px; color:var(--sub); display:flex; align-items:center; gap:6px;
  }


  /* ============================= ELIMINACIÓN MASIVA ============================= */
  .worker-bulk-bar{
    display:flex;
    align-items:center;
    gap:9px;
    flex-wrap:wrap;
    background:var(--panel);
    border:1px solid var(--line);
    border-left:4px solid var(--bad);
    border-radius:var(--radius);
    padding:11px 13px;
    margin-bottom:15px;
    box-shadow:var(--shadow);
  }
  .worker-bulk-count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:700;
    color:var(--bad);
    margin-right:auto;
  }
  .wcard.bulk-mode{
    position:relative;
    padding-left:45px;
    cursor:pointer;
  }
  .wcard.bulk-mode:hover{
    border-color:var(--bad);
  }
  .wcard.bulk-selected{
    border-color:var(--bad);
    box-shadow:inset 0 0 0 1px var(--bad), var(--shadow);
    background:#fffafa;
  }
  .worker-select-box{
    position:absolute;
    left:14px;
    top:15px;
    width:20px;
    height:20px;
    accent-color:var(--bad);
    pointer-events:none;
  }
  .bulk-delete-help{
    width:100%;
    color:var(--sub);
    font-size:11px;
    margin-top:1px;
  }
  .btn-danger-solid{
    background:var(--bad);
    color:#fff;
  }
  .btn-danger-solid:hover{
    background:#a92824;
  }


  /* ============================= CARGOS Y FILTRO DE TURNOS ============================= */
  .turno-filter-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }
  .turno-cargo-filter{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:230px;
  }
  .turno-cargo-filter label{
    font-size:10.5px;
    font-weight:700;
    color:var(--sub);
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .turno-cargo-filter select{
    min-height:36px;
    background:var(--panel);
  }
  .turno-filter-notice{
    color:var(--accent-ink);
    font-weight:600;
    margin-bottom:6px;
    background:#fff4ee;
    border-left:3px solid var(--accent);
    border-radius:6px;
    padding:8px 10px;
  }
  .settings-layout{
    display:grid;
    grid-template-columns:minmax(0,1fr) 310px;
    gap:18px;
    align-items:start;
  }
  .settings-head-sub{
    color:var(--sub);
    font-size:12px;

  .legend-rest{background:#e7e8e3;border:1px solid #d3d5ce;}
  .legend-extra{background:var(--accent);}
  .legend-leave{background:rgba(200,52,47,.22);border:1px solid var(--bad);}
  .legend-site{background:#2f6f9e;}
  .legend-conflict{background:var(--bad);color:#fff;border-radius:50% !important;}

  /* ============================= IMPORTACIÓN DE HOJAS Y CARGOS ============================= */
  .import-sheet-selector{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(220px,280px);
    gap:14px;
    align-items:center;
    padding:12px;
    margin-bottom:12px;
    background:#f7f8f5;
    border:1px solid var(--line);
    border-radius:9px;
  }
  .import-sheet-selector label{
    display:block;
    color:var(--steel);
    font-size:12px;
    font-weight:700;
    margin-bottom:2px;
  }
  .import-sheet-selector select{
    width:100%;
    background:var(--panel);
  }
  .import-selected-sheet{
    padding:9px 11px;
    margin-bottom:12px;
    background:#f7f8f5;
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--sub);
    font-size:11px;
  }
  .import-cargo-detection{
    padding:9px 11px;
    margin:10px 0 13px;
    background:#fff4ee;
    border-left:3px solid var(--accent);
    border-radius:7px;
    color:var(--accent-ink);
    font-size:11px;
  }
  .import-cargo-detection span{
    color:var(--sub);
  }
  .import-cell-inherited{
    margin-top:3px;
    color:#3a5c91;
    font-size:8.5px;
    font-weight:700;
    text-transform:uppercase;
  }
  .text-bad{
    color:var(--bad) !important;
    font-weight:700;
  }
  @media(max-width:700px){
    .import-sheet-selector{
      grid-template-columns:1fr;
    }
  }


  /* ============================= MÚLTIPLES ACREDITACIONES ============================= */
  .import-multiple-modal{
    width:min(1180px,96vw);
  }
  .import-multiple-acred-help{
    margin:11px 0 14px;
    padding:10px 12px;
    border-left:4px solid #2f6f9e;
    border-radius:8px;
    background:#f2f7fc;
    color:#496275;
    font-size:11px;
    line-height:1.45;
  }

  /* ============================= COLORES POR CARGO ============================= */
  .cargo-card-badge{
    display:inline-flex;
    max-width:100%;
    border-radius:999px;
    padding:3px 8px;
    font-size:10px;
    font-weight:700;
    line-height:1.2;
  }
  .cargo-color-control{
    display:inline-flex;
    align-items:center;
    gap:5px;
    color:var(--sub);
    font-size:9.5px;
    font-weight:600;
  }
  .cargo-color-control input[type="color"]{
    width:32px;
    height:28px;
    padding:2px;
    border:1px solid var(--line);
    border-radius:7px;
    background:#fff;
    cursor:pointer;
  }


  /* ============================= BARRA DE TRABAJADORES ============================= */
  #topbar{
    flex-wrap:wrap;
  }
  #topbar h1{
    flex:0 0 auto;
  }
  .worker-search-box{
    flex:1 1 300px;
    width:clamp(270px,30vw,390px);
    min-width:270px;
    max-width:390px;
  }
  .worker-search-box input{
    display:block;
    min-width:0;
    color:var(--ink);
    background:var(--panel);
    caret-color:var(--accent);
    font-size:13px;
  }
  .worker-search-box input::placeholder{
    color:#858b82;
    opacity:1;
  }
  .worker-search-box input:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(226,87,31,.12);
  }
  .worker-cargo-filter{
    flex:0 1 210px;
    width:210px;
    min-width:180px;
    max-width:210px;
  }
  @media(max-width:760px){
    .worker-search-box{
      order:20;
      flex-basis:100%;
      width:100%;
      min-width:100%;
      max-width:none;
    }
    .worker-cargo-filter{
      order:21;
      width:100%;
      max-width:none;
      flex-basis:100%;
    }
  }


  /* ============================= TURNOS EN DOS MESES ============================= */
  .turno-cal-toolbar{
    flex-wrap:wrap;
  }
  .turno-period-label{
    min-width:250px !important;
  }
  .turno-period-toggle{
    display:inline-flex;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    background:var(--panel);
  }
  .turno-period-toggle button{
    border:0;
    border-right:1px solid var(--line);
    background:transparent;
    color:var(--sub);
    padding:7px 10px;
    font-size:10.5px;
    font-weight:700;
    cursor:pointer;
  }
  .turno-period-toggle button:last-child{
    border-right:0;
  }
  .turno-period-toggle button.active-size{
    background:var(--steel);
    color:#fff;
  }
  .turno-main-legend{
    display:flex;
    gap:13px;
    flex-wrap:wrap;
    margin:0 0 10px;
  }
  .turno-two-month-wrap{
    overflow:auto;
    border:1px solid var(--line);
    border-radius:9px;
    background:var(--panel);
  }
  .turno-two-month-grid{
    width:max-content;
    min-width:100%;
  }
  .turno-two-month-grid thead tr:first-child th{
    top:0;
    height:31px;
  }
  .turno-two-month-grid thead tr:nth-child(2) th{
    top:31px;
  }
  .turno-two-month-grid .turno-worker-header{
    top:0 !important;
    z-index:6;
    vertical-align:middle;
  }
  .turno-month-group{
    position:sticky;
    top:0;
    z-index:4;
    background:var(--steel) !important;
    color:#fff !important;
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px;
    text-transform:capitalize;
    letter-spacing:.02em;
    border-bottom-color:#35424d !important;
  }
  .turno-month-separator{
    border-left:3px solid var(--accent) !important;
  }
  .turno-two-month-grid td.namecell{
    z-index:3;
  }
  .turno-two-month-grid.size-compact .daycell{
    width:27px;
    min-width:27px;
  }
  .turno-two-month-grid.size-comfortable .daycell{
    min-width:36px;
  }
  .turno-two-month-grid.size-large .daycell{
    min-width:48px;
  }
  @media(max-width:850px){
    .turno-period-label{
      order:-1;
      width:100%;
      min-width:100% !important;
      text-align:left !important;
    }
  }


  /* ============================= MENÚ LATERAL PLEGABLE ============================= */
  #sidebar{
    width:var(--sidebar-width);
    flex:0 0 var(--sidebar-width);
    position:relative;
    overflow:hidden;
    transition:width .2s ease,flex-basis .2s ease;
  }
  .brand{
    position:relative;
    min-height:59px;
    padding-right:48px;
  }
  .brand-copy{
    white-space:nowrap;
  }
  .brand-mini{
    display:none;
    color:#fff;
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px;
    font-weight:800;
    letter-spacing:.03em;
  }
  .sidebar-toggle{
    position:absolute;
    right:10px;
    top:3px;
    width:30px;
    height:30px;
    border:1px solid rgba(255,255,255,.16);
    border-radius:8px;
    background:rgba(255,255,255,.07);
    color:#fff;
    font-size:23px;
    line-height:1;
    display:grid;
    place-items:center;
    padding:0;
    z-index:5;
  }
  .sidebar-toggle:hover{
    background:rgba(255,255,255,.14);
  }
  .nav-label{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  #shell.sidebar-collapsed{
    --sidebar-width:64px;
  }
  #shell.sidebar-collapsed .brand{
    min-height:69px;
    padding:5px 8px 12px;
    text-align:center;
  }
  #shell.sidebar-collapsed .brand-copy{
    display:none;
  }
  #shell.sidebar-collapsed .brand-mini{
    display:block;
    margin-top:35px;
    font-size:15px;
  }
  #shell.sidebar-collapsed .sidebar-toggle{
    top:1px;
    right:17px;
  }
  #shell.sidebar-collapsed .nav-item{
    position:relative;
    justify-content:center;
    gap:0;
    padding:12px 0;
    border-left-width:3px;
  }
  #shell.sidebar-collapsed .nav-item .ic{
    width:auto;
    font-size:17px;
  }
  #shell.sidebar-collapsed .nav-label{
    display:none;
  }
  #shell.sidebar-collapsed .nav-count{
    position:absolute;
    top:4px;
    right:5px;
    min-width:17px;
    height:17px;
    padding:1px 4px;
    display:grid;
    place-items:center;
    font-size:8px;
  }
  #shell.sidebar-collapsed .sidebar-foot{
    display:none;
  }

  /* ============================= COLUMNA DE NOMBRES AJUSTABLE ============================= */
  .turno-two-month-grid .namecell{
    width:var(--turno-name-width) !important;
    min-width:var(--turno-name-width) !important;
    max-width:var(--turno-name-width) !important;
  }
  .turno-two-month-grid td.namecell{
    overflow:hidden;
    overflow-wrap:anywhere;
  }
  .turno-two-month-grid td.namecell > div,
  .turno-two-month-grid td.namecell .worker-link-btn{
    max-width:100%;
  }
  .turno-worker-header{
    position:sticky;
    overflow:visible !important;
  }
  .turno-worker-header-content{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    padding-right:7px;
  }
  .turno-worker-header-content small{
    color:var(--sub);
    font-family:'JetBrains Mono',monospace;
    font-size:8px;
    font-weight:500;
    white-space:nowrap;
  }
  .turno-name-resizer{
    position:absolute;
    top:0;
    right:-4px;
    bottom:0;
    width:9px;
    cursor:col-resize;
    z-index:12;
    touch-action:none;
  }
  .turno-name-resizer::after{
    content:'';
    position:absolute;
    top:0;
    bottom:0;
    left:4px;
    width:2px;
    background:transparent;
    transition:background .12s ease;
  }
  .turno-name-resizer:hover::after,
  body.resizing-turno-name .turno-name-resizer::after{
    background:var(--accent);
  }
  body.resizing-turno-name{
    cursor:col-resize !important;
    user-select:none !important;
  }
  body.resizing-turno-name *{
    cursor:col-resize !important;
  }
  .turno-name-width-control{
    display:inline-flex;
    align-items:center;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    background:var(--panel);
  }
  .turno-name-width-control > span{
    padding:0 8px;
    color:var(--sub);
    font-size:9.5px;
    font-weight:700;
    white-space:nowrap;
  }
  .turno-name-width-control button{
    border:0;
    border-left:1px solid var(--line);
    background:transparent;
    color:var(--steel);
    padding:7px 9px;
    font-size:10px;
    font-weight:700;
    cursor:pointer;
  }
  .turno-name-width-control button:hover{
    background:var(--grey-bg);
  }

  @media(max-width:760px){
    #shell.sidebar-collapsed{
      --sidebar-width:54px;
    }
    .turno-name-width-control > span{
      display:none;
    }
  }


  /* ============================= RESPALDOS E INTEGRIDAD ============================= */
  .backup-center-panel{
    overflow:hidden;
  }
  .backup-center-body{
    padding:15px;
  }
  .backup-action-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:10px;
  }
  .backup-action-card{
    min-height:118px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:5px;
    padding:13px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--panel);
    color:var(--ink);
    text-align:left;
    cursor:pointer;
    transition:border-color .15s ease,box-shadow .15s ease,transform .15s ease;
  }
  .backup-action-card:hover{
    border-color:#bec3bc;
    box-shadow:var(--shadow);
    transform:translateY(-1px);
  }
  .backup-action-card:disabled{
    opacity:.62;
    cursor:wait;
    transform:none;
  }
  .backup-action-icon{
    width:30px;
    height:30px;
    display:grid;
    place-items:center;
    border-radius:8px;
    background:#fff1e9;
    color:var(--accent);
    font-size:16px;
    font-weight:800;
  }
  .backup-action-card strong{
    color:var(--steel);
    font-size:12px;
  }
  .backup-action-card small{
    color:var(--sub);
    font-size:9.8px;
    line-height:1.35;
  }
  .backup-last-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:12px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:9px;
    background:#fafaf8;
  }
  .backup-last-meta strong{
    color:var(--steel);
    font-size:11px;
  }
  .backup-last-meta span{
    color:var(--sub);
    font-size:9.8px;
    text-align:right;
  }
  .backup-last-meta.empty-meta{
    border-style:dashed;
  }
  .integrity-summary-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:9px;
    margin-top:12px;
  }
  .integrity-summary-grid > div{
    padding:10px;
    border:1px solid var(--line);
    border-radius:9px;
    background:var(--grey-bg);
    text-align:center;
  }
  .integrity-summary-grid > div.good{
    background:var(--good-bg);
    border-color:#b9ddc3;
  }
  .integrity-summary-grid > div.warn{
    background:var(--warn-bg);
    border-color:#ead4a9;
  }
  .integrity-summary-grid > div.bad{
    background:var(--bad-bg);
    border-color:#ebc4c2;
  }
  .integrity-summary-grid strong{
    display:block;
    font-family:'Barlow Condensed',sans-serif;
    color:var(--steel);
    font-size:25px;
    line-height:1;
  }
  .integrity-summary-grid span{
    display:block;
    margin-top:4px;
    color:var(--sub);
    font-size:9px;
    font-weight:700;
    text-transform:uppercase;
  }
  .integrity-report-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
    margin-top:15px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .integrity-report-head strong{
    display:block;
    color:var(--steel);
    font-size:12px;
  }
  .integrity-report-head span{
    color:var(--sub);
    font-size:9.5px;
  }
  .integrity-issues{
    margin-top:6px;
  }
  .integrity-issue{
    display:grid;
    grid-template-columns:85px minmax(0,1fr);
    gap:9px;
    align-items:start;
    padding:9px 0;
    border-bottom:1px solid #eff0eb;
  }
  .integrity-issue:last-child{
    border-bottom:0;
  }
  .integrity-issue-badge{
    display:inline-flex;
    justify-content:center;
    border-radius:999px;
    padding:3px 7px;
    background:var(--grey-bg);
    color:var(--sub);
    font-size:8.5px;
    font-weight:800;
  }
  .integrity-issue.error .integrity-issue-badge{
    background:var(--bad-bg);
    color:var(--bad);
  }
  .integrity-issue.warning .integrity-issue-badge{
    background:var(--warn-bg);
    color:var(--warn);
  }
  .integrity-issue strong{
    display:block;
    color:var(--steel);
    font-size:10px;
  }
  .integrity-issue p{
    margin:2px 0 0;
    color:var(--sub);
    font-size:9.8px;
    line-height:1.35;
  }
  .integrity-ok{
    padding:18px;
    border-radius:9px;
    background:var(--good-bg);
    color:var(--good);
    text-align:center;
    font-size:11px;
    font-weight:700;
  }
  .backup-security-warning{
    margin-top:12px;
    padding:10px 12px;
    border-left:4px solid var(--bad);
    border-radius:7px;
    background:var(--bad-bg);
    color:#7a2825;
    font-size:10px;
    line-height:1.4;
  }
  @media(max-width:1050px){
    .backup-action-grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }
  }
  @media(max-width:650px){
    .backup-action-grid,
    .integrity-summary-grid{
      grid-template-columns:1fr;
    }
    .backup-last-meta,
    .integrity-report-head{
      align-items:flex-start;
      flex-direction:column;
    }
    .backup-last-meta span{
      text-align:left;
    }
    .integrity-issue{
      grid-template-columns:1fr;
    }
  }


  /* ============================= ROLES, PERMISOS Y AUDITORÍA ============================= */
  .role-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    padding:4px 8px;
    font-size:9px;
    font-weight:800;
    text-transform:uppercase;
    white-space:nowrap;
  }

  }
  .role-badge.role-planner{
    background:#e8f1fb;

  }
  .role-badge.role-viewer{
    background:var(--grey-bg);

  .role-badge.role-none{

  }
  .access-management-panel{

  }
  .access-management-body{
    padding:15px;
  }
  .access-limit-note{

  .access-audit-row{

    border-bottom:1px solid #eff0eb;
  }
  .access-audit-row:last-child{
    border-bottom:0;
  }
  .access-audit-row strong{
    display:block;
    color:var(--steel);
    font-size:10px;
  }
  .access-audit-row span{
    color:var(--sub);
    font-size:9px;
  }
  .access-audit-meta{
    color:var(--sub);
    font-size:9px;
    text-align:right;
  }
  .access-audit-list{
    max-height:220px;
    overflow-y:auto;
  }
  .access-audit-list.expanded{

  .access-audit-details{
    margin-top:4px;
    color:var(--sub);
    font-size:8.5px;
    overflow-wrap:anywhere;
  }
  .access-user-modal{
    width:min(620px,94vw);
  }
  .access-setup-guide{
    padding:9px 11px;
    margin-bottom:12px;
    border-left:4px solid #2f6f9e;
    border-radius:7px;
    background:#f2f7fc;
    color:#496275;
    font-size:10px;
  }
  .access-role-explanation{
    padding:10px 11px;
    border-radius:8px;
    background:#fafaf8;
    color:var(--sub);

  body.role-readonly .daycell{

  body.role-readonly .daycell:hover{

  @media(max-width:760px){

      grid-template-columns:1fr 1fr;

    .access-audit-row{
      grid-template-columns:1fr;
    }
    .access-audit-meta{
      text-align:left;
    }

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAXGIXn5dpaoPfezHGnLR7fI_DQdcMjG6U",
    authDomain: "ameco-spot-planificacion.firebaseapp.com",
    databaseURL: "https://ameco-spot-planificacion-default-rtdb.firebaseio.com",
    projectId: "ameco-spot-planificacion",
    storageBucket: "ameco-spot-planificacion.firebasestorage.app",
    messagingSenderId: "409635036525",
    appId: "1:409635036525:web:0ede33638be61942940e64"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database();
  const storage = firebase.storage();
  const workerDocumentsRoot = "workerDocuments";

  const appRoot = "amecoSpotPlanner";
  const storageRoot = appRoot + "/legacyStorage";
  const usersRoot = appRoot + "/users";
  const auditRoot = appRoot + "/auditLogs";
  const accessMetaRoot = appRoot + "/accessMeta";

  const VALID_ROLES = ["admin","planner","viewer"];

  let resolveAuth;
  const authReady = new Promise(resolve => { resolveAuth = resolve; });
  let authResolved = false;
  let currentAccessProfile = null;

  function nowIso(){
    return new Date().toISOString();
  }

  function normalizeRole(role){
    return VALID_ROLES.includes(role) ? role : "viewer";
  }

  function isActiveRole(profile){
    return !!(
      profile &&
      profile.active === true &&
      VALID_ROLES.includes(profile.role)
    );
  }

  function roleCanWrite(profile){
    return isActiveRole(profile) &&
      ["admin","planner"].includes(profile.role);
  }

  function roleIsAdmin(profile){
    return isActiveRole(profile) && profile.role === "admin";
  }

  function encodeKey(key){
    return btoa(unescape(encodeURIComponent(String(key))))
      .replaceAll("/", "_")
      .replaceAll("+", "-")
      .replaceAll("=", "");
  }

  function decodeKey(value){
    let encoded = value.replaceAll("_", "/").replaceAll("-", "+");
    while(encoded.length % 4) encoded += "=";
    return decodeURIComponent(escape(atob(encoded)));
  }

  function keyRef(key){
    return db.ref(storageRoot + "/" + encodeKey(key));
  }

  function regimenToCycle(regimen){
    if(regimen === "7x7") return {diasTrabajo:7,diasDescanso:7};
    if(regimen === "5x2") return {diasTrabajo:5,diasDescanso:2};
    return {diasTrabajo:14,diasDescanso:14};
  }

  async function migrateExistingCloudData(){
    const [workersSnap, sitesSnap, accSnap, callsSnap, ticketsSnap] = await Promise.all([
      db.ref("amecoSpotPlanner/workers").once("value"),
      db.ref("amecoSpotPlanner/sites").once("value"),
      db.ref("amecoSpotPlanner/accreditations").once("value"),
      db.ref("amecoSpotPlanner/contacts").once("value"),
      db.ref("amecoSpotPlanner/tickets").once("value")
    ]);

    const rawWorkers = Object.values(workersSnap.val() || {});
    const rawSites = Object.values(sitesSnap.val() || {});
    const rawAccreditations = Object.values(accSnap.val() || {});
    const rawCalls = Object.values(callsSnap.val() || {});
    const rawTickets = Object.values(ticketsSnap.val() || {});

    if(!rawWorkers.length && !rawSites.length && !rawAccreditations.length &&
       !rawCalls.length && !rawTickets.length){
      return null;
    }

    const workers = rawWorkers.map(worker => {
      const cycle = regimenToCycle(worker.turno && worker.turno.regimen);
      const embeddedAccreditations = rawAccreditations
        .filter(item => item.trabajadorId === worker.id)
        .map(item => {
          const site = rawSites.find(s => s.id === item.faenaId);
          return {
            faena: site ? site.nombre : (item.faena || ""),
            estado: item.estado === "aprobada" ? "Acreditado" :
                    ["en_revision","en_carga","recopilando_documentos"].includes(item.estado) ? "En trámite" :
                    "No acreditado",
            vencimiento: item.vencimiento || ""
          };
        });

      return {
        id: worker.id,
        nombre: worker.nombre || "",
        rut: worker.rut || "",
        telefono: worker.telefono || "",
        correo: worker.correo || "",
        ciudad: worker.ciudad || "",
        cargo: worker.cargo || "",
        empresa: worker.empresa || "",
        turno: {
          fechaInicioCiclo: (worker.turno && worker.turno.fechaInicioCiclo) || new Date().toISOString().slice(0,10),
          diasTrabajo: (worker.turno && worker.turno.diasTrabajo) || cycle.diasTrabajo,
          diasDescanso: (worker.turno && worker.turno.diasDescanso) || cycle.diasDescanso
        },
        overrides: worker.overrides || {},
        examenes: worker.examenes || [
          {tipo:"Preocupacional",fecha:"",vencimiento:""},
          {tipo:"Alcohol y Drogas",fecha:"",vencimiento:""},
          {tipo:"Psicosensotécnico",fecha:"",vencimiento:""}
        ],
        examenesExtra: worker.examenesExtra || [],
        acreditaciones: worker.acreditaciones || embeddedAccreditations,
        certificaciones: worker.certificaciones || []
      };
    });

    const faenas = rawSites.map(site => site.nombre).filter(Boolean);
    const llamados = rawCalls.map(item => ({
      id: item.id || ("l_" + Date.now()),
      workerId: item.trabajadorId || item.workerId || "",
      fecha: (item.fecha || "").slice(0,10),
      hora: item.hora || "",
      resultado: item.resultado || "pendiente",
      nota: item.observaciones || item.nota || ""
    }));
    const pasajes = rawTickets.map(item => ({
      id: item.id || ("p_" + Date.now()),
      workerId: item.trabajadorId || item.workerId || "",
      faena: item.faena || "",
      fechaViaje: item.fechaViaje || "",
      origen: item.origen || "",
      destino: item.destino || "",
      estado: item.estado || "pendiente",
      nota: item.observaciones || item.nota || ""
    }));

    return {
      workers,
      faenas: faenas.length ? faenas : ["Spence","Centinela","Sierra Gorda","Gabriela Mistral","Antucoya"],
      cargos: ["Supervisor","Operador AT","Operador AC","Rigger","Alzahombre","Operador Grúa Horquilla","Otro"],
      equipos: ["Grúa Horquilla","Grúa Pluma","Camión Pluma","Manlift / Alzahombre","Minicargador","Grúa Telescópica","Camión Grúa","Otro"],
      llamados,
      pasajes
    };
  }

  function buildAccessProfile(user, role="viewer", active=true, displayName=""){
    return {
      uid:user.uid,
      email:String(user.email||"").trim().toLowerCase(),
      displayName:String(displayName||user.displayName||"").trim(),
      role:normalizeRole(role),
      active:active === true,
      createdAt:nowIso(),
      updatedAt:nowIso(),
      createdBy:user.uid
    };
  }

  async function appendAuditDirect(event){
    const user = auth.currentUser;
    const profile = currentAccessProfile || window.amecoAccessProfile;

    if(!user || !roleCanWrite(profile)) return null;

    const ref = db.ref(auditRoot).push();
    const payload = {
      id:ref.key,
      uid:user.uid,
      email:user.email||"",
      role:profile.role,
      action:String(event.action||"UNKNOWN"),
      entity:String(event.entity||"system"),
      entityId:String(event.entityId||""),
      summary:String(event.summary||""),
      details:event.details && typeof event.details==="object"
        ? event.details
        : {},
      createdAt:nowIso()
    };

    await ref.set(payload);
    return payload;
  }

  async function initializeAccessProfile(user){
    const initializedSnapshot = await db
      .ref(accessMetaRoot + "/initialized")
      .once("value");

    if(!initializedSnapshot.exists()){
      const profile = buildAccessProfile(
        user,
        "admin",
        true,
        user.displayName||"Administrador inicial"
      );

      const updates = {};
      updates["accessMeta/initialized"] = true;
      updates["accessMeta/initializedAt"] = nowIso();
      updates["accessMeta/initializedBy"] = user.uid;
      updates["users/" + user.uid] = profile;

      try{
        await db.ref(appRoot).update(updates);
        currentAccessProfile = profile;
        window.amecoAccessProfile = profile;

        try{
          await appendAuditDirect({
            action:"ACCESS_BOOTSTRAP",
            entity:"access",
            entityId:user.uid,
            summary:"Se creó el primer Administrador de la plataforma."
          });
        }catch(auditError){
          console.warn("No se pudo registrar el bootstrap.",auditError);
        }

        return profile;
      }catch(error){
        console.warn("El acceso ya pudo haber sido inicializado por otro usuario.",error);
      }
    }

    const snapshot = await db.ref(usersRoot + "/" + user.uid).once("value");

    if(!snapshot.exists()){
      return {
        uid:user.uid,
        email:user.email||"",
        displayName:"",
        role:"none",
        active:false,
        accessError:
          "Tu cuenta existe en Firebase Authentication, pero todavía no tiene un perfil de acceso en AMECO Spot Planner. Solicita al Administrador que registre tu UID."
      };
    }

    const stored = snapshot.val() || {};
    const profile = {
      uid:user.uid,
      email:String(stored.email||user.email||"").trim().toLowerCase(),
      displayName:String(stored.displayName||"").trim(),
      role:normalizeRole(stored.role),
      active:stored.active === true,
      createdAt:stored.createdAt||"",
      updatedAt:stored.updatedAt||""
    };

    if(
      stored.email &&
      user.email &&
      String(stored.email).trim().toLowerCase() !==
        String(user.email).trim().toLowerCase()
    ){
      return {
        ...profile,
        active:false,
        accessError:
          "El correo del perfil de acceso no coincide con la cuenta autenticada. Solicita una corrección al Administrador."
      };
    }

    if(!profile.active){
      return {
        ...profile,
        accessError:"Tu acceso a AMECO Spot Planner está desactivado."
      };
    }

    return profile;
  }

  function requireActiveAccess(){
    const profile = currentAccessProfile || window.amecoAccessProfile;

    if(!isActiveRole(profile)){
      throw new Error("La cuenta no tiene acceso activo.");
    }

    return profile;
  }

  function requireWriterAccess(){
    const profile = requireActiveAccess();

    if(!roleCanWrite(profile)){
      throw new Error("Tu rol es de solo lectura.");
    }

    return profile;
  }

  function requireAdminAccess(){
    const profile = requireActiveAccess();

    if(!roleIsAdmin(profile)){
      throw new Error("Esta acción requiere el rol Administrador.");
    }

    return profile;
  }

  window.storage = {
    async get(key, shared){
      await authReady;
      requireActiveAccess();

      const snapshot = await keyRef(key).once("value");
      if(snapshot.exists()){
        return {key,value:snapshot.val(),shared:true};
      }

      if(key === "faena_personal_db_v1"){
        const migrated = await migrateExistingCloudData();

        if(migrated){
          requireWriterAccess();
          const value = JSON.stringify(migrated);
          await keyRef(key).set(value);
          return {key,value,shared:true};
        }
      }

      throw new Error("not found");
    },

    async set(key, value, shared){
      await authReady;
      requireWriterAccess();
      await keyRef(key).set(value);
      return {key,value,shared:true};
    },

    async delete(key, shared){
      await authReady;
      requireWriterAccess();
      await keyRef(key).remove();
      return {key,deleted:true,shared:true};
    },

    async list(prefix, shared){
      await authReady;
      requireActiveAccess();

      const snapshot = await db.ref(storageRoot).once("value");
      const values = snapshot.val() || {};
      const keys = Object.keys(values)
        .map(decodeKey)
        .filter(key => !prefix || key.startsWith(prefix));

      return {keys,prefix,shared:true};
    }
  };

  window.amecoAccessApi = {
    getProfile(){
      return currentAccessProfile || null;
    },

    async listUsers(){
      await authReady;
      requireAdminAccess();

      const snapshot = await db.ref(usersRoot).once("value");
      return Object.values(snapshot.val()||{});
    },

    async listAuditLogs(limit=40){
      await authReady;
      requireAdminAccess();

      const snapshot = await db
        .ref(auditRoot)
        .limitToLast(Math.max(1,Math.min(Number(limit)||40,100)))
        .once("value");

      return Object.values(snapshot.val()||{})
        .sort((a,b)=>String(b.createdAt||"").localeCompare(String(a.createdAt||"")));
    },

    async saveUserProfile(input){
      await authReady;
      const admin = requireAdminAccess();

      const uid = String(input.uid||"").trim();
      const email = String(input.email||"").trim().toLowerCase();
      const displayName = String(input.displayName||"").trim();
      const role = normalizeRole(input.role);
      const active = input.active === true;

      if(!uid){
        throw new Error("El UID es obligatorio.");
      }
      if(!email || !email.includes("@")){
        throw new Error("Ingresa un correo válido.");
      }

      const ref = db.ref(usersRoot + "/" + uid);
      const previousSnapshot = await ref.once("value");
      const previous = previousSnapshot.val() || null;

      const profile = {
        uid,
        email,
        displayName,
        role,
        active,
        createdAt:previous?.createdAt || nowIso(),
        updatedAt:nowIso(),
        createdBy:previous?.createdBy || admin.uid
      };

      await ref.set(profile);

      await appendAuditDirect({
        action:previous ? "ACCESS_PROFILE_UPDATED" : "ACCESS_PROFILE_CREATED",
        entity:"userAccess",
        entityId:uid,
        summary:
          (previous ? "Se actualizó" : "Se creó")+
          " el perfil de acceso de "+email+".",
        details:{
          previousRole:previous?.role||"",
          newRole:role,
          previousActive:previous?.active,
          newActive:active
        }
      });

      return profile;
    },

    async writeAudit(event){
      await authReady;
      return appendAuditDirect(event);
    },

    // Fase 1 de CHK-01: a diferencia de legacyStorage (un blob JSON opaco
    // donde las reglas no pueden distinguir un borrado de una edición),
    // amecoSpotPlanner/workers/{id} es un nodo real con su propia regla de
    // escritura. Un Planificador puede llamar esto, pero Firebase rechaza
    // el remove() a nivel de servidor (solo Admin puede borrar ahí) — por
    // eso este método no hace ninguna verificación de rol en el cliente:
    // el enforcement real es la regla, esto solo la ejercita.
    async deleteWorkerNode(workerId){
      await authReady;
      requireWriterAccess();

      const id = String(workerId||"").trim();
      if(!id){
        throw new Error("Falta el identificador del trabajador.");
      }

      await db.ref(appRoot + "/workers/" + id).remove();
      return {id, deleted:true};
    },

    // CHK-02: los bytes del archivo van a Storage, no a RTDB. storage.rules
    // solo exige "auth != null" bajo workerDocuments/ (las reglas de
    // Storage no pueden consultar el rol en RTDB como sí hace database.rules.json),
    // así que el gate real de quién puede subir sigue siendo el cliente
    // (guardAction) hasta que exista un mecanismo de custom claims.
    async uploadWorkerDocument(storagePath, base64Data, mime){
      await authReady;
      requireWriterAccess();

      const path = String(storagePath||"").trim();
      if(!path.startsWith(workerDocumentsRoot + "/")){
        throw new Error("Ruta de documento inválida.");
      }

      const snapshot = await storage.ref(path).putString(
        base64Data,
        "base64",
        {contentType: mime || "application/octet-stream"}
      );

      return {
        storagePath: path,
        sizeBytes: snapshot.totalBytes
      };
    },

    async getWorkerDocumentUrl(storagePath){
      await authReady;
      requireActiveAccess();

      return await storage.ref(String(storagePath||"")).getDownloadURL();
    },

    async deleteWorkerDocument(storagePath){
      await authReady;
      requireWriterAccess();

      try{
        await storage.ref(String(storagePath||"")).delete();
      }catch(error){
        if(error && error.code === "storage/object-not-found") return {deleted:false};
        throw error;
      }

      return {deleted:true};
    },

    // Extiende el patrón de deleteWorkerNode (CHK-01) a cargos y faenas:
    // cargosCatalog/faenasCatalog son nodos reales (no el blob legacyStorage),
    // así que la regla de RTDB puede exigir Administrador para cualquier
    // escritura. A diferencia de workers, "Configurar cargos/faenas" es
    // exclusivo de Admin en la matriz de permisos (ni crear ni editar quedan
    // abiertos a Planificador) — el cliente ya ocultaba estas acciones para
    // Planificador antes de este cambio; esto agrega el mismo límite en el
    // servidor.
    async writeCatalogEntry(catalog, key, nombre){
      await authReady;
      requireWriterAccess();

      if(catalog !== "cargosCatalog" && catalog !== "faenasCatalog"){
        throw new Error("Catálogo inválido.");
      }
      const safeKey = String(key||"").trim();
      if(!safeKey) throw new Error("Falta la clave del catálogo.");

      await db.ref(appRoot + "/" + catalog + "/" + safeKey).set({nombre: String(nombre||"")});
      return {key: safeKey};
    },

    async deleteCatalogEntry(catalog, key){
      await authReady;
      requireWriterAccess();

      if(catalog !== "cargosCatalog" && catalog !== "faenasCatalog"){
        throw new Error("Catálogo inválido.");
      }
      const safeKey = String(key||"").trim();
      if(!safeKey) throw new Error("Falta la clave del catálogo.");

      await db.ref(appRoot + "/" + catalog + "/" + safeKey).remove();
      return {key: safeKey, deleted:true};
    }
  };

  function resetLoginButton(){
    const button = document.getElementById("authSubmit");
    if(button){
      button.disabled = false;
      button.textContent = "Iniciar sesión";
    }
  }

  function setAuthScreen(user, profile){
    const gate = document.getElementById("authGate");
    const shell = document.getElementById("shell");
    const email = document.getElementById("sessionEmail");
    const error = document.getElementById("authError");

    if(!gate || !shell) return;

    if(user && isActiveRole(profile)){
      gate.hidden = true;
      shell.style.display = "flex";
      if(email) email.textContent = user.email || "Usuario";
      if(error) error.textContent = "";
    }else{
      gate.hidden = false;
      shell.style.display = "none";
      resetLoginButton();

      if(error && window.amecoAccessError){
        error.textContent = window.amecoAccessError;
      }
    }
  }

  auth.onAuthStateChanged(async user => {
    window.amecoCurrentUser = user || null;

    if(!user){
      currentAccessProfile = null;
      window.amecoAccessProfile = null;

      if(document.readyState === "loading"){
        document.addEventListener(
          "DOMContentLoaded",
          () => setAuthScreen(null,null),
          {once:true}
        );
      }else{
        setAuthScreen(null,null);
      }

      return;
    }

    try{
      const profile = await initializeAccessProfile(user);

      if(!isActiveRole(profile)){
        window.amecoAccessError =
          profile.accessError ||
          "Tu cuenta no tiene acceso activo a la plataforma.";

        await auth.signOut();
        return;
      }

      currentAccessProfile = profile;
      window.amecoAccessProfile = profile;
      window.amecoAccessError = "";

      if(!authResolved){
        authResolved = true;
        resolveAuth(user);
      }

      if(document.readyState === "loading"){
        document.addEventListener(
          "DOMContentLoaded",
          () => setAuthScreen(user,profile),
          {once:true}
        );
      }else{
        setAuthScreen(user,profile);
      }
    }catch(error){
      console.error("No fue posible cargar el perfil de acceso.",error);
      window.amecoAccessError =
        "No fue posible validar tu acceso. Verifica las reglas de Firebase o contacta al Administrador.";

      await auth.signOut();
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("authForm");
    if(!form) return;

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const error = document.getElementById("authError");
      const button = document.getElementById("authSubmit");

      window.amecoAccessError = "";
      error.textContent = "";
      button.disabled = true;
      button.textContent = "Ingresando...";

      try{
        await auth.signInWithEmailAndPassword(
          document.getElementById("authEmail").value.trim(),
          document.getElementById("authPassword").value
        );
      }catch(err){
        error.textContent =
          err.code === "auth/invalid-credential"
            ? "Correo o contraseña incorrectos."
            : "No fue posible iniciar sesión.";

        resetLoginButton();
      }
    });
  });

  window.amecoLogout = () =>
    auth.signOut().then(() => location.reload());
})();
</script>

<body>

<div id="authGate" class="auth-gate">
  <section class="auth-card">

</div>

</div>

<script>
/* ============================= DATA LAYER ============================= */
const STORAGE_KEY = 'faena_personal_db_v1';
const APP_VERSION = 'v3.9.1';
const BACKUP_FORMAT = 'AMECO_SPOT_PLANNER_BACKUP';
const BACKUP_SCHEMA_VERSION = 1;
const LAST_BACKUP_META_KEY = 'ameco_spot_last_backup_meta_v1';
const UI_PREFS_KEY = 'ameco_spot_ui_preferences_v1';

/* Persistencia cloud: Firebase Realtime Database mediante window.storage. */
let STORAGE_MODE = 'firebase';
const EXAM_TYPES = ['Preocupacional','Alcohol y Drogas','Psicosensotécnico'];
const DEFAULT_FAENAS = ['Spence','Centinela','Sierra Gorda','Gabriela Mistral','Antucoya'];

function currentAccessProfile(){
  return window.amecoAccessProfile || {
    uid:'',
    email:'',
    displayName:'',
    role:'none',
    active:false
  };
}

function currentRole(){
  return currentAccessProfile().role || 'none';
}

function roleLabel(role=currentRole()){
  return ROLE_LABELS[role] || ROLE_LABELS.none;
}

function hasPermission(permission){
  const profile = currentAccessProfile();
  if(profile.active !== true) return false;

  const permissions = ROLE_PERMISSIONS[profile.role];
  return !!permissions && permissions.has(permission);
}

function requiredPermissionForAction(action){
  if(ADMIN_ONLY_ACTIONS.has(action)) return 'settings';
  if(action==='trigger-restore-backup') return 'restore';
  if(BACKUP_ACTIONS.has(action)) return 'backup';
  if(INTEGRITY_ACTIONS.has(action)) return 'integrity';
  if(EXPORT_ACTIONS.has(action)) return 'export';
  if(WRITE_ACTIONS.has(action)) return 'write';
  return null;
}

function guardPermission(permission,message){
  if(!permission || hasPermission(permission)) return true;

  alert(
    message ||
    'Tu rol '+roleLabel()+' no tiene permiso para realizar esta acción.'
  );
  return false;
}

function guardAction(action){
  return guardPermission(requiredPermissionForAction(action));
}

function roleBadgeHtml(){
  const profile = currentAccessProfile();
  const role = profile.role || 'none';

  return '<span class="role-badge role-'+escAttr(role)+'" title="'+

  '">'+escHtml(roleLabel(role))+'</span>';
}

function applyRoleUi(){
  const role = currentRole();
  document.body.dataset.accessRole = role;

  document.querySelectorAll('[data-action]').forEach(element=>{
    const permission = requiredPermissionForAction(element.dataset.action);

    if(permission && !hasPermission(permission)){
      element.hidden = true;
      element.setAttribute('aria-hidden','true');
    }
  });

  document.querySelectorAll('[data-admin-only]').forEach(element=>{
    element.hidden = !hasPermission('manageUsers');
  });

  const readonly = !hasPermission('write');
  document.body.classList.toggle('role-readonly',readonly);

  if(readonly){
    document.querySelectorAll(
      '#modalRoot input[type="file"], #modalRoot input[type="date"], '+
      '#modalRoot input[type="number"], #modalRoot textarea'
    ).forEach(input=>{
      input.disabled = true;
    });
  }
}

async function recordAudit(action,entity,entityId,summary,details={}){
  try{
    if(!window.amecoAccessApi || !hasPermission('write')) return null;

    return await window.amecoAccessApi.writeAudit({
      action,
      entity,
      entityId,
      summary,
      details
    });
  }catch(error){
    console.warn('No fue posible registrar la auditoría.',error);
    return null;
  }
}

async function refreshAccessDirectory(){
  state.ui.accessDirectoryLoaded = true;

  if(!hasPermission('manageUsers')){
    state.ui.accessUsers = [];
    state.ui.accessAuditLogs = [];
    return;
  }

  try{
    const [users,logs] = await Promise.all([
      window.amecoAccessApi.listUsers(),
      window.amecoAccessApi.listAuditLogs(40)
    ]);

    state.ui.accessUsers = users.sort((a,b)=>
      String(a.email||'').localeCompare(String(b.email||''),'es')
    );
    state.ui.accessAuditLogs = logs;
  }catch(error){
    console.error('No se pudo cargar la administración de accesos.',error);
    state.ui.accessUsers = [];
    state.ui.accessAuditLogs = [];
  }
}

function normalizeRut(rut){
  return (rut||'').toString().replace(/\./g,'').replace(/\s/g,'').toUpperCase();
}

function composeWorkerName(nombre, apellido){
  return [String(nombre||'').trim(), String(apellido||'').trim()]
    .filter(Boolean)
    .join(' ')
    .replace(/\s+/g,' ')
    .trim();
}

function getWorkerFirstName(worker){
  if(worker.nombres) return worker.nombres;
  const parts = String(worker.nombre||'').trim().split(/\s+/);
  return parts[0] || '';
}

function getWorkerLastName(worker){
  if(worker.apellidos) return worker.apellidos;
  const parts = String(worker.nombre||'').trim().split(/\s+/);
  return parts.slice(1).join(' ');
}

function normalizeImportText(value){
  return String(value||'')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}

function importHeaderScore(header,key){
  const normalized = normalizeImportText(header);
  if(!normalized) return -1;

  // Evita que "NOMBRE CARGO" sea confundido con la columna Nombre.
  if(key==='nombre' && /\b(cargo|puesto|funcion|rol)\b/.test(normalized)){
    return -1;
  }

  const aliases = IMPORT_HEADER_ALIASES[key] || [];
  let best = -1;

  aliases.forEach((alias,index)=>{
    const normalizedAlias = normalizeImportText(alias);

    if(normalized===normalizedAlias){
      best = Math.max(best,1000-index);
      return;
    }

    const headerWords = normalized.split(' ');
    const aliasWords = normalizedAlias.split(' ');
    const containsAllWords = aliasWords.every(word=>headerWords.includes(word));

    if(containsAllWords){
      best = Math.max(best,700-index);
    }else if(normalized.includes(normalizedAlias)){
      best = Math.max(best,500-index);
    }
  });

  return best;
}

function findImportColumn(headers,key){
  let bestIndex = -1;
  let bestScore = -1;

  headers.forEach((header,index)=>{
    const score = importHeaderScore(header,key);
    if(score>bestScore){
      bestScore = score;
      bestIndex = index;
    }
  });

  return bestScore>=0 ? bestIndex : -1;
}

function guessImportMapping(headers){
  const mapping = {
    nombre: findImportColumn(headers,'nombre'),
    apellido: findImportColumn(headers,'apellido'),
    rut: findImportColumn(headers,'rut'),
    telefono: findImportColumn(headers,'telefono'),
    correo: findImportColumn(headers,'correo'),
    ciudad: findImportColumn(headers,'ciudad'),
    cargo: findImportColumn(headers,'cargo'),
    empresa: findImportColumn(headers,'empresa')
  };

  for(let slot=1; slot<=IMPORT_ACCREDITATION_SLOTS; slot++){
    mapping['faena'+slot] = findImportColumn(headers,'faena'+slot);
    mapping['estadoAcreditacion'+slot] = findImportColumn(headers,'estadoAcreditacion'+slot);
    mapping['vencimientoAcreditacion'+slot] = findImportColumn(headers,'vencimientoAcreditacion'+slot);
  }

  return mapping;
}

function importHeaderRowScore(row){
  const headers = (row||[]).map(value=>String(value||'').trim());
  const mapping = guessImportMapping(headers);

  let score = 0;
  if(mapping.nombre>=0) score += 40;
  if(mapping.apellido>=0) score += 40;
  if(mapping.rut>=0) score += 60;
  if(mapping.cargo>=0) score += 35;
  if(mapping.telefono>=0) score += 12;
  if(mapping.correo>=0) score += 12;
  if(mapping.ciudad>=0) score += 12;
  if(mapping.empresa>=0) score += 8;

  for(let slot=1; slot<=IMPORT_ACCREDITATION_SLOTS; slot++){
    if(mapping['faena'+slot]>=0) score += 20;
    if(mapping['estadoAcreditacion'+slot]>=0) score += 5;
    if(mapping['vencimientoAcreditacion'+slot]>=0) score += 5;
  }

  return score;
}

function detectImportHeaderRow(raw){
  let bestIndex = 0;
  let bestScore = -1;
  const maxRows = Math.min(raw.length,15);

  for(let index=0; index<maxRows; index++){
    const score = importHeaderRowScore(raw[index]);
    if(score>bestScore){
      bestScore = score;
      bestIndex = index;
    }
  }

  return bestIndex;
}

function getImportRawValue(row,key,mapping){
  const column = mapping?.[key];
  return (column!=null && column>=0)
    ? String(row?.[column]??'').trim()
    : '';
}

function isImportSubtotalValue(value){
  return /^total(?:\s|$)/i.test(String(value||'').trim());
}

function getImportValue(row,key,rowIndex){
  if(!importState) return '';

  const mapping = importState.mapping || {};
  const directValue = getImportRawValue(row,key,mapping);

  if(key!=='cargo' || directValue){
    return directValue;
  }

  // En reportes agrupados, Excel deja el cargo solo en la primera fila.
  // Se busca hacia arriba hasta encontrar el último cargo válido.
  for(let index=rowIndex-1; index>=0; index--){
    const previousValue = getImportRawValue(
      importState.rows[index],
      'cargo',
      mapping
    );

    if(previousValue && !isImportSubtotalValue(previousValue)){
      return previousValue;
    }
  }

  return '';
}

function canonicalCargoName(rawCargo){
  const cleaned = String(rawCargo||'')
    .replace(/\s+/g,' ')
    .trim();

  if(!cleaned || isImportSubtotalValue(cleaned)) return '';

  const normalized = normalizeImportText(cleaned);
  const existing = state.cargos.find(cargo=>
    normalizeImportText(cargo)===normalized
  );

  if(existing) return existing;

  state.cargos.push(cleaned);
  ensureCargoColor(cleaned);
  return cleaned;
}


function canonicalFaenaName(rawFaena){
  const cleaned = String(rawFaena||'')
    .replace(/\s+/g,' ')
    .trim();

  if(!cleaned || isImportSubtotalValue(cleaned)) return '';

  const normalized = normalizeImportText(cleaned);
  const existing = state.faenas.find(faena=>
    normalizeImportText(faena)===normalized
  );

  if(existing) return existing;

  state.faenas.push(cleaned);
  state.faenas.sort((a,b)=>a.localeCompare(b,'es'));
  return cleaned;
}

function canonicalAccreditationStatus(rawStatus){
  const normalized = normalizeImportText(rawStatus);

  if(!normalized) return 'Acreditado';
  if(normalized.includes('tramite') || normalized.includes('proceso')){
    return 'En trámite';
  }
  if(
    normalized.includes('no acreditado') ||
    normalized.includes('rechazado') ||
    normalized.includes('sin acreditar')
  ){
    return 'No acreditado';
  }
  return 'Acreditado';
}

function normalizeImportDate(value){
  const text = String(value||'').trim();
  if(!text) return '';

  if(/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;

  const match = text.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})$/);
  if(match){
    let year = Number(match[3]);
    if(year<100) year += year>=70 ? 1900 : 2000;

    const month = Number(match[2]);
    const day = Number(match[1]);

    if(month>=1 && month<=12 && day>=1 && day<=31){
      return [
        year,
        String(month).padStart(2,'0'),
        String(day).padStart(2,'0')
      ].join('-');
    }
  }

  return '';
}

function collectImportedAccreditations(row,rowIndex){
  const accreditations = [];
  const seen = new Set();

  for(let slot=1; slot<=IMPORT_ACCREDITATION_SLOTS; slot++){
    const faena = canonicalFaenaName(
      getImportValue(row,'faena'+slot,rowIndex)
    );

    if(!faena) continue;

    const normalizedFaena = normalizeImportText(faena);
    if(seen.has(normalizedFaena)) continue;
    seen.add(normalizedFaena);

    accreditations.push({
      faena,
      estado:canonicalAccreditationStatus(
        getImportValue(row,'estadoAcreditacion'+slot,rowIndex)
      ),
      vencimiento:normalizeImportDate(
        getImportValue(row,'vencimientoAcreditacion'+slot,rowIndex)
      )
    });
  }

  return accreditations;
}

function upsertWorkerAccreditation(worker,accreditation){
  if(!worker || !accreditation?.faena) return 'none';
  if(!Array.isArray(worker.acreditaciones)) worker.acreditaciones = [];

  const existing = worker.acreditaciones.find(item=>
    normalizeImportText(item.faena)===
    normalizeImportText(accreditation.faena)
  );

  if(existing){
    const before = JSON.stringify(existing);
    existing.faena = accreditation.faena;
    existing.estado = accreditation.estado || existing.estado || 'Acreditado';
    if(accreditation.vencimiento){
      existing.vencimiento = accreditation.vencimiento;
    }

    return before===JSON.stringify(existing) ? 'none' : 'updated';
  }

  worker.acreditaciones.push({
    faena:accreditation.faena,
    estado:accreditation.estado || 'Acreditado',
    vencimiento:accreditation.vencimiento || ''
  });

  return 'created';
}

function buildImportSheetData(sheetName,raw,sheetIndex){
  const headerRowIndex = detectImportHeaderRow(raw);
  const headers = (raw[headerRowIndex]||[]).map(value=>
    String(value||'').trim()
  );
  const rows = raw
    .slice(headerRowIndex+1)
    .filter(row=>row.some(cell=>String(cell||'').trim()!==''));
  const mapping = guessImportMapping(headers);

  const previousImportState = importState;
  importState = {
    headers,
    rows,
    mapping
  };

  let validRows = 0;
  let rowsWithCargo = 0;

  rows.forEach((row,rowIndex)=>{
    const nombre = getImportValue(row,'nombre',rowIndex);
    const apellido = getImportValue(row,'apellido',rowIndex);
    const rut = getImportValue(row,'rut',rowIndex);
    const cargo = getImportValue(row,'cargo',rowIndex);

    if(nombre && apellido && rut){
      validRows++;
      if(cargo) rowsWithCargo++;
    }
  });

  importState = previousImportState;

  const mappedColumns = Object.values(mapping).filter(index=>index>=0).length;
  const requiredColumns = ['nombre','apellido','rut']
    .filter(key=>mapping[key]>=0)
    .length;
  const validRatio = rows.length ? validRows/rows.length : 0;
  const cargoRatio = validRows ? rowsWithCargo/validRows : 0;

  const score =
    requiredColumns*1000 +
    mappedColumns*100 +
    validRows*5 +
    validRatio*250 +
    cargoRatio*120 -
    Math.max(0,rows.length-validRows)*0.15;

  return {
    sheetName,
    sheetIndex,
    headerRowIndex,
    headers,
    rows,
    mapping,
    validRows,
    rowsWithCargo,
    score
  };
}

function applyImportSheet(sheetIndex){
  if(!importState?.sheets?.length) return;

  const selected = importState.sheets.find(sheet=>
    sheet.sheetIndex===Number(sheetIndex)
  ) || importState.sheets[0];

  importState.sheetIndex = selected.sheetIndex;
  importState.sheetName = selected.sheetName;
  importState.headerRowIndex = selected.headerRowIndex;
  importState.headers = selected.headers;
  importState.rows = selected.rows;
  importState.mapping = {...selected.mapping};
}

function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function slugify(s){ return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase(); }
function examDocKey(workerId, tipo){ return 'doc__'+workerId+'__exam__'+slugify(tipo); }
function certDocKey(workerId, certId, fileId){ return fileId ? ('doc__'+workerId+'__cert__'+certId+'__'+fileId) : ('doc__'+workerId+'__cert__'+certId); }
function examExtraDocKey(workerId, extraId){ return 'doc__'+workerId+'__examextra__'+extraId; }

// CHK-02: mismas claves de arriba, pero como ruta de Storage en vez de
// clave de RTDB — el nombre del archivo en Storage es el mismo doc__key,
// así queda 1:1 con lo que ya identifica a cada documento hoy.
function examDocStoragePath(workerId, tipo){ return 'workerDocuments/'+examDocKey(workerId, tipo); }
function certDocStoragePath(workerId, certId, fileId){ return 'workerDocuments/'+certDocKey(workerId, certId, fileId); }
function examExtraDocStoragePath(workerId, extraId){ return 'workerDocuments/'+examExtraDocKey(workerId, extraId); }

// CHK-01 extendido a cargos/faenas: mismo esquema de codificación base64
// URL-safe que encodeKey() del primer <script> (no accesible desde acá por
// scope), para convertir el nombre libre de un cargo/faena en una clave
// válida de RTDB (que no admite '.', '#', '$', '[', ']', '/').
function encodeCatalogKey(value){
  return btoa(unescape(encodeURIComponent(String(value))))
    .replaceAll('/', '_')
    .replaceAll('+', '-')
    .replaceAll('=', '');
}

function normalizeServiceData(service){
  if(!service || typeof service!=='object') return;

  if(!Array.isArray(service.requerimientos)){
    service.requerimientos = [];
  }
  if(!Array.isArray(service.asignaciones)){
    service.asignaciones = [];
  }

  service.requerimientos.forEach(requirement=>{
    if(!requirement.id) requirement.id = uid('req');
  });

  service.asignaciones.forEach(assignment=>{
    if(!assignment.id) assignment.id = uid('asg');
    if(!assignment.estado) assignment.estado = 'propuesto';
    if(!assignment.createdAt) assignment.createdAt = Date.now();
    if(!assignment.updatedAt) assignment.updatedAt = assignment.createdAt;
  });
}

function normalizeWorkerData(worker){
  if(!worker || typeof worker!=='object') return;

  if(!worker.id) worker.id = uid('w');
  if(!Array.isArray(worker.certificaciones)) worker.certificaciones = [];
  if(!Array.isArray(worker.examenes)) worker.examenes = [];
  if(!Array.isArray(worker.examenesExtra)) worker.examenesExtra = [];
  if(!Array.isArray(worker.acreditaciones)) worker.acreditaciones = [];
  if(!worker.overrides || typeof worker.overrides!=='object') worker.overrides = {};

  worker.certificaciones.forEach(certification=>{
    if(!certification.id) certification.id = uid('c');
    if(!certification.archivos){
      certification.archivos = certification.archivoNombre
        ? [{
            id:'',
            nombre:certification.archivoNombre,
            mime:certification.archivoTipo||''
          }]
        : [];

      delete certification.archivoNombre;
      delete certification.archivoTipo;
    }
  });
}

function applyPersistentPayload(payload){

  state.workers = Array.isArray(parsed.workers) ? parsed.workers : [];
  state.faenas = Array.isArray(parsed.faenas) && parsed.faenas.length
    ? parsed.faenas
    : [...DEFAULT_FAENAS];
  state.cargos = Array.isArray(parsed.cargos) && parsed.cargos.length
    ? parsed.cargos
    : [...DEFAULT_CARGOS];
  state.cargoColores = parsed.cargoColores && typeof parsed.cargoColores==='object'
    ? parsed.cargoColores
    : {};
  state.equipos = Array.isArray(parsed.equipos) && parsed.equipos.length
    ? parsed.equipos
    : [...DEFAULT_EQUIPOS];

  state.pasajes = Array.isArray(parsed.pasajes) ? parsed.pasajes : [];
