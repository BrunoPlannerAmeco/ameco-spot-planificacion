function isValidIsoDate(value){
  if(!value) return true;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(String(value))) return false;

  const date = parseDate(value);
  return !!date && fmt(date)===String(value);
}

function auditAppData(payload=buildPersistentPayload(),storageKeys=null){
  const data = payload && typeof payload==='object' ? payload : {};
  const issues = [];
  const addIssue = (severity,code,message,entity='')=>{
    issues.push({severity,code,message,entity});
  };

  const workers = Array.isArray(data.workers) ? data.workers : [];
  const services = Array.isArray(data.servicios) ? data.servicios : [];
  const calls = Array.isArray(data.llamados) ? data.llamados : [];
  const tickets = Array.isArray(data.pasajes) ? data.pasajes : [];
  const cargos = new Set(Array.isArray(data.cargos) ? data.cargos : []);
  const sites = new Set(Array.isArray(data.faenas) ? data.faenas : []);
  const workerIds = new Set();
  const normalizedRuts = new Map();
  const expectedDocumentKeys = new Set();

  workers.forEach((worker,index)=>{
    const entity = worker.nombre || worker.rut || ('Trabajador '+(index+1));

    if(!worker.id){
      addIssue('error','WORKER_WITHOUT_ID','El trabajador no tiene identificador.',entity);
    }else if(workerIds.has(worker.id)){
      addIssue('error','DUPLICATE_WORKER_ID','El identificador del trabajador está duplicado.',entity);
    }else{
      workerIds.add(worker.id);
    }

    const normalizedRut = normalizeRut(worker.rut);
    if(!normalizedRut){
      addIssue('error','WORKER_WITHOUT_RUT','El trabajador no tiene un RUT válido.',entity);
    }else if(normalizedRuts.has(normalizedRut)){
      addIssue(
        'error',
        'DUPLICATE_RUT',
        'El RUT también pertenece a '+normalizedRuts.get(normalizedRut)+'.',
        entity
      );
    }else{
      normalizedRuts.set(normalizedRut,entity);
    }

    if(!String(worker.nombre||'').trim()){
      addIssue('warning','WORKER_WITHOUT_NAME','El trabajador no tiene nombre visible.',entity);
    }

    if(!String(worker.cargo||'').trim()){
      addIssue('warning','WORKER_WITHOUT_ROLE','El trabajador no tiene cargo.',entity);
    }else if(cargos.size && !cargos.has(worker.cargo)){
      addIssue('warning','UNKNOWN_ROLE','El cargo no existe en Configuración: '+worker.cargo+'.',entity);
    }

    (worker.examenes||[]).forEach(exam=>{
      if(exam.fecha && !isValidIsoDate(exam.fecha)){
        addIssue('warning','INVALID_EXAM_DATE','Fecha de examen inválida: '+exam.fecha+'.',entity);
      }
      if(exam.vencimiento && !isValidIsoDate(exam.vencimiento)){
        addIssue('warning','INVALID_EXAM_EXPIRY','Vencimiento de examen inválido: '+exam.vencimiento+'.',entity);
      }
      if(exam.archivoNombre && worker.id && exam.tipo){
        expectedDocumentKeys.add(examDocKey(worker.id,exam.tipo));
      }
    });

    (worker.examenesExtra||[]).forEach(exam=>{
      if(exam.fecha && !isValidIsoDate(exam.fecha)){
        addIssue('warning','INVALID_EXTRA_EXAM_DATE','Fecha de examen adicional inválida: '+exam.fecha+'.',entity);
      }
      if(exam.vencimiento && !isValidIsoDate(exam.vencimiento)){
        addIssue('warning','INVALID_EXTRA_EXAM_EXPIRY','Vencimiento de examen adicional inválido: '+exam.vencimiento+'.',entity);
      }
      if(exam.archivoNombre && worker.id && exam.id){
        expectedDocumentKeys.add(examExtraDocKey(worker.id,exam.id));
      }
    });

    (worker.acreditaciones||[]).forEach(accreditation=>{
      if(!accreditation.faena){
        addIssue('warning','ACCREDITATION_WITHOUT_SITE','Existe una acreditación sin faena.',entity);
      }else if(sites.size && !sites.has(accreditation.faena)){
        addIssue(
          'warning',
          'UNKNOWN_ACCREDITATION_SITE',
          'La faena de acreditación no existe en Configuración: '+accreditation.faena+'.',
          entity
        );
      }

      if(accreditation.vencimiento && !isValidIsoDate(accreditation.vencimiento)){
        addIssue(
          'warning',
          'INVALID_ACCREDITATION_EXPIRY',
          'Vencimiento de acreditación inválido: '+accreditation.vencimiento+'.',
          entity
        );
      }
    });

    Object.entries(worker.overrides||{}).forEach(([date,override])=>{
      if(!isValidIsoDate(date)){
        addIssue('warning','INVALID_SHIFT_DATE','La fecha de turno es inválida: '+date+'.',entity);
      }
      if(override?.faena && sites.size && !sites.has(override.faena)){
        addIssue(
          'warning',
          'UNKNOWN_SHIFT_SITE',
          'El turno utiliza una faena no configurada: '+override.faena+'.',
          entity
        );
      }
    });

    (worker.certificaciones||[]).forEach(certification=>{
      if(certification.fecha && !isValidIsoDate(certification.fecha)){
        addIssue('warning','INVALID_CERTIFICATION_DATE','Fecha de certificación inválida: '+certification.fecha+'.',entity);
      }
      if(certification.vencimiento && !isValidIsoDate(certification.vencimiento)){
        addIssue(
          'warning',
          'INVALID_CERTIFICATION_EXPIRY',
          'Vencimiento de certificación inválido: '+certification.vencimiento+'.',
          entity
        );
      }

      (certification.archivos||[]).forEach(file=>{
        if(worker.id && certification.id && file.id){
          expectedDocumentKeys.add(
            certDocKey(worker.id,certification.id,file.id)
          );
        }
      });
    });
  });

  services.forEach((service,index)=>{
    const entity = service.nombre || ('Servicio '+(index+1));
    const requirementIds = new Set();
    const activeWorkers = new Set();

    if(!service.id){
      addIssue('error','SERVICE_WITHOUT_ID','El servicio no tiene identificador.',entity);
    }
    if(service.fechaInicio && !isValidIsoDate(service.fechaInicio)){
      addIssue('warning','INVALID_SERVICE_START','Fecha de inicio inválida: '+service.fechaInicio+'.',entity);
    }
    if(service.fechaFin && !isValidIsoDate(service.fechaFin)){
      addIssue('warning','INVALID_SERVICE_END','Fecha de término inválida: '+service.fechaFin+'.',entity);
    }
    if(service.fechaInicio && service.fechaFin && service.fechaFin<service.fechaInicio){
      addIssue('error','SERVICE_DATE_ORDER','La fecha de término es anterior al inicio.',entity);
    }
    if(service.faena && sites.size && !sites.has(service.faena)){
      addIssue('warning','UNKNOWN_SERVICE_SITE','La faena del servicio no existe en Configuración.',entity);
    }

    (service.requerimientos||[]).forEach(requirement=>{
      if(!requirement.id){
        addIssue('error','REQUIREMENT_WITHOUT_ID','Existe un cargo requerido sin identificador.',entity);
      }else if(requirementIds.has(requirement.id)){
        addIssue('error','DUPLICATE_REQUIREMENT_ID','Existe un identificador de requisito duplicado.',entity);
      }else{
        requirementIds.add(requirement.id);
      }

      if(!requirement.cargo){
        addIssue('warning','REQUIREMENT_WITHOUT_ROLE','Existe un requisito sin cargo.',entity);
      }else if(cargos.size && !cargos.has(requirement.cargo)){
        addIssue('warning','UNKNOWN_REQUIREMENT_ROLE','El requisito usa un cargo no configurado: '+requirement.cargo+'.',entity);
      }

      if(!Number.isInteger(Number(requirement.cantidad)) || Number(requirement.cantidad)<1){
        addIssue('error','INVALID_REQUIREMENT_QUANTITY','La cantidad requerida debe ser mayor que cero.',entity);
      }
    });

    (service.asignaciones||[]).forEach(assignment=>{
      if(!assignment.id){
        addIssue('error','ASSIGNMENT_WITHOUT_ID','Existe una asignación sin identificador.',entity);
      }
      if(!workerIds.has(assignment.workerId)){
        addIssue('error','ORPHAN_ASSIGNMENT_WORKER','La asignación apunta a un trabajador inexistente.',entity);
      }
      if(!requirementIds.has(assignment.requisitoId)){
        addIssue('error','ORPHAN_ASSIGNMENT_REQUIREMENT','La asignación apunta a un requisito inexistente.',entity);
      }

      if(assignmentIsActive(assignment)){
        if(activeWorkers.has(assignment.workerId)){
          addIssue('warning','DUPLICATE_ACTIVE_ASSIGNMENT','El mismo trabajador está asignado más de una vez al servicio.',entity);
        }
        activeWorkers.add(assignment.workerId);
      }
    });
  });

  calls.forEach(call=>{
    if(call.workerId && !workerIds.has(call.workerId)){
      addIssue('error','ORPHAN_CALL','Existe un llamado asociado a un trabajador eliminado.',call.id||'Llamado');
    }
    if(call.fecha && !isValidIsoDate(call.fecha)){
      addIssue('warning','INVALID_CALL_DATE','El llamado tiene una fecha inválida: '+call.fecha+'.',call.id||'Llamado');
    }
  });

  tickets.forEach(ticket=>{
    if(ticket.workerId && !workerIds.has(ticket.workerId)){
      addIssue('error','ORPHAN_TICKET','Existe un pasaje asociado a un trabajador eliminado.',ticket.id||'Pasaje');
    }
    if(ticket.fechaViaje && !isValidIsoDate(ticket.fechaViaje)){
      addIssue('warning','INVALID_TICKET_DATE','El pasaje tiene una fecha inválida: '+ticket.fechaViaje+'.',ticket.id||'Pasaje');
    }
  });

  if(Array.isArray(storageKeys)){
    const storedDocuments = new Set(
      storageKeys.filter(key=>key.startsWith('doc__'))
    );

    expectedDocumentKeys.forEach(key=>{
      if(!storedDocuments.has(key)){
        addIssue('warning','MISSING_DOCUMENT_DATA','Existe metadata de archivo, pero no se encontró su contenido.',key);
      }
    });

    storedDocuments.forEach(key=>{
      if(!expectedDocumentKeys.has(key)){
        addIssue('warning','ORPHAN_DOCUMENT_DATA','Existe un archivo sin referencia en las fichas.',key);
      }
    });
  }

  const severityOrder = {error:0,warning:1,info:2};
  issues.sort((a,b)=>
    severityOrder[a.severity]-severityOrder[b.severity] ||
    a.code.localeCompare(b.code)
  );

  const errors = issues.filter(issue=>issue.severity==='error').length;
  const warnings = issues.filter(issue=>issue.severity==='warning').length;

  return {
    checkedAt:new Date().toISOString(),
    scope:Array.isArray(storageKeys) ? 'full' : 'quick',
    errors,
    warnings,
    healthy:errors===0,
    issues,
    counts:{
      workers:workers.length,
      services:services.length,
      calls:calls.length,
      tickets:tickets.length,
      cargos:Array.isArray(data.cargos) ? data.cargos.length : 0,
      sites:Array.isArray(data.faenas) ? data.faenas.length : 0,
      storageEntries:Array.isArray(storageKeys) ? storageKeys.length : null,
      documents:Array.isArray(storageKeys)
        ? storageKeys.filter(key=>key.startsWith('doc__')).length
        : null
    }
  };
}

function formatBytes(bytes){
  const value = Number(bytes)||0;
  if(value<1024) return value+' B';
  if(value<1024*1024) return (value/1024).toFixed(1)+' KB';
  if(value<1024*1024*1024) return (value/(1024*1024)).toFixed(1)+' MB';
  return (value/(1024*1024*1024)).toFixed(2)+' GB';
}

function safeFileTimestamp(value=new Date()){
  return value.toISOString()
    .replace(/\.\d{3}Z$/,'Z')
    .replace(/:/g,'-');
}

function downloadJsonFile(filename,value){
  const json = typeof value==='string'
    ? value
    : JSON.stringify(value,null,2);
  const blob = new Blob([json],{type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');

  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();

  setTimeout(()=>URL.revokeObjectURL(url),1500);
  return blob.size;
}

function readLastBackupMeta(){

  }catch(error){

}

function writeLastBackupMeta(meta){
  try{
    localStorage.setItem(LAST_BACKUP_META_KEY,JSON.stringify(meta));

async function collectStorageEntries(){
  const listResult = await window.storage.list('',true);
  const keys = Array.from(new Set(
    ((listResult&&listResult.keys)||[]).concat([STORAGE_KEY])
  ));
  const entries = {};
  const failedKeys = [];

  for(const key of keys){
    try{
      const result = await window.storage.get(key,true);
      entries[key] = result.value;
    }catch(error){
      if(key===STORAGE_KEY){
        entries[key] = JSON.stringify(buildPersistentPayload());
      }else{
        failedKeys.push(key);
      }
    }
  }

  return {entries,failedKeys};
}

async function buildBackupEnvelope(reason='manual'){
  const storageSnapshot = await collectStorageEntries();
  const dataText = storageSnapshot.entries[STORAGE_KEY] ||
    JSON.stringify(buildPersistentPayload());
  const data = JSON.parse(dataText);
  const storageKeys = Object.keys(storageSnapshot.entries);
  const integrity = auditAppData(data,storageKeys);

  return {
    format:BACKUP_FORMAT,
    schemaVersion:BACKUP_SCHEMA_VERSION,
    appVersion:APP_VERSION,
    exportedAt:new Date().toISOString(),
    reason,
    projectId:'ameco-spot-planificacion',
    sourceUrl:location.href,
    userEmail:(window.amecoCurrentUser&&window.amecoCurrentUser.email)||'',
    integrity,
    failedKeys:storageSnapshot.failedKeys,
    storageEntries:storageSnapshot.entries
  };
}

function downloadBackupEnvelope(envelope){
  const filename =
    'AMECO-Spot-Planner_'+
    APP_VERSION+'_respaldo_'+
    safeFileTimestamp(new Date(envelope.exportedAt))+
    '.json';

  const sizeBytes = downloadJsonFile(filename,envelope);
  const entryCount = Object.keys(envelope.storageEntries||{}).length;
  const documentCount = Object.keys(envelope.storageEntries||{})
    .filter(key=>key.startsWith('doc__')).length;

  const meta = {
    createdAt:envelope.exportedAt,
    filename,
    sizeBytes,
    entryCount,
    documentCount,
    reason:envelope.reason
  };
  writeLastBackupMeta(meta);
  return meta;
}

async function createAndDownloadBackup(reason='manual'){
  const envelope = await buildBackupEnvelope(reason);
  const meta = downloadBackupEnvelope(envelope);

  if(envelope.failedKeys.length){
    alert(
      'El respaldo se descargó, pero '+envelope.failedKeys.length+
      ' elemento(s) no pudieron leerse. Revisa el informe de integridad.'
    );
  }

  return {envelope,meta};
}

function parseBackupDocument(raw){
  if(!raw || typeof raw!=='object'){
    throw new Error('El archivo no contiene un objeto JSON válido.');
  }

  if(raw.format===BACKUP_FORMAT && raw.storageEntries){
    const mainValue = raw.storageEntries[STORAGE_KEY];
    if(typeof mainValue!=='string'){
      throw new Error('El respaldo no contiene la base principal.');
    }

    return {
      isFull:true,
      entries:raw.storageEntries,
      data:JSON.parse(mainValue),
      metadata:raw
    };
  }

  if(Array.isArray(raw.workers)){
    return {
      isFull:false,
      entries:{
        [STORAGE_KEY]:JSON.stringify(raw)
      },
      data:raw,
      metadata:{
        format:'LEGACY_DATA_ONLY',
        appVersion:'desconocida',
        exportedAt:''
      }
    };
  }

  if(raw.data && Array.isArray(raw.data.workers)){
    return {
      isFull:false,
      entries:{
        [STORAGE_KEY]:JSON.stringify(raw.data)
      },
      data:raw.data,
      metadata:raw
    };
  }

  throw new Error(
    'El archivo no corresponde a un respaldo compatible de AMECO Spot Planner.'
  );
}

async function writeStorageEntries(entries,replaceAll){
  const targetEntries = entries && typeof entries==='object'
    ? entries
    : {};

  if(replaceAll){
    const listResult = await window.storage.list('',true);
    const currentKeys = (listResult&&listResult.keys)||[];
    const targetKeys = new Set(Object.keys(targetEntries));

    for(const key of currentKeys){
      if(!targetKeys.has(key)){
        await window.storage.delete(key,true);
      }
    }
  }

  for(const [key,value] of Object.entries(targetEntries)){
    await window.storage.set(key,value,true);
  }
}

async function restoreBackupFile(file){
  const text = await file.text();
  const raw = JSON.parse(text);
  const parsed = parseBackupDocument(raw);
  const audit = auditAppData(
    parsed.data,
    parsed.isFull ? Object.keys(parsed.entries) : null
  );

  const counts = audit.counts;
  const sourceVersion = parsed.metadata.appVersion || 'desconocida';
  const confirmation =
    'Se restaurará este respaldo:\n\n'+
    'Versión de origen: '+sourceVersion+'\n'+
    'Trabajadores: '+counts.workers+'\n'+
    'Servicios: '+counts.services+'\n'+
    'Llamados: '+counts.calls+'\n'+
    'Pasajes: '+counts.tickets+'\n'+
    'Errores de integridad: '+audit.errors+'\n'+
    'Advertencias: '+audit.warnings+'\n\n'+
    (parsed.isFull
      ? 'La restauración reemplazará la base principal y todos los archivos guardados.'
      : 'Este respaldo contiene solo datos principales; los archivos actuales se conservarán.')+
    '\n\nAntes de restaurar se descargará automáticamente una copia del estado actual. ¿Continuar?';

  if(!confirm(confirmation)) return false;

  const rollback = await buildBackupEnvelope('pre-restauracion');
  downloadBackupEnvelope(rollback);

  try{
    await writeStorageEntries(parsed.entries,parsed.isFull);
    applyPersistentPayload(parsed.data);
    state.ui.integrityReport = audit;

    await recordAudit(
      'BACKUP_RESTORED',
      'backup',
      file.name,
      'Se restauró un respaldo de la plataforma.',
      {
        sourceVersion:parsed.metadata.appVersion||'desconocida',
        workers:audit.counts.workers,
        services:audit.counts.services,
        errors:audit.errors,
        warnings:audit.warnings
      }
    );

    render();

    alert(
      'Respaldo restaurado correctamente.\n\n'+
      'Se creó una copia previa por seguridad.'
    );
    return true;
  }catch(error){
    console.error('Error al restaurar',error);

    try{
      await writeStorageEntries(rollback.storageEntries,true);
      const rollbackData = JSON.parse(rollback.storageEntries[STORAGE_KEY]);
      applyPersistentPayload(rollbackData);
      render();
    }catch(rollbackError){
      console.error('Error al revertir la restauración',rollbackError);
    }

    throw new Error(
      'No fue posible completar la restauración. Se intentó volver al estado anterior.'
    );
  }
}

let saveTimeout=null;
function persist(){
  if(!guardPermission('write')){
    return Promise.resolve(false);
  }

  return new Promise((resolve)=>{
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async ()=>{
      state.saving = true; renderSavePill();
      try{
        await window.storage.set(STORAGE_KEY, JSON.stringify(buildPersistentPayload()), true);
        state.ui.integrityReport = null;
      }catch(e){ console.error('Error al guardar', e); }
      state.saving = false; renderSavePill();
      resolve();
    }, 350);
  });
}

// Guardado inmediato (botón Guardar): salta el debounce y confirma o avisa el error
async function persistNow(){
  if(!guardPermission('write')) return false;

  clearTimeout(saveTimeout);
  state.saving = true; renderSavePill();
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(buildPersistentPayload()), true);
    state.ui.integrityReport = null;
    state.saving = false; renderSavePill();
    return true;
  }catch(e){
    console.error('Error al guardar', e);
    state.saving = false; renderSavePill();
    alert('No se pudo guardar. Revisa tu conexión e inténtalo de nuevo.');
    return false;
  }
}

/* ============================= DATE HELPERS ============================= */
function fmt(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function daysBetween(a,b){ return Math.round((b-a)/(1000*60*60*24)); }
function todayStr(){ return fmt(new Date()); }
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_CORTO = ['D','L','M','M','J','V','S'];

function examStatus(vencStr){
  if(!vencStr) return {status:'sin-dato', label:'Sin dato', cls:'grey'};
  const venc = parseDate(vencStr);
  const diff = daysBetween(new Date(new Date().toDateString()), venc);
  if(diff < 0) return {status:'vencido', label:'Vencido', cls:'bad', diff};
  if(diff <= 30) return {status:'por-vencer', label:'Por vencer', cls:'warn', diff};
  return {status:'vigente', label:'Vigente', cls:'good', diff};
}
function acredStatus(a){
  if(a.estado === 'Acreditado' && a.vencimiento){
    const es = examStatus(a.vencimiento);
    if(es.status==='vencido') return {label:'Vencido', cls:'bad'};
    if(es.status==='por-vencer') return {label:'Por vencer', cls:'warn'};
    return {label:'Acreditado', cls:'good'};
  }
  if(a.estado === 'Acreditado') return {label:'Acreditado', cls:'good'};
  if(a.estado === 'En trámite') return {label:'En trámite', cls:'warn'};
  return {label:'No acreditado', cls:'grey'};
}
function workerWorstExam(w){
  let worst = 'good'; let order = {bad:3,warn:2,'sin-dato':1,good:0};
  (w.examenes||[]).forEach(e=>{
    const s = examStatus(e.vencimiento).status;
    const key = s==='vencido'?'bad':s==='por-vencer'?'warn':s==='sin-dato'?'sin-dato':'good';
    if(order[key] > order[worst]) worst = key;
  });
  return worst;
}
function faenaColor(faena){
  const idx = state.faenas.indexOf(faena);
  return FAENA_COLORS[idx>=0 ? idx % FAENA_COLORS.length : 0];
}
function faenaAbbrev(faena){
  return (faena||'').replace(/\s+/g,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').slice(0,3).toUpperCase();
}


function cargoHash(cargo){
  return Array.from(String(cargo||'')).reduce(
    (total,char)=>((total*31)+char.charCodeAt(0))>>>0,
    7
  );
}

function defaultCargoColor(cargo){
  return CARGO_COLORS[cargoHash(cargo)%CARGO_COLORS.length];
}

function ensureCargoColor(cargo){
  if(!cargo) return '#59636e';
  if(!state.cargoColores) state.cargoColores = {};
  if(!state.cargoColores[cargo]){
    state.cargoColores[cargo] = defaultCargoColor(cargo);
  }
  return state.cargoColores[cargo];
}

function ensureCargoColors(){
  if(!state.cargoColores) state.cargoColores = {};
  state.cargos.forEach(ensureCargoColor);
}

function cargoColor(cargo){
  return ensureCargoColor(cargo||'Sin cargo');
}

function cargoTextColor(hex){
  const clean = String(hex||'').replace('#','');
  if(clean.length!==6) return '#ffffff';

  const r = parseInt(clean.slice(0,2),16);
  const g = parseInt(clean.slice(2,4),16);
  const b = parseInt(clean.slice(4,6),16);
  const brightness = (r*299+g*587+b*114)/1000;

  return brightness>155 ? '#27313a' : '#ffffff';
}

/* ============================= SHIFT (14x14) LOGIC ============================= */
function shiftBaseStatus(worker, dateStr){
  const t = worker.turno || {fechaInicioCiclo: todayStr(), diasTrabajo:14, diasDescanso:14};
  if(!t.fechaInicioCiclo) return 'descanso';
  const start = parseDate(t.fechaInicioCiclo);
  const d = parseDate(dateStr);
  const cycle = (t.diasTrabajo||14) + (t.diasDescanso||14);
  let diff = daysBetween(start, d) % cycle;
  if(diff < 0) diff += cycle;
  return diff < (t.diasTrabajo||14) ? 'trabajo' : 'descanso';
}
function dayStatus(worker, dateStr){
  const ov = (worker.overrides||{})[dateStr];
  const base = shiftBaseStatus(worker, dateStr);
  if(ov && ov.tipo) return {tipo: ov.tipo, base, faena: ov.faena||'', nota: ov.nota||''};
  return {tipo: base, base, faena:'', nota:''};
}

/* ============================= DRAG-FILL (copiar celda como en Excel) ============================= */
let dragState = null; // {workerId, sourceDate, sourceInfo, lastDate, moved}
let justDragged = false;
let lastAction = null; // {workers:[{id, overrides}]} snapshot para "Deshacer"

function snapshotOverrides(workerIds){
  return workerIds.map(id=>{
    const w = state.workers.find(x=>x.id===id);
    return {id, overrides: JSON.parse(JSON.stringify((w && w.overrides) || {}))};
  });
}

async function performUndo(){
  if(!lastAction){ alert('No hay cambios recientes para deshacer.'); return; }
  lastAction.forEach(item=>{
    const w = state.workers.find(x=>x.id===item.id);
    if(w) w.overrides = item.overrides;
  });
  lastAction = null;
  render();
  await persist();
}

document.addEventListener('keydown', (e)=>{
  const isUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key==='z' || e.key==='Z');
  if(!isUndo) return;
  if(!hasPermission('write')) return;
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return; // deja el undo nativo del campo de texto
  e.preventDefault();
  performUndo();
});

document.addEventListener('mousedown', (e)=>{
  if(!hasPermission('write')) return;
  if(e.button !== 0) return;
  const cell = e.target.closest('.daycell');
  if(!cell) return;
  const workerId = cell.dataset.id;
  const date = cell.dataset.date;
  const w = state.workers.find(x=>x.id===workerId);
  if(!w) return;
  const info = dayStatus(w, date);
  dragState = { workerId, sourceDate: date, sourceInfo: {tipo: info.tipo, faena: info.faena, nota: info.nota}, lastDate: date, moved: false };
});

document.addEventListener('mouseover', (e)=>{
  if(!dragState) return;
  const cell = e.target.closest('.daycell');
  if(!cell || cell.dataset.id !== dragState.workerId) return;
  dragState.lastDate = cell.dataset.date;
  dragState.moved = true;
  highlightDragRange(dragState.workerId, dragState.sourceDate, dragState.lastDate);
});

document.addEventListener('mouseup', async ()=>{
  if(!dragState) return;
  if(dragState.moved){
    lastAction = snapshotOverrides([dragState.workerId]);
    applyDragFill(dragState);
    justDragged = true;
    clearDragHighlight();
    render();
    await persist();
  } else {
    clearDragHighlight();
  }
  dragState = null;
});

function highlightDragRange(workerId, d1, d2){
  clearDragHighlight();
  const lo = d1 < d2 ? d1 : d2;
  const hi = d1 < d2 ? d2 : d1;
  document.querySelectorAll('.daycell[data-id="'+workerId+'"]').forEach(td=>{
    const d = td.dataset.date;
    if(d >= lo && d <= hi) td.classList.add('drag-highlight');
  });
}
function clearDragHighlight(){
  document.querySelectorAll('.drag-highlight').forEach(td=>td.classList.remove('drag-highlight'));
}
function applyDragFill(ds){
  const w = state.workers.find(x=>x.id===ds.workerId);
  if(!w) return;
  const lo = ds.sourceDate < ds.lastDate ? ds.sourceDate : ds.lastDate;
  const hi = ds.sourceDate < ds.lastDate ? ds.lastDate : ds.sourceDate;
  w.overrides = w.overrides || {};
  let cur = parseDate(lo);
  const end = parseDate(hi);
  while(cur <= end){
    const dateStr = fmt(cur);
    const base = shiftBaseStatus(w, dateStr);
    const tipo = ds.sourceInfo.tipo, faena = ds.sourceInfo.faena||'', nota = ds.sourceInfo.nota||'';
    if(tipo===base && !faena && !nota) delete w.overrides[dateStr];
    else w.overrides[dateStr] = {tipo, faena, nota};
    cur = addDays(cur, 1);
  }
}

/* ============================= FILE / DOCUMENT HELPERS ============================= */
function readFileAsBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function viewDocument(key, fallbackName){
  try{
    const res = await window.storage.get(key, true);
    if(!res || !res.value){ alert('No se encontró el archivo guardado. Vuelve a subirlo desde la ficha del trabajador.'); return; }
    const parsed = JSON.parse(res.value);

    // CHK-02: los documentos nuevos guardan storagePath (metadata, bytes en
    // Storage). Los que quedaron del formato anterior (o no migrados
    // todavía) traen los bytes en base64 directo en "data" — se siguen
    // abriendo igual que siempre hasta que se migren.
    if(parsed.storagePath){
      const url = await window.amecoAccessApi.getWorkerDocumentUrl(parsed.storagePath);
      window.open(url, '_blank', 'noopener');
      return;
    }

    const byteChars = atob(parsed.data);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const blob = new Blob([bytes], {type: parsed.mime || 'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel='noopener';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
  }catch(e){
    console.error(e);
    alert('No se encontró el archivo guardado (puede que la subida haya fallado en su momento). Vuelve a subirlo desde la ficha del trabajador.');
  }
}


/* ============================= PREFERENCIAS DE INTERFAZ ============================= */
function clampTurnoNameWidth(value){
  const number = Number(value);
  if(!Number.isFinite(number)) return 190;
  return Math.max(120,Math.min(380,Math.round(number)));
}

function loadUiPreferences(){
  try{
    const saved = JSON.parse(localStorage.getItem(UI_PREFS_KEY)||'{}');
    state.ui.sidebarCollapsed = saved.sidebarCollapsed === true;
    state.ui.turnoNameWidth = clampTurnoNameWidth(
      saved.turnoNameWidth ?? state.ui.turnoNameWidth
    );
  }catch(error){
    state.ui.sidebarCollapsed = false;
    state.ui.turnoNameWidth = 190;
  }
}

function saveUiPreferences(){
  try{
    localStorage.setItem(UI_PREFS_KEY,JSON.stringify({
      sidebarCollapsed:state.ui.sidebarCollapsed === true,
      turnoNameWidth:clampTurnoNameWidth(state.ui.turnoNameWidth)
    }));
  }catch(error){}
}

function applyLayoutPreferences(){
  const shell = document.getElementById('shell');
  if(shell){
    shell.classList.toggle(
      'sidebar-collapsed',
      state.ui.sidebarCollapsed === true
    );
  }

  document.documentElement.style.setProperty(
    '--turno-name-width',
    clampTurnoNameWidth(state.ui.turnoNameWidth)+'px'
  );
}

function setTurnoNameWidth(value,save=true){
  state.ui.turnoNameWidth = clampTurnoNameWidth(value);

  document.documentElement.style.setProperty(
    '--turno-name-width',
    state.ui.turnoNameWidth+'px'
  );

  const table = document.querySelector('.turno-two-month-grid');
  if(table){
    table.style.setProperty(
      '--turno-name-width',
      state.ui.turnoNameWidth+'px'
    );
  }

  const valueLabel = document.getElementById('turnoNameWidthValue');
  if(valueLabel){
    valueLabel.textContent = state.ui.turnoNameWidth+' px';
  }

  if(save) saveUiPreferences();
}

const NAV = [
  {id:'dashboard', label:'Resumen', ic:'◆'},
  {id:'servicios', label:'Servicios', ic:'▣'},
  {id:'llamados', label:'Llamados', ic:'☎'},
  {id:'pasajes', label:'Pasajes', ic:'\u2708'},
  {id:'documentos', label:'Documentos', ic:'▤'},
  {id:'acreditaciones', label:'Acreditaciones', ic:'✓'},
  {id:'certificaciones', label:'Certificaciones', ic:'⚙'},
  {id:'turnos', label:'Turnos 14x14', ic:'▦'},
  {id:'trabajadores', label:'Trabajadores', ic:'●'},
  {id:'configuracion', label:'Configuración', ic:'☰'}
];
const TAB_TITLES = {dashboard:'Resumen general', servicios:'Servicios y requisiciones', trabajadores:'Trabajadores', llamados:'Llamados', pasajes:'Pasajes', documentos:'Documentos y exámenes', acreditaciones:'Acreditación por faena', certificaciones:'Certificaciones por equipo', turnos:'Turnos 14x14', configuracion:'Configuración'};

function renderSidebar(){
  const alertCount = state.workers.filter(w=>{const s=workerWorstExam(w); return s==='bad'||s==='warn';}).length;
  const pendingCalls = (state.llamados||[]).filter(l=>l.resultado==='pendiente'||l.resultado==='no_contesta').length;
  const pendingTickets = (state.pasajes||[]).filter(p=>p.estado==='pendiente'||p.estado==='solicitado').length;
  const openServices = (state.servicios||[]).filter(s=>!['finalizado','cancelado'].includes(s.estado)).length;
  document.getElementById('navList').innerHTML = NAV.map(n=>{
    let count = '';
    if(n.id==='servicios' && openServices>0) count = '<span class="nav-count alert">'+openServices+'</span>';
    if(n.id==='trabajadores') count = '<span class="nav-count">'+state.workers.length+'</span>';
    if(n.id==='documentos' && alertCount>0) count = '<span class="nav-count alert">'+alertCount+'</span>';
    if(n.id==='llamados' && pendingCalls>0) count = '<span class="nav-count alert">'+pendingCalls+'</span>';
    if(n.id==='pasajes' && pendingTickets>0) count = '<span class="nav-count alert">'+pendingTickets+'</span>';
    return '<div class="nav-item '+(state.ui.tab===n.id?'active':'')+'" data-nav="'+n.id+'" title="'+escAttr(n.label)+'">'+
      '<span class="ic">'+n.ic+'</span>'+
      '<span class="nav-label">'+escHtml(n.label)+'</span>'+
      count+
    '</div>';
  }).join('');
  const foot = document.getElementById('sidebarFoot');
  if(foot){
    foot.textContent =
      roleLabel()+
      ' · Información sincronizada en Firebase.';
  }

  const toggle = document.getElementById('sidebarToggle');
  if(toggle){
    const collapsed = state.ui.sidebarCollapsed === true;
    toggle.textContent = collapsed ? '›' : '‹';
    toggle.title = collapsed ? 'Desplegar menú' : 'Plegar menú';
    toggle.setAttribute(
      'aria-label',
      collapsed ? 'Desplegar menú' : 'Plegar menú'
    );
  }
}

        '<span class="ic">\uD83D\uDD0E</span>'+
        '<input id="searchInput" type="search" autocomplete="off" spellcheck="false" placeholder="Buscar por nombre, RUT o cargo..." value="'+escAttr(state.ui.search)+'">'+
      '</div>'+
      '<select id="cargoFilter" class="worker-cargo-filter">'+
        '<option value="all" '+(state.ui.cargoFilter==='all'?'selected':'')+'>Todos los cargos</option>'+
        state.cargos.map(c=>'<option value="'+escAttr(c)+'" '+(state.ui.cargoFilter===c?'selected':'')+'>'+escHtml(c)+'</option>').join('')+
      '</select>';
  }

  let actionButtons = '';

  if(state.ui.tab==='servicios'){
    actionButtons = '<button class="btn btn-accent" data-action="new-service">+ Nuevo servicio</button>';
  }
  else if(state.ui.tab==='trabajadores'){
    actionButtons =
      '<button class="btn btn-ghost" data-action="import-worker">\u2B06 Importar desde Excel</button>'+
      '<button class="btn btn-accent" data-action="new-worker">+ Nuevo trabajador</button>'+

  }
  else if(state.ui.tab==='llamados'){

  }
  else if(state.ui.tab==='pasajes'){
    actionButtons = '<button class="btn btn-accent" data-action="new-pasaje">+ Registrar pasaje</button>';
  }
  else if(state.ui.tab==='configuracion'){
    actionButtons =
      '<button class="btn btn-ghost" data-action="open-add-faena">+ Nueva faena</button>'+
      '<button class="btn btn-accent" data-action="open-add-cargo">+ Nuevo cargo</button>';

      '<span class="cloud-pill"><span class="dot-live"></span> Firebase</span>'+

  tb.innerHTML =

function renderSavePill(){
  const el = document.getElementById('savePill');
  if(!el) return;
  el.innerHTML = state.saving ? '<span class="dot-live" style="background:var(--amber)"></span> Guardando...' : '<span class="dot-live"></span> Guardado';

function render(){
  applyLayoutPreferences();
  renderSidebar();
  renderTopbar();
  const c = document.getElementById('content');
  if(state.ui.tab==='dashboard') c.innerHTML = viewDashboard();

  else if(state.ui.tab==='pasajes') c.innerHTML = viewPasajes();
  else if(state.ui.tab==='documentos') c.innerHTML = viewDocumentos();

  else if(state.ui.tab==='certificaciones') c.innerHTML = viewCertificaciones();

  else if(state.ui.tab==='configuracion') c.innerHTML = viewConfiguracion();

  applyRoleUi();
}

function escAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============================= VIEW: DASHBOARD ============================= */
function viewDashboard(){
  const total = state.workers.length;
  const vencidos = state.workers.filter(w=>workerWorstExam(w)==='bad').length;
  const porVencer = state.workers.filter(w=>workerWorstExam(w)==='warn').length;
  const enFaenaHoy = state.workers.filter(w=>{const t=dayStatus(w, todayStr()).tipo; return t==='trabajo'||t==='extra';}).length;

  // ---- Indicadores nuevos (V1.1) ----
  let acredProblema = 0;
  state.workers.forEach(w=>(w.acreditaciones||[]).forEach(a=>{
    if(a.estado==='Acreditado' && a.vencimiento){
      const st = examStatus(a.vencimiento).status;
      if(st==='vencido'||st==='por-vencer') acredProblema++;
    }
  }));
  const now = new Date();
  const monthPrefix = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let heMes = 0, permisosMes = 0;
  state.workers.forEach(w=>{
    Object.entries(w.overrides||{}).forEach(([fecha, ov])=>{
      if(fecha.startsWith(monthPrefix)){
        if(ov.tipo==='extra') heMes++;
        else if(ov.tipo==='permiso') permisosMes++;
      }
    });
  });
  const hoy = todayStr();
  const en7 = fmt(addDays(new Date(), 7));
  const pasajesUrgentes = (state.pasajes||[]).filter(p=>
    (p.estado==='pendiente'||p.estado==='solicitado') && p.fechaViaje >= hoy && p.fechaViaje <= en7
  ).length;
  const llamadosTotal = (state.llamados||[]).length;
  const llamadosConfirmados = (state.llamados||[]).filter(l=>l.resultado==='confirmado').length;
  const tasaConfirmacion = llamadosTotal ? Math.round(llamadosConfirmados/llamadosTotal*100) : null;
  const sinExamenes = state.workers.filter(w=>(w.examenes||[]).every(e=>!e.vencimiento)).length;

  const activeServices = (state.servicios||[]).filter(service=>
    !['finalizado','cancelado'].includes(service.estado)
  );
  const upcomingServices = activeServices
    .filter(service=>!service.fechaFin || service.fechaFin>=hoy)
    .sort((a,b)=>String(a.fechaInicio||'9999-12-31').localeCompare(String(b.fechaInicio||'9999-12-31')))
    .slice(0,8);

  const upcomingServicesHtml = upcomingServices.length
    ? upcomingServices.map(service=>{
        const status = SERVICE_STATUS[service.estado] || SERVICE_STATUS.borrador;
        return '<div class="alert-row">'+
          '<span class="chip '+status.cls+'">'+status.label+'</span>'+
          '<div style="flex:1"><b>'+escHtml(service.nombre)+'</b> '+
            '<span style="color:var(--sub)">— '+escHtml(service.faena||'Sin faena')+
            ' · '+serviceCoverage(service).confirmed+'/'+serviceCoverage(service).required+' confirmados</span></div>'+
          '<div class="mono" style="color:var(--sub)">'+escHtml(service.fechaInicio||'')+'</div>'+
          '<button class="link-btn" data-action="open-service" data-id="'+service.id+'">Ver →</button>'+
        '</div>';
      }).join('')
    : '<div class="empty">No hay servicios activos registrados.</div>';

  const alerts = [];
  state.workers.forEach(w=>{
    (w.examenes||[]).forEach(e=>{
      const st = examStatus(e.vencimiento);
      if(st.status==='vencido' || st.status==='por-vencer'){
        alerts.push({worker:w, label:e.tipo, venc:e.vencimiento, st});
      }
    });
    (w.certificaciones||[]).forEach(c=>{
      const st = examStatus(c.vencimiento);
      if(c.vencimiento && (st.status==='vencido' || st.status==='por-vencer')){
        alerts.push({worker:w, label:'Certificación '+c.equipo, venc:c.vencimiento, st});
      }
    });
    (w.acreditaciones||[]).forEach(a=>{
      if(a.estado==='Acreditado' && a.vencimiento){
        const st = examStatus(a.vencimiento);
        if(st.status==='vencido' || st.status==='por-vencer'){
          alerts.push({worker:w, label:'Acreditación '+a.faena, venc:a.vencimiento, st});
        }
      }
    });
  });
  alerts.sort((a,b)=> (a.st.diff??-9999) - (b.st.diff??-9999));

  const alertsHtml = alerts.length ? alerts.slice(0,12).map(a=>
    '<div class="alert-row"><span class="chip '+a.st.cls+'">'+a.st.label+'</span>'+
    '<div style="flex:1"><b>'+escHtml(a.worker.nombre)+'</b> <span style="color:var(--sub)">— '+escHtml(a.label)+'</span></div>'+
    '<div class="mono" style="color:var(--sub)">'+(a.venc ? 'vence '+a.venc : '')+'</div>'+
    '<button class="link-btn" data-action="open-worker" data-id="'+a.worker.id+'">Ver ficha →</button></div>'
  ).join('') : '<div class="empty">No hay exámenes ni certificaciones vencidas o por vencer. Todo al día ✓</div>';

  const faenaCounts = state.faenas.map(f=>{
    const n = state.workers.filter(w=>(w.acreditaciones||[]).some(a=>a.faena===f && a.estado==='Acreditado')).length;
    return {faena:f, n};
  });

  const pendingCalls = (state.llamados||[]).filter(l=>l.resultado==='pendiente'||l.resultado==='no_contesta')
    .map(l=>Object.assign({}, l, {w: state.workers.find(x=>x.id===l.workerId)}))
    .filter(l=>l.w)
    .sort((a,b)=> (a.fecha||'').localeCompare(b.fecha||''));

  const pendingCallsHtml = pendingCalls.length ? pendingCalls.slice(0,8).map(l=>{
    const st = LLAMADA_STATUS[l.resultado] || LLAMADA_STATUS.pendiente;
    return '<div class="alert-row"><span class="chip '+st.cls+'">'+st.label+'</span>'+
      '<div style="flex:1"><b>'+escHtml(l.w.nombre)+'</b> <span style="color:var(--sub)">'+(l.nota?'— '+escHtml(l.nota):'')+'</span></div>'+
      '<div class="mono" style="color:var(--sub)">'+(l.fecha||'')+'</div>'+
      '<button class="link-btn" data-action="open-llamada" data-id="'+l.id+'">Ver →</button></div>';
  }).join('') : '<div class="empty">No hay llamados pendientes. Todo al día ✓</div>';

  const pendingTicketsList = (state.pasajes||[]).filter(p=>p.estado==='pendiente'||p.estado==='solicitado')
    .map(p=>Object.assign({}, p, {w: state.workers.find(x=>x.id===p.workerId)}))
    .filter(p=>p.w)
    .sort((a,b)=> (a.fechaViaje||'').localeCompare(b.fechaViaje||''));

  const pendingTicketsHtml = pendingTicketsList.length ? pendingTicketsList.slice(0,8).map(p=>{
    const st = PASAJE_STATUS[p.estado] || PASAJE_STATUS.pendiente;
    const tramo = (p.origen||'—')+' → '+(p.destino||'—');
    return '<div class="alert-row"><span class="chip '+st.cls+'">'+st.label+'</span>'+
      '<div style="flex:1"><b>'+escHtml(p.w.nombre)+'</b> <span style="color:var(--sub)">— '+escHtml(tramo)+'</span></div>'+
      '<div class="mono" style="color:var(--sub)">'+(p.fechaViaje||'')+'</div>'+
      '<button class="link-btn" data-action="open-pasaje" data-id="'+p.id+'">Ver →</button></div>';
  }).join('') : '<div class="empty">No hay pasajes pendientes. Todo al día ✓</div>';

  return '<div class="kpi-row">'+
      '<div class="kpi"><div class="num">'+total+'</div><div class="lbl">Trabajadores</div></div>'+
      '<div class="kpi"><div class="num">'+enFaenaHoy+'</div><div class="lbl">En faena hoy</div></div>'+
      '<div class="kpi warn"><div class="num">'+porVencer+'</div><div class="lbl">Exámenes por vencer</div></div>'+
      '<div class="kpi bad"><div class="num">'+vencidos+'</div><div class="lbl">Trabajadores con examen vencido</div></div>'+
    '</div>'+
    '<div class="kpi-row">'+
      '<div class="kpi '+(acredProblema?'warn':'')+'"><div class="num">'+acredProblema+'</div><div class="lbl">Acreditaciones por vencer/vencidas</div></div>'+
      '<div class="kpi"><div class="num">'+heMes+'</div><div class="lbl">Días de hora extra este mes</div></div>'+
      '<div class="kpi '+(pasajesUrgentes?'bad':'')+'"><div class="num">'+pasajesUrgentes+'</div><div class="lbl">Pasajes sin emitir (próx. 7 días)</div></div>'+
      '<div class="kpi '+(sinExamenes?'warn':'')+'"><div class="num">'+(tasaConfirmacion!==null ? tasaConfirmacion+'%' : '—')+'</div><div class="lbl">Tasa confirmación llamados'+(sinExamenes?(' · '+sinExamenes+' sin exámenes'):'')+'</div></div>'+
    '</div>'+
    '<div class="panel"><div class="panel-head"><h2>Próximos servicios</h2><div style="display:flex;gap:12px;"><button class="link-btn" data-action="new-service">+ Nuevo servicio</button><button class="link-btn" data-action="goto-services">Ver todos →</button></div></div><div class="panel-body">'+upcomingServicesHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Alertas de documentación</h2></div><div class="panel-body">'+alertsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Llamados pendientes</h2><button class="link-btn" data-action="new-llamada">+ Registrar llamado</button></div><div class="panel-body">'+pendingCallsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Pasajes pendientes</h2><button class="link-btn" data-action="new-pasaje">+ Registrar pasaje</button></div><div class="panel-body">'+pendingTicketsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Acreditados por faena</h2></div>'+
      '<div class="panel-body" style="padding:16px 18px;display:flex;gap:24px;flex-wrap:wrap;">'+
        faenaCounts.map(f=>
          '<div style="min-width:120px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'+
          '<span class="sticker" style="background:'+faenaColor(f.faena)+'"></span>'+
          '<span style="font-weight:600;font-size:13px;">'+escHtml(f.faena)+'</span></div>'+
          '<div class="disp" style="font-size:24px;color:var(--steel);">'+f.n+'</div></div>'
        ).join('')+
      '</div></div>';
}

/* ============================= VIEW: TRABAJADORES ============================= */
function filteredWorkers(){
  const q = (state.ui.search||'').toLowerCase();
  const cargoFilter = state.ui.cargoFilter || 'all';
  let list = state.workers.filter(w=>
    !q ||
    (w.nombre||'').toLowerCase().includes(q) ||
    (w.rut||'').toLowerCase().includes(q) ||
    (w.cargo||'').toLowerCase().includes(q)
  );
  if(cargoFilter!=='all') list = list.filter(w=>w.cargo===cargoFilter);
  return list;
}

function workerCardHtml(w){
  const worst = workerWorstExam(w);
  const dotColor = worst==='bad'?'var(--bad)':worst==='warn'?'var(--amber)':worst==='sin-dato'?'#c7cac2':'var(--good)';
  const stickers = (w.acreditaciones||[])
    .filter(a=>a.estado==='Acreditado')
    .map(a=>'<span class="sticker" style="background:'+faenaColor(a.faena)+'" title="'+escAttr(a.faena)+'"></span>')
    .join('');

  const selected = workerDeleteSelected.has(w.id);
  const action = workerDeleteMode ? 'toggle-worker-delete' : 'open-worker';
  const workerCargoColor = cargoColor(w.cargo);

  return '<div class="wcard '+(workerDeleteMode?'bulk-mode ':'')+(selected?'bulk-selected':'')+'" style="border-left:5px solid '+workerCargoColor+';" data-action="'+action+'" data-id="'+w.id+'">'+
    (workerDeleteMode
      ? '<input class="worker-select-box" type="checkbox" '+(selected?'checked':'')+' tabindex="-1" aria-label="Seleccionar '+escAttr(w.nombre)+'">'
      : '')+
    '<div class="wcard-top"><div><div class="name">'+escHtml(w.nombre)+
      (w.esEjemplo ? ' <span class="example-chip">Ejemplo</span>' : '')+
    '</div><div class="cargo"><span class="cargo-card-badge" style="background:'+workerCargoColor+';color:'+cargoTextColor(workerCargoColor)+'">'+escHtml(w.cargo||'Sin cargo')+'</span></div></div>'+
    '<span class="status-dot" style="background:'+dotColor+'" title="Estado de documentos"></span></div>'+
    '<div class="rut mono">'+escHtml(w.rut||'Sin RUT')+'</div>'+
    '<div class="sticker-row">'+(stickers || '<span class="sticker-empty">Sin acreditaciones</span>')+'</div></div>';
}

function workerBulkToolbar(list){
  if(!workerDeleteMode) return '';

  const visibleIds = new Set(list.map(w=>w.id));
  const selectedVisible = list.filter(w=>workerDeleteSelected.has(w.id)).length;
  const allVisibleSelected = list.length>0 && selectedVisible===list.length;

  return '<div class="worker-bulk-bar">'+
    '<span class="worker-bulk-count">'+workerDeleteSelected.size+' seleccionado'+(workerDeleteSelected.size===1?'':'s')+'</span>'+
    '<button class="btn btn-ghost" data-action="select-visible-workers">'+
      (allVisibleSelected ? 'Desmarcar resultados' : 'Seleccionar resultados')+
    '</button>'+
    '<button class="btn btn-ghost" data-action="clear-worker-selection" '+(!workerDeleteSelected.size?'disabled':'')+'>Limpiar selección</button>'+
    '<button class="btn btn-danger-solid" data-action="delete-selected-workers" '+(!workerDeleteSelected.size?'disabled':'')+'>'+
      'Eliminar seleccionados'+
    '</button>'+
    '<div class="bulk-delete-help">Puedes buscar o filtrar por cargo y luego seleccionar únicamente los resultados visibles.</div>'+
  '</div>';
}

function viewTrabajadores(){
  const list = filteredWorkers();
  const cargoFilter = state.ui.cargoFilter || 'all';
  const toolbar = workerBulkToolbar(list);

  if(!list.length){
    return toolbar+
      '<div class="empty panel" style="padding:40px;">No hay trabajadores que coincidan. '+
      (!workerDeleteMode
        ? '<button class="btn btn-accent" style="margin-top:10px" data-action="new-worker">+ Agregar trabajador</button>'
        : '')+
      '</div>';
  }

  if(cargoFilter!=='all'){
    return toolbar+'<div class="card-grid">'+list.map(workerCardHtml).join('')+'</div>';
  }

  const groupOrder = [...state.cargos];
  const grouped = {};
  list.forEach(w=>{
    const key = w.cargo && groupOrder.includes(w.cargo)
      ? w.cargo
      : (w.cargo || 'Sin cargo asignado');
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(w);
  });

  const orderedKeys = [
    ...groupOrder.filter(c=>grouped[c]),
    ...Object.keys(grouped).filter(k=>!groupOrder.includes(k))
  ];

  return toolbar+orderedKeys.map(key=>
    '<div style="margin-bottom:22px;">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'+
        '<h2 style="font-size:15px;color:var(--steel);margin:0;font-weight:700;">'+escHtml(key)+'</h2>'+
        '<span class="nav-count" style="background:var(--grey-bg);color:var(--sub);">'+grouped[key].length+'</span>'+
      '</div>'+
      '<div class="card-grid">'+grouped[key].map(workerCardHtml).join('')+'</div>'+
    '</div>'
  ).join('');
}

async function removeWorkerDocuments(workerIds){
  try{
    const result = await window.storage.list('doc__', true);
    const keys = (result && result.keys) || [];
    const prefixes = workerIds.map(id=>'doc__'+id+'__');
    const toDelete = keys.filter(key=>prefixes.some(prefix=>key.startsWith(prefix)));
    await Promise.all(toDelete.map(async key=>{
      // La ruta de Storage es determinística a partir de la misma clave
      // (ver examDocStoragePath y afines), así que se intenta borrar ahí
      // también sin necesidad de leer el valor primero. Si el documento
      // era del formato viejo (Base64 en RTDB, sin objeto en Storage), el
      // borrado en Storage simplemente no encuentra nada y se ignora
      // (ver deleteWorkerDocument).
      try{ await window.amecoAccessApi.deleteWorkerDocument('workerDocuments/'+key); }catch(e){ /* puede no existir */ }
      await window.storage.delete(key, true);
    }));
  }catch(error){
    console.warn('No fue posible limpiar todos los archivos asociados.', error);
  }
}

async function deleteWorkersInBulk(){
  const ids = Array.from(workerDeleteSelected);
  if(!ids.length){
    alert('Selecciona al menos un trabajador.');
    return;
  }

  const selectedWorkers = state.workers.filter(w=>workerDeleteSelected.has(w.id));
  const preview = selectedWorkers.slice(0,5).map(w=>'• '+w.nombre).join('\n');
  const extra = selectedWorkers.length>5
    ? '\n• y '+(selectedWorkers.length-5)+' trabajador(es) más'
    : '';

  const accepted = confirm(
    '¿Eliminar '+selectedWorkers.length+' trabajador(es)?\n\n'+
    preview+extra+
    '\n\nTambién se eliminarán sus llamados, pasajes, asignaciones a servicios y archivos asociados. Esta acción no se puede deshacer.'
  );
  if(!accepted) return;

  try{
    await Promise.all(ids.map(id=>window.amecoAccessApi.deleteWorkerNode(id)));
  }catch(error){
    console.warn('No se pudo eliminar uno o más trabajadores en amecoSpotPlanner/workers.',error);
    alert('No tienes permiso para eliminar trabajadores. Esta acción está reservada al rol Administrador.');
    return;
  }

  state.workers = state.workers.filter(w=>!workerDeleteSelected.has(w.id));
  state.llamados = (state.llamados||[]).filter(item=>!workerDeleteSelected.has(item.workerId));
  state.pasajes = (state.pasajes||[]).filter(item=>!workerDeleteSelected.has(item.workerId));
  (state.servicios||[]).forEach(service=>{
    service.asignaciones = serviceAssignments(service).filter(
      assignment=>!workerDeleteSelected.has(assignment.workerId)
    );
  });

  await removeWorkerDocuments(ids);
  await persistNow();

  await recordAudit(
    'WORKERS_BULK_DELETED',
    'worker',
    ids.join(','),
    'Se eliminaron '+selectedWorkers.length+' trabajadores.',
    {
      workers:selectedWorkers.map(worker=>({
        id:worker.id,
        nombre:worker.nombre,
        rut:worker.rut
      }))
    }
  );

  workerDeleteSelected.clear();
  workerDeleteMode = false;
  render();

  alert(selectedWorkers.length+' trabajador(es) eliminado(s) correctamente.');
}

const SERVICE_STATUS = {
  borrador: {label:'Borrador', cls:'grey'},
  planificando: {label:'Planificando', cls:'warn'},
  contactando: {label:'Contactando personal', cls:'warn'},
  acreditando: {label:'Acreditando', cls:'warn'},
  listo: {label:'Listo', cls:'good'},
  en_ejecucion: {label:'En ejecución', cls:'good'},
  finalizado: {label:'Finalizado', cls:'grey'},
  cancelado: {label:'Cancelado', cls:'bad'}
};

const SERVICE_SHIFT = {
  dia: 'Día',
  noche: 'Noche',
  mixto: 'Mixto / por definir'
};


const ASSIGNMENT_STATUS = {
  propuesto: {label:'Propuesto', cls:'grey'},
  por_contactar: {label:'Por contactar', cls:'warn'},
  sin_respuesta: {label:'Sin respuesta', cls:'warn'},
  confirmado: {label:'Confirmado', cls:'good'},
  rechazado: {label:'Rechazó', cls:'bad'},
  reemplazado: {label:'Reemplazado', cls:'grey'},
  acreditacion_pendiente: {label:'Acreditación pendiente', cls:'warn'},
  listo: {label:'Listo', cls:'good'}
};

const ASSIGNMENT_ACTIVE_STATUS = [
  'propuesto',
  'por_contactar',
  'sin_respuesta',
  'confirmado',
  'acreditacion_pendiente',
  'listo'
];

const ASSIGNMENT_COVERAGE_STATUS = ['confirmado','listo'];

function assignmentIsActive(assignment){
  return ASSIGNMENT_ACTIVE_STATUS.includes(assignment.estado);
}

function assignmentCoversRequirement(assignment){
  return ASSIGNMENT_COVERAGE_STATUS.includes(assignment.estado);
}

function serviceAssignments(service){
  return Array.isArray(service.asignaciones) ? service.asignaciones : [];
}

function requirementAssignments(service, requirementId, activeOnly=false){
  return serviceAssignments(service).filter(assignment=>
    assignment.requisitoId===requirementId &&
    (!activeOnly || assignmentIsActive(assignment))
  );
}

function requirementCoverage(service, requirement){
  const all = requirementAssignments(service, requirement.id, false);
  const active = all.filter(assignmentIsActive);
  const confirmed = all.filter(assignmentCoversRequirement);
  const required = Math.max(0,Number(requirement.cantidad)||0);

  return {
    required,
    assigned: active.length,
    confirmed: confirmed.length,
    remaining: Math.max(0,required-confirmed.length),
    complete: required>0 && confirmed.length>=required
  };
}

function serviceCoverage(service){
  const requirements = service.requerimientos || [];
  const required = requirements.reduce(
    (sum,requirement)=>sum+Math.max(0,Number(requirement.cantidad)||0),
    0
  );
  const confirmed = requirements.reduce(
    (sum,requirement)=>sum+requirementCoverage(service,requirement).confirmed,
    0
  );
  const assigned = serviceAssignments(service).filter(assignmentIsActive).length;
  const percent = required ? Math.min(100,Math.round(confirmed/required*100)) : 0;

  return {
    required,
    confirmed,
    assigned,
    remaining: Math.max(0,required-confirmed),
    percent,
    complete: required>0 && confirmed>=required
  };
}

function workerMatchesCargo(worker, cargo){
  const target = String(cargo||'').trim().toLowerCase();
  if(!target) return false;

  const workerCargos = [
    worker.cargo,
    ...(Array.isArray(worker.cargosAdicionales) ? worker.cargosAdicionales : [])
  ].map(value=>String(value||'').trim().toLowerCase());

  return workerCargos.includes(target);
}

function serviceDatesOverlap(first, second){
  if(!first?.fechaInicio || !first?.fechaFin || !second?.fechaInicio || !second?.fechaFin){
    return false;
  }
  return first.fechaInicio<=second.fechaFin && second.fechaInicio<=first.fechaFin;
}

function workerServiceConflicts(workerId, currentService){
  return (state.servicios||[]).filter(service=>{
    if(service.id===currentService.id) return false;
    if(['finalizado','cancelado'].includes(service.estado)) return false;
    if(!serviceDatesOverlap(service,currentService)) return false;

    return serviceAssignments(service).some(assignment=>
      assignment.workerId===workerId && assignmentIsActive(assignment)
    );
  });
}

function serviceDateRange(service){
  const start = parseDate(service.fechaInicio);
  const end = parseDate(service.fechaFin);
  if(!start || !end || end<start) return [];

  const dates = [];
  let cursor = new Date(start);
  let guard = 0;

  while(cursor<=end && guard<370){
    dates.push(fmt(cursor));
    cursor = addDays(cursor,1);
    guard++;
  }

  return dates;
}

function workerShiftAssessment(worker, service){
  const dates = serviceDateRange(service);
  if(!dates.length){
    return {level:'grey',label:'Turno sin evaluar',detail:'Fechas incompletas'};
  }

  const counts = {
    trabajo:0,
    descanso:0,
    extra:0,
    permiso:0
  };

  dates.forEach(date=>{
    const info = dayStatus(worker,date);
    if(counts[info.tipo]!==undefined) counts[info.tipo]++;
  });

  if(counts.permiso>0){
    return {
      level:'bad',
      label:'Permiso o licencia',
      detail:counts.permiso+' día'+(counts.permiso===1?'':'s')+' con permiso'
    };
  }

  if(counts.descanso===dates.length){
    return {
      level:'warn',
      label:'En descanso',
      detail:'Disponible solo como hora extra'
    };
  }

  if((counts.trabajo+counts.extra)===dates.length){
    return {
      level:'good',
      label:counts.extra ? 'Turno / hora extra' : 'En turno',
      detail:counts.extra ? counts.extra+' día(s) de hora extra' : 'Disponible según ciclo'
    };
  }

  return {
    level:'warn',
    label:'Turno mixto',
    detail:counts.trabajo+' trabajo · '+counts.descanso+' descanso · '+counts.extra+' HE'
  };
}

function workerAccreditationAssessment(worker, service){
  const accreditation = (worker.acreditaciones||[]).find(item=>
    String(item.faena||'').trim().toLowerCase()===
    String(service.faena||'').trim().toLowerCase()
  );

  if(!accreditation){
    return {
      level:'bad',
      label:'Sin acreditación',
      detail:'No registra acreditación en '+(service.faena||'la faena')
    };
  }

  if(accreditation.estado!=='Acreditado'){
    return {
      level:'warn',
      label:accreditation.estado||'No acreditado',
      detail:'Acreditación no aprobada'
    };
  }

  if(!accreditation.vencimiento){
    return {
      level:'good',
      label:'Acreditado',
      detail:'Sin vencimiento registrado'
    };
  }

  if(service.fechaInicio && accreditation.vencimiento<service.fechaInicio){
    return {
      level:'bad',
      label:'Acreditación vencida',
      detail:'Venció '+accreditation.vencimiento
    };
  }

  if(service.fechaFin && accreditation.vencimiento<service.fechaFin){
    return {
      level:'bad',
      label:'Vence durante servicio',
      detail:'Vence '+accreditation.vencimiento
    };
  }

  const serviceEnd = parseDate(service.fechaFin);
  const expiry = parseDate(accreditation.vencimiento);
  if(serviceEnd && expiry && daysBetween(serviceEnd,expiry)<=30){
    return {
      level:'warn',
      label:'Acreditación por vencer',
      detail:'Vence '+accreditation.vencimiento
    };
  }

  return {
    level:'good',
    label:'Acreditado',
    detail:'Vigente hasta '+accreditation.vencimiento
  };
}

function workerExamAssessment(worker){
  const worst = workerWorstExam(worker);

  if(worst==='bad'){
    return {
      level:'bad',
      label:'Examen vencido',
      detail:'Tiene documentación médica vencida'
    };
  }

  if(worst==='warn'){
    return {
      level:'warn',
      label:'Examen por vencer',
      detail:'Revisar vencimientos próximos'
    };
  }

  if(worst==='sin-dato'){
    return {
      level:'warn',
      label:'Exámenes incompletos',
      detail:'Faltan fechas o registros'
    };
  }

  return {
    level:'good',
    label:'Exámenes vigentes',
    detail:'Sin alertas críticas'
  };
}

function workerAlreadyAssignedToService(workerId, service){
  return serviceAssignments(service).some(assignment=>
    assignment.workerId===workerId && assignmentIsActive(assignment)
  );
}

function candidateAssessment(worker, service, requirement){
  const cargoMatch = workerMatchesCargo(worker,requirement.cargo);
  const shift = workerShiftAssessment(worker,service);
  const accreditation = workerAccreditationAssessment(worker,service);
  const exams = workerExamAssessment(worker);
  const conflicts = workerServiceConflicts(worker.id,service);
  const alreadyAssigned = workerAlreadyAssignedToService(worker.id,service);

  let score = 0;
  if(cargoMatch) score += 45;
  if(!conflicts.length) score += 20;
  if(shift.level==='good') score += 15;
  else if(shift.level==='warn') score += 5;
  if(accreditation.level==='good') score += 15;
  else if(accreditation.level==='warn') score += 5;
  if(exams.level==='good') score += 5;

  const warnings = [];
  if(!cargoMatch) warnings.push('El cargo no coincide con el requisito');
  if(conflicts.length) warnings.push('Tiene cruce con '+conflicts.length+' servicio(s)');
  if(shift.level==='bad') warnings.push(shift.label);
  else if(shift.level==='warn') warnings.push(shift.label);
  if(accreditation.level!=='good') warnings.push(accreditation.label);
  if(exams.level!=='good') warnings.push(exams.label);

  return {
    cargoMatch,
    shift,
    accreditation,
    exams,
    conflicts,
    alreadyAssigned,
    score,
    warnings,
    recommended:
      cargoMatch &&
      !conflicts.length &&
      shift.level!=='bad' &&
      accreditation.level!=='bad' &&
      exams.level!=='bad'
  };
}

function assignmentWorker(assignment){
  return state.workers.find(worker=>worker.id===assignment.workerId);
}

function assignmentWarningChips(worker,service,requirement){
  const assessment = candidateAssessment(worker,service,requirement);
  const chips = [];

  chips.push(
    '<span class="assignment-mini '+(assessment.cargoMatch?'good':'bad')+'">'+
      (assessment.cargoMatch?'Cargo compatible':'Cargo distinto')+
    '</span>'
  );

  chips.push(
    '<span class="assignment-mini '+assessment.shift.level+'">'+
      escHtml(assessment.shift.label)+
    '</span>'
  );

  chips.push(
    '<span class="assignment-mini '+assessment.accreditation.level+'">'+
      escHtml(assessment.accreditation.label)+
    '</span>'
  );

  chips.push(
    '<span class="assignment-mini '+assessment.exams.level+'">'+
      escHtml(assessment.exams.label)+
    '</span>'
  );

  if(assessment.conflicts.length){
    chips.push(
      '<span class="assignment-mini bad">'+assessment.conflicts.length+' cruce(s)</span>'
    );
  }

function workerConflictsOnDate(workerId,currentService,dateStr){
  return (state.servicios||[]).filter(service=>{
    if(service.id===currentService.id) return false;
    if(['finalizado','cancelado'].includes(service.estado)) return false;
    if(!service.fechaInicio || !service.fechaFin) return false;
    if(dateStr<service.fechaInicio || dateStr>service.fechaFin) return false;

    return serviceAssignments(service).some(assignment=>
      assignment.workerId===workerId && assignmentIsActive(assignment)
    );
  });
}

function timelineStatusLabel(info){
  if(info.faena) return info.faena;
  if(info.tipo==='trabajo') return 'Trabajo';
  if(info.tipo==='descanso') return 'Descanso';
  if(info.tipo==='extra') return 'Hora extra';
  if(info.tipo==='permiso') return 'Permiso / licencia';
  return 'Sin información';
}

function timelineStatusCode(info){
  if(info.faena) return faenaAbbrev(info.faena);
  if(info.tipo==='trabajo') return 'T';
  if(info.tipo==='descanso') return 'D';
  if(info.tipo==='extra') return 'HE';
  if(info.tipo==='permiso') return 'P';
  return '—';
}

function timelineDateText(dateStr){
  const date = parseDate(dateStr);
  if(!date) return dateStr;

  const weekdays = ['D','L','M','X','J','V','S'];
  const months = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

  return {
    weekday: weekdays[date.getDay()],
    day: String(date.getDate()).padStart(2,'0'),
    month: months[date.getMonth()]
  };
}

function workerServiceTimelineHtml(worker,service){
  const dates = serviceDateRange(service);
  if(!dates.length){
    return '<div class="candidate-timeline-empty">No hay fechas válidas para mostrar la línea de tiempo.</div>';
  }

  const startLabel = dates[0].split('-').reverse().join('/');
  const endLabel = dates[dates.length-1].split('-').reverse().join('/');

  const cells = dates.map(dateStr=>{
    const info = dayStatus(worker,dateStr);
    const dateText = timelineDateText(dateStr);
    const conflicts = workerConflictsOnDate(worker.id,service,dateStr);
    const code = timelineStatusCode(info);
    const label = timelineStatusLabel(info);
    const notes = [];

    notes.push(dateStr+' — '+label);
    if(info.faena) notes.push('Faena: '+info.faena);
    if(info.nota) notes.push('Nota: '+info.nota);
    if(conflicts.length){
      notes.push('Cruce con servicio: '+conflicts.map(item=>item.nombre).join(', '));
    }

    const inlineStyle = info.faena
      ? ' style="background:'+faenaColor(info.faena)+';"'
      : '';

    const classes = [
      'candidate-day',
      'st-'+info.tipo,
      info.tipo==='extra' ? 'ring-extra' : '',
      info.tipo==='permiso' ? 'ring-permiso' : '',
      conflicts.length ? 'has-conflict' : ''
    ].filter(Boolean).join(' ');

    return '<div class="'+classes+'"'+inlineStyle+' title="'+escAttr(notes.join(' · '))+'">'+
      '<span class="candidate-day-week">'+dateText.weekday+'</span>'+
      '<strong>'+dateText.day+'</strong>'+
      '<small>'+escHtml(code)+'</small>'+
      '<span class="candidate-day-month">'+dateText.month+'</span>'+
      (conflicts.length ? '<i>!</i>' : '')+
    '</div>';
  }).join('');

  const summary = dates.reduce((acc,dateStr)=>{
    const info = dayStatus(worker,dateStr);
    acc[info.tipo] = (acc[info.tipo]||0)+1;
    return acc;
  },{trabajo:0,descanso:0,extra:0,permiso:0});

  return '<div class="candidate-timeline">'+
    '<div class="candidate-timeline-head">'+
      '<div>'+
        '<strong>Línea de tiempo del servicio</strong>'+
        '<span>'+startLabel+' al '+endLabel+'</span>'+
      '</div>'+
      '<div class="candidate-timeline-summary">'+
        '<span>T '+summary.trabajo+'</span>'+
        '<span>D '+summary.descanso+'</span>'+
        '<span>HE '+summary.extra+'</span>'+
        '<span>P '+summary.permiso+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="candidate-timeline-scroll">'+
      '<div class="candidate-timeline-grid">'+cells+'</div>'+
    '</div>'+
  '</div>';
}

function assignmentCandidateListHtml(service,requirement){
  const query = String(state.ui.assignmentCandidateSearch||'').trim().toLowerCase();
  const filter = state.ui.assignmentCandidateFilter || 'recommended';

  let candidates = state.workers.map(worker=>({
    worker,
    assessment:candidateAssessment(worker,service,requirement)
  }));

  if(query){
    candidates = candidates.filter(item=>[
      item.worker.nombre,
      item.worker.rut,
      item.worker.cargo,
      item.worker.ciudad,
      item.worker.empresa
    ].some(value=>String(value||'').toLowerCase().includes(query)));
  }

  if(filter==='recommended'){
    candidates = candidates.filter(item=>item.assessment.recommended);
  }else if(filter==='compatible'){
    candidates = candidates.filter(item=>item.assessment.cargoMatch);
  }else if(filter==='available'){
    candidates = candidates.filter(item=>
      !item.assessment.conflicts.length &&
      item.assessment.shift.level!=='bad'
    );
  }

  candidates.sort((a,b)=>
    Number(b.assessment.recommended)-Number(a.assessment.recommended) ||
    b.assessment.score-a.assessment.score ||
    String(a.worker.nombre||'').localeCompare(String(b.worker.nombre||''),'es')
  );

  if(!candidates.length){
    return '<div class="empty candidate-empty">No hay trabajadores que coincidan. Prueba cambiando el filtro a “Todos”.</div>';
  }

  return candidates.map(item=>
    candidateCardHtml(item.worker,service,requirement)
  ).join('');
}

function servicePeopleTotal(service){
  return (service.requerimientos||[]).reduce(
    (sum,item)=>sum + Math.max(0,Number(item.cantidad)||0),
    0
  );
}

function serviceDuration(service){
  const start = parseDate(service.fechaInicio);
  const end = parseDate(service.fechaFin);
  if(!start || !end) return 0;
  return Math.max(1, daysBetween(start,end)+1);
}

function serviceRequirementSummary(service){
  return (service.requerimientos||[])
    .map(item=>item.cargo+' x'+item.cantidad)
    .join(', ');
}

function viewServicios(){
  const q = (state.ui.servicioSearch||'').trim().toLowerCase();
  const statusFilter = state.ui.servicioFilter || 'all';
  const siteFilter = state.ui.servicioFaenaFilter || 'all';

  let list = [...(state.servicios||[])];

  if(q){
    list = list.filter(service=>[
      service.nombre,
      service.cliente,
      service.faena,
      service.supervisor,
      serviceRequirementSummary(service)
    ].some(value=>String(value||'').toLowerCase().includes(q)));
  }

  if(statusFilter!=='all'){
    list = list.filter(service=>service.estado===statusFilter);
  }

  if(siteFilter!=='all'){
    list = list.filter(service=>service.faena===siteFilter);
  }

  list.sort((a,b)=>{
    const closedA = ['finalizado','cancelado'].includes(a.estado) ? 1 : 0;
    const closedB = ['finalizado','cancelado'].includes(b.estado) ? 1 : 0;
    return closedA-closedB ||
      String(a.fechaInicio||'9999-12-31').localeCompare(String(b.fechaInicio||'9999-12-31')) ||
      String(a.nombre||'').localeCompare(String(b.nombre||''),'es');

  const total = (state.servicios||[]).length;

  ).length;
  const ready = (state.servicios||[]).filter(service=>service.estado==='listo').length;

  const filters =

      '<div class="search-box service-search">'+

      '</div>'+

        ).join('')+
      '</select>'+
      '<select id="serviceSiteFilter">'+
        '<option value="all" '+(siteFilter==='all'?'selected':'')+'>Todas las faenas</option>'+
        state.faenas.map(faena=>
          '<option value="'+escAttr(faena)+'" '+(siteFilter===faena?'selected':'')+'>'+escHtml(faena)+'</option>'

/* ============================= VIEW: CONFIGURACIÓN ============================= */
function faenaUsage(faena){
  let acreditaciones = 0;
  let turnos = 0;

  state.workers.forEach(worker=>{
    acreditaciones += (worker.acreditaciones||[]).filter(item=>item.faena===faena).length;
    turnos += Object.values(worker.overrides||{}).filter(item=>item && item.faena===faena).length;
  });

  const pasajes = (state.pasajes||[]).filter(item=>item.faena===faena).length;
  const servicios = (state.servicios||[]).filter(item=>item.faena===faena).length;

  return {
    acreditaciones,
    turnos,
    pasajes,
    servicios,
    total: acreditaciones + turnos + pasajes + servicios
  };
}
