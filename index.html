/* ============================= VIEW: TURNOS ============================= */
function viewTurnos(){
  const y = state.ui.calYear;
  const m = state.ui.calMonth;
  const monthSpan = state.ui.turnoMonthSpan===1 ? 1 : 2;
  const size = state.ui.gridSize || 'compact';
  const nameWidth = clampTurnoNameWidth(state.ui.turnoNameWidth);
  const faenaFilter = state.ui.turnoFaenaFilter || null;
  const cargoFilter = state.ui.turnoCargoFilter || 'all';

  const months = [];
  const dates = [];

  for(let offset=0; offset<monthSpan; offset++){
    const monthDate = new Date(y,m+offset,1);
    const monthYear = monthDate.getFullYear();
    const monthIndex = monthDate.getMonth();
    const daysInMonth = new Date(monthYear,monthIndex+1,0).getDate();

    const monthInfo = {
      year:monthYear,
      month:monthIndex,
      days:daysInMonth,
      label:MESES[monthIndex]+' '+monthYear
    };
    months.push(monthInfo);

    for(let day=1; day<=daysInMonth; day++){
      dates.push({
        year:monthYear,
        month:monthIndex,
        day,
        dateStr:fmt(new Date(monthYear,monthIndex,day)),
        weekday:new Date(monthYear,monthIndex,day).getDay(),
        firstDay:day===1
      });
    }
  }

  const periodLabel = monthSpan===1
    ? months[0].label
    : months[0].year===months[1].year
      ? MESES[months[0].month]+' – '+MESES[months[1].month]+' '+months[0].year
      : months[0].label+' – '+months[1].label;

  const monthHeaderCells = months.map((monthInfo,index)=>
    '<th class="turno-month-group '+(index>0?'turno-month-separator':'')+'" colspan="'+monthInfo.days+'">'+
      escHtml(monthInfo.label)+
    '</th>'
  ).join('');

  const dayHeaderCells = dates.map(dateInfo=>
    '<th class="'+
      (dateInfo.weekday===0||dateInfo.weekday===6?'weekend-col ':'')+
      (dateInfo.firstDay && dateInfo.month!==months[0].month?'turno-month-separator':'')+
    '">'+
      dateInfo.day+
      '<br><span style="font-weight:400;">'+DIAS_CORTO[dateInfo.weekday]+'</span>'+
    '</th>'
  ).join('');

  let workersToShow = state.workers;

  if(cargoFilter !== 'all'){
    workersToShow = workersToShow.filter(worker=>worker.cargo===cargoFilter);
  }

  if(faenaFilter){
    workersToShow = workersToShow.filter(worker=>
      dates.some(dateInfo=>
        dayStatus(worker,dateInfo.dateStr).faena===faenaFilter
      )
    );
  }

  const rows = workersToShow.map(worker=>{
    const workerCargoColor = cargoColor(worker.cargo);

    const cells = dates.map(dateInfo=>{
      const info = dayStatus(worker,dateInfo.dateStr);
      let cls = 'daycell';
      let style = '';

      if(dateInfo.firstDay && dateInfo.month!==months[0].month){
        cls += ' turno-month-separator';
      }

      if(info.faena){
        style = 'background:'+faenaColor(info.faena)+';';
        if(info.tipo==='extra') cls += ' ring-extra';
        else if(info.tipo==='permiso') cls += ' ring-permiso';
      }else{
        cls += info.tipo==='trabajo'
          ? ' st-trabajo'
          : info.tipo==='extra'
            ? ' st-extra'
            : info.tipo==='permiso'
              ? ' st-permiso'
              : ' st-descanso';
      }

      const title =
        dateInfo.dateStr+
        ' — '+info.tipo+
        (info.faena ? ' · '+info.faena : '')+
        (info.nota ? ' · '+info.nota : '');

      let label = '';
      let labelStyle = '';

      if(info.faena){
        label = faenaAbbrev(info.faena);
      }else if(info.tipo==='trabajo'){
        label = 'T';
      }else if(info.tipo==='descanso'){
        label = 'D';
        labelStyle = 'color:#5b5f57;text-shadow:none;';
      }else if(info.tipo==='extra'){
        label = 'HE';
      }else if(info.tipo==='permiso'){
        label = 'P';
        labelStyle = 'color:#7a1f1f;text-shadow:none;';
      }

      const labelHtml = label
        ? '<span class="daycell-label" style="'+labelStyle+'">'+label+'</span>'
        : '';

      return '<td class="'+cls+'" style="'+style+'" title="'+escAttr(title)+'" data-action="edit-day" data-id="'+worker.id+'" data-date="'+dateInfo.dateStr+'">'+labelHtml+'</td>';
    }).join('');

    return '<tr>'+
      '<td class="namecell" style="border-left:5px solid '+workerCargoColor+';">'+
        escHtml(worker.nombre)+
        '<div style="font-weight:400;font-size:11px;color:var(--sub);">'+escHtml(worker.cargo||'')+'</div>'+
        '<button type="button" class="link-btn worker-link-btn" data-action="view-worker-month" data-id="'+worker.id+'">Ver mes ampliado →</button>'+
      '</td>'+
      cells+
    '</tr>';
  }).join('');

  const faenaLegend = state.faenas.map(faena=>{
    const active = faenaFilter===faena;

    return '<button type="button" class="fl-item fl-btn'+(active?' fl-active':'')+'" data-action="filter-turno-faena" data-faena="'+escAttr(faena)+'" title="Filtrar por '+escAttr(faena)+' en el período">'+
      '<span class="fl-sw" style="background:'+faenaColor(faena)+'"></span>'+
      escHtml(faena)+
    '</button>';
  }).join()+
  (faenaFilter
    ? '<button type="button" class="fl-item fl-clear" data-action="clear-turno-faena-filter">✕ Quitar filtro</button>'
    : '');

  const activeFilters = [];
  if(cargoFilter!=='all') activeFilters.push('cargo "'+cargoFilter+'"');
  if(faenaFilter) activeFilters.push('faena "'+faenaFilter+'"');

  const filterNotice = activeFilters.length
    ? '<div class="helptext turno-filter-notice">Mostrando '+workersToShow.length+' trabajador(es) por '+escHtml(activeFilters.join(' y '))+' entre '+escHtml(periodLabel)+'.</div>'
    : '';

  const cargoSelector =
    '<div class="turno-cargo-filter">'+
      '<label for="turnoCargoFilter">Filtrar por cargo</label>'+
      '<select id="turnoCargoFilter">'+
        '<option value="all" '+(cargoFilter==='all'?'selected':'')+'>Todos los cargos</option>'+
        state.cargos.map(cargo=>
          '<option value="'+escAttr(cargo)+'" '+(cargoFilter===cargo?'selected':'')+'>'+escHtml(cargo)+'</option>'
        ).join('')+
      '</select>'+
    '</div>';

  const navigationStepLabel = monthSpan===2 ? '2 meses' : 'mes';

  return '<div class="turno-filter-row">'+
      cargoSelector+
      (cargoFilter!=='all'
        ? '<button class="btn btn-ghost btn-sm" data-action="clear-turno-cargo-filter">✕ Quitar filtro de cargo</button>'
        : '')+
    '</div>'+
    '<div class="cal-toolbar turno-cal-toolbar">'+
      '<button class="btn btn-ghost btn-sm" data-action="cal-prev">← '+navigationStepLabel+' anteriores</button>'+
      '<div class="month-lbl turno-period-label">'+escHtml(periodLabel)+'</div>'+
      '<button class="btn btn-ghost btn-sm" data-action="cal-next">'+navigationStepLabel+' siguientes →</button>'+
      '<div class="turno-period-toggle">'+
        '<button type="button" class="'+(monthSpan===1?'active-size':'')+'" data-action="turno-month-span" data-span="1">1 mes</button>'+
        '<button type="button" class="'+(monthSpan===2?'active-size':'')+'" data-action="turno-month-span" data-span="2">2 meses</button>'+
      '</div>'+
      '<div class="turno-name-width-control" title="También puedes arrastrar el borde derecho de la columna Trabajador">'+
        '<span>Columna nombres</span>'+
        '<button type="button" data-action="turno-name-narrower" aria-label="Reducir columna">−</button>'+
        '<button type="button" data-action="turno-name-reset">Restablecer</button>'+
        '<button type="button" data-action="turno-name-wider" aria-label="Ampliar columna">+</button>'+
      '</div>'+
      '<div class="size-toggle">'+
        '<button type="button" class="'+(size==='compact'?'active-size':'')+'" data-action="grid-size" data-size="compact">Compacta</button>'+
        '<button type="button" class="'+(size==='comfortable'?'active-size':'')+'" data-action="grid-size" data-size="comfortable">Cómoda</button>'+
        '<button type="button" class="'+(size==='large'?'active-size':'')+'" data-action="grid-size" data-size="large">Grande</button>'+
      '</div>'+
      '<button class="btn btn-accent btn-sm" data-action="open-bulk">+ Editar varios días</button>'+
      '<button class="btn btn-ghost btn-sm" data-action="undo-last">↺ Deshacer (Ctrl+Z)</button>'+
    '</div>'+
    '<div class="legend turno-main-legend">'+
      '<span><span class="sw" style="background:#2f3944"></span>T = Trabajo</span>'+
      '<span><span class="sw" style="background:#e7e8e3;border:1px solid #ccc"></span>D = Descanso</span>'+
      '<span><span class="sw" style="background:#fff;box-shadow:inset 0 0 0 2px #999"></span>HE = hora extra</span>'+
      '<span><span class="sw" style="background:#fff;box-shadow:inset 0 0 0 2px var(--bad)"></span>P = permiso</span>'+
    '</div>'+
    '<div class="faena-legend">'+faenaLegend+'</div>'+
    filterNotice+
    '<div class="helptext">La tabla muestra '+monthSpan+' mes'+(monthSpan===1?'':'es')+' consecutivo'+(monthSpan===1?'':'s')+'. Desplázate horizontalmente para revisar todos los días. Haz clic en un día para editarlo o arrastra para copiar un estado. Puedes reducir la columna Trabajador con los botones o arrastrando su borde derecho, igual que en Excel. El cambio de período avanza o retrocede '+navigationStepLabel+'.</div>'+
    '<div class="table-wrap turno-two-month-wrap" style="max-height:74vh;">'+
      '<table class="grid-table turno-two-month-grid size-'+size+'" style="--turno-name-width:'+nameWidth+'px;">'+
        '<thead>'+
          '<tr>'+
            '<th class="namecell turno-worker-header" rowspan="2">'+
              '<div class="turno-worker-header-content">'+
                '<span>Trabajador</span>'+
                '<small id="turnoNameWidthValue">'+nameWidth+' px</small>'+
              '</div>'+
              '<span class="turno-name-resizer" data-role="turno-name-resizer" title="Arrastra para cambiar el ancho"></span>'+
            '</th>'+
            monthHeaderCells+
          '</tr>'+
          '<tr>'+dayHeaderCells+'</tr>'+
        '</thead>'+
        '<tbody>'+
          (rows ||
            '<tr><td class="namecell" style="color:var(--sub)">No hay trabajadores que coincidan con los filtros seleccionados</td>'+
            '<td colspan="'+dates.length+'"></td></tr>')+
        '</tbody>'+
      '</table>'+
    '</div>';
}

function analyzeImportRows(){
  if(!importState){
    return {
      valid:0,
      missingName:0,
      missingLastName:0,
      missingRut:0,
      rows:[]
    };
  }

  const mapping = importState.mapping || {};
  const result = {
    valid: 0,
    missingName: 0,
    missingLastName: 0,
    missingRut: 0,
    rows: []
  };

  importState.rows.forEach((row,index)=>{
    const get = (key)=>getImportValue(row,key,index);

    const nombre = get('nombre');
    const apellido = get('apellido');
    const rut = get('rut');
    const errors = [];

    if(!nombre){
      result.missingName++;
      errors.push('Sin nombre');
    }
    if(!apellido){
      result.missingLastName++;
      errors.push('Sin apellido');
    }
    if(!rut){
      result.missingRut++;
      errors.push('Sin RUT');
    }

    const valid = errors.length===0;
    if(valid) result.valid++;

    result.rows.push({
      index,
      nombre,
      apellido,
      rut,
      valid,
      errors
    });
  });

  return result;
}

function importModalHtml(){
  if(!importState){
    return '<div class="modal-overlay" data-action="close-modal-overlay"><div class="modal modal-sm">'+
      '<div class="modal-head"><h2>Importar desde Excel</h2><button class="modal-close" data-action="close-modal">✕</button></div>'+
      '<div class="modal-body">'+
        '<div class="helptext">Sube tu archivo Excel (.xlsx) o CSV. Para ingresar o actualizar un trabajador, cada fila debe contener obligatoriamente <b>Nombre, Apellido y RUT</b>. Las demás columnas son opcionales.</div>'+
        '<div class="field"><label>Archivo</label><input type="file" id="importFileInput" accept=".xlsx,.xls,.csv"></div>'+
      '</div>'+
      '<div class="modal-foot"><div></div><button class="btn btn-ghost" data-action="close-modal">Cancelar</button></div>'+
    '</div></div>';
  }

  const headers = importState.headers;
  const importAnalysis = analyzeImportRows();
  const selectedSheet = (importState.sheets||[]).find(sheet=>
    sheet.sheetIndex===importState.sheetIndex
  );
  const sheetSelector = (importState.sheets||[]).length>1
    ? '<div class="import-sheet-selector">'+
        '<div>'+
          '<label>Hoja del archivo</label>'+
          '<div class="helptext">Seleccionamos automáticamente la tabla más completa. Puedes cambiarla manualmente.</div>'+
        '</div>'+
        '<select id="importSheetSelect">'+
          importState.sheets.map(sheet=>
            '<option value="'+sheet.sheetIndex+'" '+(sheet.sheetIndex===importState.sheetIndex?'selected':'')+'>'+
              escHtml(sheet.sheetName)+' · '+sheet.validRows+' trabajadores detectados'+
            '</option>'
          ).join('')+
        '</select>'+
      '</div>'
    : '<div class="import-selected-sheet">Hoja detectada: <b>'+escHtml(importState.sheetName||'Hoja 1')+'</b></div>';
  const optionsBase = ['<option value="-1">No importar</option>'].concat(
    headers.map((h,i)=>'<option value="'+i+'">'+escHtml(h || ('Columna '+(i+1)))+'</option>')
  );
  const fieldRows = IMPORT_FIELDS.map(f=>{
    const selected = importState.mapping[f.key] ?? -1;
    const options = optionsBase.map(opt=>{
      const valMatch = opt.match(/value="(-?\d+)"/);
      const val = valMatch ? parseInt(valMatch[1]) : -1;
      return val===selected ? opt.replace('<option ', '<option selected ') : opt;
    }).join('');
    return '<div class="field-row" style="grid-template-columns:1fr 1fr;align-items:center;margin-bottom:8px;">'+
      '<div style="font-weight:600;font-size:13px;">'+f.label+(f.required?' *':'')+'</div>'+
      '<select class="import-map-select" data-field="'+f.key+'">'+options+'</select>'+
    '</div>';
  }).join('');

  const previewRows = importState.rows.slice(0,5).map((row,rowIndex)=>{
    const analyzed = importAnalysis.rows[rowIndex];
    return '<tr class="'+(analyzed && !analyzed.valid ? 'import-row-invalid' : '')+'">'+
      IMPORT_FIELDS.map(f=>{
        const idx = importState.mapping[f.key];
        const rawVal = (idx!=null && idx>=0) ? String(row[idx]??'').trim() : '';
        const val = getImportValue(row,f.key,rowIndex);
        const inheritedCargo = f.key==='cargo' && !rawVal && !!val;
        const requiredMissing = f.required && !String(val??'').trim();
        return '<td class="'+(requiredMissing?'import-required-missing':'')+'" style="font-size:12px;">'+
          escHtml(String(val))+
          (requiredMissing ? '<div class="import-cell-error">Obligatorio</div>' : '')+
          (inheritedCargo ? '<div class="import-cell-inherited">Cargo heredado</div>' : '')+
        '</td>';
      }).join('')+
      '<td style="font-size:12px;">'+
        (analyzed && analyzed.valid
          ? '<span class="chip good">Se importará</span>'
          : '<span class="chip bad">'+escHtml((analyzed&&analyzed.errors||[]).join(' / '))+'</span>')+
      '</td>'+
    '</tr>';
  }).join('');

  return '<div class="modal-overlay" data-action="close-modal-overlay"><div class="modal import-multiple-modal">'+
    '<div class="modal-head"><h2>Importar desde Excel</h2><button class="modal-close" data-action="close-modal">✕</button></div>'+
    '<div class="modal-body">'+
      sheetSelector+
      '<div class="helptext">Detectamos '+importAnalysis.valid+' trabajadores válidos en <b>'+escHtml(importState.sheetName||'la hoja seleccionada')+'</b>. Selecciona las columnas correspondientes. <b>Nombre, Apellido y RUT son obligatorios</b>.</div>'+
      '<div class="import-cargo-detection">'+
        '<strong>Cargo detectado:</strong> '+
        (importState.mapping.cargo>=0
          ? escHtml(importState.headers[importState.mapping.cargo]||'Columna de cargo')
          : '<span class="text-bad">No detectado; selecciónalo manualmente</span>')+
        (selectedSheet && selectedSheet.headerRowIndex>0
          ? '<span> · Encabezados encontrados en la fila '+(selectedSheet.headerRowIndex+1)+'</span>'
          : '')+
      '</div>'+
      '<div class="import-multiple-acred-help">'+
        '<strong>Acreditaciones múltiples:</strong> puedes cargar hasta cinco faenas por trabajador. '+
        'Cada grupo utiliza las columnas Faena, Estado y Vencimiento con el mismo número.'+
      '</div>'+
      fieldRows+
      '<div class="import-validation-summary">'+
        '<div class="import-stat valid"><strong>'+importAnalysis.valid+'</strong><span>Filas válidas</span></div>'+
        '<div class="import-stat invalid"><strong>'+(importState.rows.length-importAnalysis.valid)+'</strong><span>Filas omitidas</span></div>'+
        '<div class="import-stat"><strong>'+importAnalysis.missingName+'</strong><span>Sin nombre</span></div>'+
        '<div class="import-stat"><strong>'+importAnalysis.missingLastName+'</strong><span>Sin apellido</span></div>'+
        '<div class="import-stat"><strong>'+importAnalysis.missingRut+'</strong><span>Sin RUT</span></div>'+
      '</div>'+
      '<div class="section-title">Vista previa (primeras 5 filas)</div>'+
      '<div class="table-wrap"><table><thead><tr>'+IMPORT_FIELDS.map(f=>'<th>'+f.label+(f.required?' *':'')+'</th>').join('')+'<th>Resultado</th></tr></thead><tbody>'+previewRows+'</tbody></table></div>'+
      '<div class="helptext import-rule-note">Regla de importación: el trabajador debe tener <b>Nombre, Apellido y RUT</b>. La coincidencia se realiza únicamente mediante el RUT. Cuando el Excel trae un cargo o acreditaciones distintas, la ficha del trabajador se actualiza automáticamente.</div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" data-action="import-back">← Elegir otro archivo</button>'+
      '<div style="display:flex;gap:8px;"><button class="btn btn-ghost" data-action="close-modal">Cancelar</button><button class="btn btn-accent" data-action="import-confirm" '+(importAnalysis.valid===0?'disabled':'')+'>Importar '+importAnalysis.valid+' trabajador'+(importAnalysis.valid===1?'':'es')+'</button></div>'+
    '</div></div></div>';
}

function workerMonthModalHtml(){
  const modal = state.ui.modal;
  const w = state.workers.find(x=>x.id===modal.workerId);
  if(!w) return '';
  const y = modal.year, m = modal.month;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstWd = new Date(y, m, 1).getDay();
  const monthLabel = MESES[m] + ' ' + y;

  let cellsHtml = '';
  for(let i=0;i<firstWd;i++) cellsHtml += '<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = fmt(new Date(y,m,d));
    const info = dayStatus(w, dateStr);
    let cls = 'daycell daycell-lg';
    let style = '';
    if(info.faena){
      style = 'background:'+faenaColor(info.faena)+';';
      if(info.tipo==='extra') cls += ' ring-extra';
      else if(info.tipo==='permiso') cls += ' ring-permiso';
    } else {
      cls += info.tipo==='trabajo' ? ' st-trabajo' : info.tipo==='extra' ? ' st-extra' : info.tipo==='permiso' ? ' st-permiso' : ' st-descanso';
    }
    let big = '';
    if(info.faena) big = faenaAbbrev(info.faena);
    else if(info.tipo==='trabajo') big = 'T';
    else if(info.tipo==='descanso') big = 'D';
    else if(info.tipo==='extra') big = 'HE';
    else if(info.tipo==='permiso') big = 'P';
    const title = dateStr+' — '+info.tipo+(info.faena?(' · '+info.faena):'')+(info.nota?(' · '+info.nota):'');
    cellsHtml += '<div class="'+cls+'" style="'+style+'" data-action="edit-day" data-id="'+w.id+'" data-date="'+dateStr+'" title="'+escAttr(title)+'">'+

/* ============================= FILE INPUT CHANGE HANDLER ============================= */
document.addEventListener('change', async (e)=>{
  const input = e.target;

  if(input.id === 'restoreBackupInput'){
    if(!guardPermission('restore')){
      input.value = '';
      return;
    }
    const file = input.files&&input.files[0];
    if(!file) return;

    try{
      await restoreBackupFile(file);
    }catch(error){
      console.error(error);
      alert(error.message||'No fue posible restaurar el respaldo.');
    }finally{
      input.value = '';
    }
    return;
  }

  if(input.id === 'importFileInput'){
    if(!guardPermission('write')){
      input.value = '';
      return;
    }

    const file = input.files[0];
    if(!file) return;
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const sheets = wb.SheetNames.map((sheetName,sheetIndex)=>{
        const sheet = wb.Sheets[sheetName];
        const raw = XLSX.utils.sheet_to_json(sheet, {
          header:1,
          defval:'',
          raw:false
        });

        return buildImportSheetData(sheetName,raw,sheetIndex);
      }).filter(sheet=>sheet.rows.length);

      if(!sheets.length){
        alert('No se encontraron filas de datos en el archivo.');
        return;
      }

      sheets.sort((a,b)=>b.score-a.score);
      const bestSheet = sheets[0];

      importState = {
        fileName:file.name,
        sheets,
        sheetIndex:bestSheet.sheetIndex,
        sheetName:bestSheet.sheetName,
        headerRowIndex:bestSheet.headerRowIndex,
        headers:bestSheet.headers,
        rows:bestSheet.rows,
        mapping:{...bestSheet.mapping}
      };

      renderModal();
    }catch(err){
      console.error(err);
      alert('No se pudo leer el archivo. Verifica que sea un Excel (.xlsx) o CSV válido.');
    }
    return;
  }
  if(input.id === 'importSheetSelect'){
    applyImportSheet(parseInt(input.value));
    renderModal();
    return;
  }
  if(input.classList && input.classList.contains('import-map-select')){
    if(!importState) return;
    importState.mapping[input.dataset.field] = parseInt(input.value);
    renderModal();
    return;
  }
  if(input.classList && input.classList.contains('cargo-color-input')){
    if(!guardPermission('settings')) return;
    if(!state.cargoColores) state.cargoColores = {};
    state.cargoColores[input.dataset.cargo] = input.value;
    await persistNow();
    render();
    return;
  }
  if(input.classList && input.classList.contains('bulk-chk')){
    if(input.checked) bulkSelected.add(input.value); else bulkSelected.delete(input.value);
    updateBulkCount();
    return;
  }
  if(input.classList && (input.classList.contains('exam-file') || input.classList.contains('exam-extra-file'))){
    const file = input.files[0];
    if(!file) return;
    if(file.size > MAX_FILE_BYTES){
      alert('El archivo pesa demasiado (máx. 3.5 MB). Comprime el archivo o sube una foto en vez de un escaneo pesado.');
      input.value = '';
      return;
    }
    try{
      const base64 = await readFileAsBase64(file);
      input._pendingFile = {nombre: file.name, mime: file.type || 'application/octet-stream', data: base64};
      input._pendingRemove = false;
      const row = input.closest('.file-row');
      const label = row.querySelector('[data-role="filename"]');
      if(label) label.textContent = file.name + ' (se guardará al confirmar)';
    }catch(err){
      console.error(err);
      alert('No se pudo leer el archivo.');
    }
    return;
  }
  if(input.classList && input.classList.contains('cert-file-multi')){
    const files = Array.from(input.files || []);
    const block = input.closest('.cert-block');
    const chipList = block.querySelector('.file-chip-list');
    for(const file of files){
      if(file.size > MAX_FILE_BYTES){
        alert('El archivo "'+file.name+'" pesa demasiado (máx. 3.5 MB). Comprime el archivo o sube una foto en vez de un escaneo pesado.');
        continue;
      }
      try{
        const base64 = await readFileAsBase64(file);
        const tempId = uid('f');
        block._pendingFiles = block._pendingFiles || [];
        block._pendingFiles.push({id: tempId, nombre: file.name, mime: file.type || 'application/octet-stream', data: base64});
        const emptyMsg = chipList.querySelector('.file-name');
        if(emptyMsg) emptyMsg.remove();
        const chip = document.createElement('span');
        chip.className = 'file-chip';
        chip.dataset.pendingId = tempId;
        chip.innerHTML = '<span class="file-chip-name">'+escHtml(file.name)+' (nuevo)</span><button type="button" class="icon-btn" data-action="remove-pending-cert-file" data-certid="'+block.dataset.certId+'" data-tempid="'+tempId+'">✕</button>';
        chipList.appendChild(chip);
      }catch(err){
        console.error(err);
        alert('No se pudo leer el archivo "'+file.name+'".');
      }
    }
    input.value = '';
  }
});

    assignment.estado = target.value;

    service.updatedAt = Date.now();

    renderModal();

  if(target && target.classList.contains('assignment-note-input')){

    const service = state.servicios.find(item=>item.id===target.dataset.serviceId);
    const assignment = serviceAssignments(service).find(item=>item.id===target.dataset.assignmentId);
    if(!service || !assignment) return;

    assignment.nota = target.value.trim();
    assignment.updatedAt = Date.now();
    service.updatedAt = Date.now();

    await persistNow();
  }
});


let turnoNameResizeSession = null;

document.addEventListener('pointerdown',event=>{
  const handle = event.target.closest('[data-role="turno-name-resizer"]');
  if(!handle) return;

  event.preventDefault();
  event.stopPropagation();

  turnoNameResizeSession = {
    pointerId:event.pointerId,
    startX:event.clientX,
    startWidth:clampTurnoNameWidth(state.ui.turnoNameWidth)
  };

  try{ handle.setPointerCapture(event.pointerId); }catch(error){}
  document.body.classList.add('resizing-turno-name');
});

document.addEventListener('pointermove',event=>{
  if(!turnoNameResizeSession) return;
  if(
    turnoNameResizeSession.pointerId!==undefined &&
    event.pointerId!==turnoNameResizeSession.pointerId
  ){
    return;
  }

  const delta = event.clientX-turnoNameResizeSession.startX;
  setTurnoNameWidth(
    turnoNameResizeSession.startWidth+delta,
    false
  );
});

function finishTurnoNameResize(){
  if(!turnoNameResizeSession) return;
  turnoNameResizeSession = null;
  document.body.classList.remove('resizing-turno-name');
  saveUiPreferences();
}

document.addEventListener('pointerup',finishTurnoNameResize);
document.addEventListener('pointercancel',finishTurnoNameResize);

      state.ui.tab = navEl.dataset.nav;

      }
      render();
    }
    return;
  }
  const action = el.dataset.action;

  }

  if(action==='toggle-audit-expanded'){
    state.ui.accessAuditExpanded = !state.ui.accessAuditExpanded;

    return;
  }

  if(action==='turno-name-narrower'){
    setTurnoNameWidth(state.ui.turnoNameWidth-20);
    return;

  if(action==='turno-name-wider'){
    setTurnoNameWidth(state.ui.turnoNameWidth+20);
    return;
  }
  if(action==='turno-name-reset'){
    setTurnoNameWidth(190);
    return;
  }

  if(action==='open-add-access-user'){
    state.ui.modal = {type:'accessUser',uid:null};

    return;
  }

  if(action==='open-edit-access-user'){
    state.ui.modal = {type:'accessUser',uid:el.dataset.uid};
    renderModal();
    return;
  }

  if(action==='refresh-access-users'){
    await refreshAccessDirectory();

    return;
  }

  if(action==='save-access-user'){
    const uid = String(document.getElementById('access-user-uid')?.value||'').trim();
    const email = String(document.getElementById('access-user-email')?.value||'').trim();
    const displayName = String(document.getElementById('access-user-name')?.value||'').trim();
    const role = String(document.getElementById('access-user-role')?.value||'viewer');
    const active = String(document.getElementById('access-user-active')?.value||'true')==='true';
    const current = currentAccessProfile();
    const existing = (state.ui.accessUsers||[]).find(user=>user.uid===uid);
    const activeAdmins = (state.ui.accessUsers||[]).filter(
      user=>user.active && user.role==='admin'
    );

    if(!uid){
      alert('El UID de Firebase es obligatorio.');
      return;
    }
    if(!email || !email.includes('@')){
      alert('Ingresa el correo exacto utilizado en Firebase Authentication.');
      return;
    }
    if(
      existing &&
      existing.uid===current.uid &&
      existing.role==='admin' &&
      existing.active &&
      activeAdmins.length<=1 &&
      (!active || role!=='admin')
    ){
      alert('No puedes desactivar o quitar el rol al único Administrador activo.');
      return;
    }

    const saveButton = el;
    saveButton.disabled = true;
    saveButton.textContent = 'Guardando...';

    try{
      await window.amecoAccessApi.saveUserProfile({
        uid,
        email,
        displayName,
        role,
        active
      });

      state.ui.modal = null;
      await refreshAccessDirectory();
      render();

      alert('Perfil de acceso guardado correctamente.');
    }catch(error){
      console.error(error);
      alert(error.message||'No fue posible guardar el perfil de acceso.');
      saveButton.disabled = false;
      saveButton.textContent = 'Guardar acceso';
    }

    return;
  }

  if(action==='download-backup'){
    const originalText = el.innerHTML;
    el.disabled = true;
    el.innerHTML = '<strong>Preparando respaldo...</strong><small>Espera mientras se recopilan los archivos.</small>';

    try{
      const backupResult = await createAndDownloadBackup('manual');

      await recordAudit(
        'BACKUP_DOWNLOADED',
        'backup',
        backupResult.meta.filename,
        'Se descargó un respaldo completo.',
        {
          entryCount:backupResult.meta.entryCount,
          documentCount:backupResult.meta.documentCount,
          sizeBytes:backupResult.meta.sizeBytes
        }
      );

      state.ui.integrityReport = await runFullIntegrityAudit();
      render();
    }catch(error){
      console.error(error);
      alert('No fue posible crear el respaldo completo. Revisa tu conexión e inténtalo nuevamente.');
      el.disabled = false;
      el.innerHTML = originalText;
    }
    return;
  }

  if(action==='trigger-restore-backup'){
    document.getElementById('restoreBackupInput')?.click();
    return;
  }

  if(action==='run-integrity-audit'){
    el.disabled = true;
    const originalText = el.innerHTML;
    el.innerHTML = '<strong>Revisando...</strong><small>Analizando datos y archivos.</small>';

    try{
      await runFullIntegrityAudit();
      render();
    }catch(error){
      console.error(error);
      alert('No fue posible completar la revisión de integridad.');
      el.disabled = false;
      el.innerHTML = originalText;
    }
    return;
  }

  if(action==='download-integrity-report'){
    try{
      const report = await runFullIntegrityAudit();
      const filename =
        'AMECO-Spot-Planner_informe-integridad_'+
        safeFileTimestamp(new Date())+
        '.json';

      downloadJsonFile(filename,{
        format:'AMECO_SPOT_INTEGRITY_REPORT',
        appVersion:APP_VERSION,
        generatedAt:new Date().toISOString(),
        userEmail:(window.amecoCurrentUser&&window.amecoCurrentUser.email)||'',
        report
      });
      render();
    }catch(error){
      console.error(error);
      alert('No fue posible generar el informe de integridad.');
    }
    return;
  }

  if(action==='new-service'){
    if(!state.faenas.length || !state.cargos.length){
      alert('Primero debes registrar al menos una faena y un cargo en Configuración.');
      return;
    }
    state.ui.modal = {type:'service', serviceId:null};
    renderModal();
  }
  else if(action==='open-service'){
    state.ui.modal = {type:'service', serviceId:el.dataset.id};
    renderModal();
  }
  else if(action==='goto-services'){
    state.ui.tab = 'servicios';
    state.ui.modal = null;
    render();
  }
  else if(action==='clear-service-filters'){
    state.ui.servicioSearch = '';
    state.ui.servicioFilter = 'all';
    state.ui.servicioFaenaFilter = 'all';
    render();
  }
  else if(action==='add-service-requirement'){
    const root = document.getElementById('serviceRequirements');
    if(root){
      root.insertAdjacentHTML('beforeend', serviceRequirementRowHtml());
    }
  }
  else if(action==='remove-service-requirement'){
    const row = el.closest('.service-requirement-row');
    const allRows = document.querySelectorAll('.service-requirement-row');
    if(allRows.length<=1){
      alert('El servicio debe mantener al menos un cargo requerido.');
      return;
    }

    const serviceId = state.ui.modal?.serviceId;
    const service = state.servicios.find(item=>item.id===serviceId);
    const assigned = service
      ? requirementAssignments(service,row?.dataset.requirementId,false).length
      : 0;

    if(assigned && !confirm(
      'Este requisito tiene '+assigned+' asignación(es). Al guardar el servicio también se eliminarán esas asignaciones. ¿Continuar?'
    )){
      return;
    }

    if(row) row.remove();
  }
  else if(action==='save-service'){
    const nombre = String(document.getElementById('srv-name')?.value||'').trim();
    const faena = String(document.getElementById('srv-site')?.value||'').trim();
    const fechaInicio = String(document.getElementById('srv-start')?.value||'');
    const fechaFin = String(document.getElementById('srv-end')?.value||'');

    if(!nombre){
      alert('El nombre del servicio es obligatorio.');
      return;
    }
    if(!faena){
      alert('Selecciona una faena.');
      return;
    }
    if(!fechaInicio || !fechaFin){
      alert('Ingresa la fecha de inicio y término.');
      return;
    }
    if(parseDate(fechaFin) < parseDate(fechaInicio)){
      alert('La fecha de término no puede ser anterior a la fecha de inicio.');
      return;
    }

    const rows = Array.from(document.querySelectorAll('.service-requirement-row'));
    if(!rows.length){
      alert('Agrega al menos un cargo requerido.');
      return;
    }

    const requirements = [];
    const cargosSeen = new Set();

    for(const row of rows){
      const cargo = String(row.querySelector('.service-req-cargo')?.value||'').trim();
      const cantidad = Number(row.querySelector('.service-req-qty')?.value||0);
      const nota = String(row.querySelector('.service-req-note')?.value||'').trim();

      if(!cargo){
        alert('Todos los requisitos deben tener un cargo.');
        return;
      }
      if(!Number.isInteger(cantidad) || cantidad<1){
        alert('La cantidad requerida debe ser un número entero mayor que cero.');
        return;
      }
      if(cargosSeen.has(cargo.toLowerCase())){
        alert('El cargo "'+cargo+'" está repetido. Déjalo una sola vez y ajusta su cantidad.');
        return;
      }

      cargosSeen.add(cargo.toLowerCase());
      requirements.push({
        id: row.dataset.requirementId || uid('req'),
        cargo,
        cantidad,
        nota
      });
    }

    const id = el.dataset.id;
    const existing = state.servicios.find(item=>item.id===id);
    const service = {
      id,
      nombre,
      faena,
      cliente: String(document.getElementById('srv-client')?.value||'').trim(),
      fechaInicio,
      fechaFin,
      turno: String(document.getElementById('srv-shift')?.value||'dia'),
      supervisor: String(document.getElementById('srv-supervisor')?.value||'').trim(),
      estado: String(document.getElementById('srv-status')?.value||'borrador'),
      descripcion: String(document.getElementById('srv-description')?.value||'').trim(),
      requerimientos: requirements,
      asignaciones: (existing?.asignaciones||[]).filter(assignment=>
        requirements.some(requirement=>requirement.id===assignment.requisitoId)
      ),
      createdAt: existing?.createdAt || Date.now(),
      updatedAt: Date.now()
    };

    if(existing){
      Object.assign(existing,service);
    }else{
      state.servicios.push(service);
    }

    state.ui.modal = null;
    await persistNow();

    await recordAudit(
      existing ? 'SERVICE_UPDATED' : 'SERVICE_CREATED',
      'service',
      id,
      (existing ? 'Se editó el servicio ' : 'Se creó el servicio ')+nombre+'.',
      {faena, fechaInicio, fechaFin}
    );

    render();
  }
  else if(action==='delete-service'){
    const service = state.servicios.find(item=>item.id===el.dataset.id);
    if(!service) return;

    if(!confirm('¿Eliminar el servicio "'+service.nombre+'"? Esta acción no se puede deshacer.')){
      return;
    }

    state.servicios = state.servicios.filter(item=>item.id!==service.id);
    state.ui.modal = null;
    await persistNow();

    await recordAudit(
      'SERVICE_DELETED',
      'service',
      service.id,
      'Se eliminó el servicio '+service.nombre+'.',
      {
        faena:service.faena,
        fechaInicio:service.fechaInicio,
        fechaFin:service.fechaFin
      }
    );

    render();
  }

  else if(action==='manage-service-assignments'){
    const serviceId = el.dataset.id;
    const service = state.servicios.find(item=>item.id===serviceId);
    if(!service) return;

    state.ui.modal = {type:'serviceAssignments',serviceId};
    renderModal();
  }
  else if(action==='open-assignment-picker'){
    state.ui.assignmentCandidateSearch = '';
    state.ui.assignmentCandidateFilter = 'recommended';
    state.ui.modal = {
      type:'assignmentPicker',
      serviceId:el.dataset.serviceId,
      requirementId:el.dataset.requirementId
    };
    renderModal();
  }
  else if(action==='back-to-service-assignments'){
    state.ui.modal = {
      type:'serviceAssignments',
      serviceId:el.dataset.serviceId
    };
    renderModal();
  }
  else if(action==='assign-worker'){
    const service = state.servicios.find(item=>item.id===el.dataset.serviceId);
    const requirement = service?.requerimientos?.find(item=>item.id===el.dataset.requirementId);
    const worker = state.workers.find(item=>item.id===el.dataset.workerId);
    if(!service || !requirement || !worker) return;

    if(workerAlreadyAssignedToService(worker.id,service)){
      alert('Este trabajador ya tiene una asignación activa dentro del servicio.');
      return;
    }

    const assessment = candidateAssessment(worker,service,requirement);

    if(assessment.warnings.length){
      const accepted = confirm(
        'El trabajador presenta estas advertencias:\\n\\n• '+
        assessment.warnings.join('\\n• ')+
        '\\n\\n¿Deseas asignarlo de todas formas?'
      );
      if(!accepted) return;
    }

    service.asignaciones = serviceAssignments(service);
    service.asignaciones.push({
      id:uid('asg'),
      requisitoId:requirement.id,
      workerId:worker.id,
      estado:'propuesto',
      nota:'',
      createdAt:Date.now(),
      updatedAt:Date.now()
    });
    service.updatedAt = Date.now();

    await persistNow();

    await recordAudit(
      'ASSIGNMENT_CREATED',
      'assignment',
      service.id,
      'Se asignó a '+(worker.nombre||worker.id)+' al servicio '+(service.nombre||service.id)+'.',
      {workerId: worker.id, serviceId: service.id, requirementId: requirement.id}
    );

    state.ui.modal = {
      type:'serviceAssignments',
      serviceId:service.id
    };
    renderModal();
  }
  else if(action==='remove-assignment'){
    const service = state.servicios.find(item=>item.id===el.dataset.serviceId);
    const assignment = serviceAssignments(service).find(item=>item.id===el.dataset.assignmentId);
    const worker = assignment ? assignmentWorker(assignment) : null;

    if(!service || !assignment) return;

    if(!confirm('¿Quitar a '+(worker?.nombre||'este trabajador')+' del servicio?')){
      return;
    }

    service.asignaciones = serviceAssignments(service).filter(item=>item.id!==assignment.id);
    service.updatedAt = Date.now();
    await persistNow();

    await recordAudit(
      'ASSIGNMENT_REMOVED',
      'assignment',
      service.id,
      'Se quitó a '+(worker?.nombre||assignment.workerId)+' del servicio '+(service.nombre||service.id)+'.',
      {workerId: worker?.id||assignment.workerId, serviceId: service.id, assignmentId: assignment.id}
    );

    renderModal();
  }

  else if(action==='new-worker'){ state.ui.modal = {type:'worker', workerId:null}; renderModal(); }
  else if(action==='open-worker'){ state.ui.modal = {type:'worker', workerId: el.dataset.id}; renderModal(); }
  else if(action==='toggle-worker-delete-mode'){
    workerDeleteMode = !workerDeleteMode;
    if(!workerDeleteMode) workerDeleteSelected.clear();
    render();
  }
  else if(action==='toggle-worker-delete'){
    const id = el.dataset.id;
    if(workerDeleteSelected.has(id)) workerDeleteSelected.delete(id);
    else workerDeleteSelected.add(id);
    renderContentOnly();
    renderTopbar();
  }
  else if(action==='select-visible-workers'){
    const visible = filteredWorkers();
    const allSelected = visible.length>0 && visible.every(w=>workerDeleteSelected.has(w.id));
    visible.forEach(w=>{
      if(allSelected) workerDeleteSelected.delete(w.id);
      else workerDeleteSelected.add(w.id);
    });
    renderContentOnly();
  }
  else if(action==='clear-worker-selection'){
    workerDeleteSelected.clear();
    renderContentOnly();
  }
  else if(action==='delete-selected-workers'){
    await deleteWorkersInBulk();
  }
  else if(action==='goto-worker-from-doc'){ state.ui.tab='trabajadores'; render(); }
  else if(action==='grid-size'){ state.ui.gridSize = el.dataset.size; render(); }
  else if(action==='turno-month-span'){
    state.ui.turnoMonthSpan = Number(el.dataset.span)===1 ? 1 : 2;
    render();
  }
  else if(action==='save-now'){
    const btn = document.getElementById('saveNowBtn');
    if(btn){ btn.disabled = true; btn.textContent = 'Guardando...'; }
    const ok = await persistNow();
    if(btn){ btn.disabled = false; btn.textContent = ok ? '✓ Guardado' : '\uD83D\uDCBE Guardar'; }
    if(ok) setTimeout(()=>{ const b = document.getElementById('saveNowBtn'); if(b) b.textContent = '\uD83D\uDCBE Guardar'; }, 2000);
  }
  else if(action==='export-excel'){ exportToExcel(); }
  else if(action==='filter-turno-faena'){
    const f = el.dataset.faena;
    state.ui.turnoFaenaFilter = (state.ui.turnoFaenaFilter === f) ? null : f;
    render();
  }
  else if(action==='clear-turno-faena-filter'){ state.ui.turnoFaenaFilter = null; render(); }
  else if(action==='clear-turno-cargo-filter'){
    state.ui.turnoCargoFilter = 'all';
    render();
  }

  else if(action==='add-example-workers'){
    const added = addExampleWorkersToState();
    state.examplesSeeded = true;
    await persistNow();
    render();

    alert(
      added
        ? added+' trabajador(es) de ejemplo agregado(s).'
        : 'Los tres trabajadores de ejemplo ya están cargados.'
    );
  }
  else if(action==='remove-example-workers'){
    const examples = state.workers.filter(worker=>worker.esEjemplo);

    if(!examples.length){
      alert('No hay trabajadores de ejemplo cargados.');
      return;
    }

    if(!confirm('¿Eliminar los '+examples.length+' trabajadores de ejemplo?')){
      return;
    }

    const ids = new Set(examples.map(worker=>worker.id));
    state.workers = state.workers.filter(worker=>!worker.esEjemplo);
    state.llamados = (state.llamados||[]).filter(item=>!ids.has(item.workerId));
    state.pasajes = (state.pasajes||[]).filter(item=>!ids.has(item.workerId));
    (state.servicios||[]).forEach(service=>{
      service.asignaciones = serviceAssignments(service).filter(
        assignment=>!ids.has(assignment.workerId)
      );
    });

    await removeWorkerDocuments(Array.from(ids));
    await persistNow();
    render();

    alert('Trabajadores de ejemplo eliminados.');
  }
  else if(action==='open-add-faena'){
    state.ui.modal = {type:'addFaena'};
    renderModal();
  }
  else if(action==='open-add-cargo'){
    state.ui.modal = {type:'addCargo'};
    renderModal();
  }
  else if(action==='save-cargo'){
    const input = document.getElementById('new-cargo-name');
    const name = String(input ? input.value : '').trim();

    if(!name){
      alert('Escribe el nombre del cargo.');
      return;
    }

    const duplicate = state.cargos.some(c=>c.toLowerCase()===name.toLowerCase());
    if(duplicate){
      alert('Ese cargo ya existe.');
      return;
    }

    try{
      await window.amecoAccessApi.writeCatalogEntry('cargosCatalog', encodeCatalogKey(name), name);
    }catch(error){
      console.warn('No se pudo registrar el cargo en el catálogo protegido.', error);
      alert('No se pudo guardar el cargo. Intenta de nuevo.');
      return;
    }

    state.cargos.push(name);
    ensureCargoColor(name);
    state.cargos.sort((a,b)=>a.localeCompare(b,'es'));
    state.faenas.sort((a,b)=>a.localeCompare(b,'es'));
    ensureCargoColors();
    state.ui.modal = null;
    await persistNow();
    render();
  }
  else if(action==='delete-cargo'){
    const cargo = el.dataset.cargo;
    const assigned = state.workers.filter(w=>w.cargo===cargo).length;
    const serviceUse = (state.servicios||[]).filter(service=>
      (service.requerimientos||[]).some(item=>item.cargo===cargo)
    ).length;

    if(assigned>0 || serviceUse>0){
      const details = [];
      if(assigned) details.push(assigned+' trabajador(es) asignado(s)');
      if(serviceUse) details.push(serviceUse+' servicio(s) que lo requieren');

        invalid = true;

      if(processedRuts.has(rutNorm)){
        duplicatedRutInFile++;
        skippedRows++;
        return;
      }
      processedRuts.add(rutNorm);

      const existing = state.workers.find(
        worker=>normalizeRut(worker.rut)===rutNorm
      );

      const cargo = canonicalCargoName(get('cargo'));
      const importedAccreditations = collectImportedAccreditations(row,rowIndex);

      const fullName = composeWorkerName(nombres, apellidos);

      if(existing){

        existing.nombre = fullName;
        existing.rut = rut;

          if(result==='updated') accreditationsUpdated++;

        state.workers.push(newWorker);
        accreditationsCreated += importedAccreditations.length;
        created++;

    let s = parseDate(startVal), en = parseDate(endVal);
    if(s > en){ const tmp = s; s = en; en = tmp; }
    const ids = Array.from(bulkSelected);

    ids.forEach(id=>{

      await window.amecoAccessApi.deleteCatalogEntry('faenasCatalog', encodeCatalogKey(faena));
    }catch(error){
      console.warn('No se pudo eliminar la faena en el catálogo protegido.', error);
      alert('No tienes permiso para eliminar faenas. Esta acción está reservada al rol Administrador.');
      return;
    }

    state.faenas = state.faenas.filter(f=>f!==faena);
    if(state.ui.turnoFaenaFilter===faena) state.ui.turnoFaenaFilter=null;
    if(state.ui.acredFaenaFilter===faena) state.ui.acredFaenaFilter='all';

    await persistNow();

    await recordAudit(
      'SITE_CATALOG_DELETED',
      'faena',
      faena,
      'Se eliminó la faena '+faena+'.'
    );

    render();
  }
  else if(action==='add-equipo'){ state.ui.modal = {type:'addEquipo'}; renderModal(); }
  else if(action==='save-equipo'){
    const name = document.getElementById('new-equipo-name').value.trim();
    if(name && !state.equipos.includes(name)){ state.equipos.push(name); await persist(); }
    state.ui.modal=null; render();
  }
});

function attachDynamicListeners(){
  const search = document.getElementById('searchInput');
  if(search){
    search.oninput = (e)=>{
      state.ui.search = e.target.value;
      renderContentOnly();

      // El contenido se actualiza sin reconstruir la barra superior,
      // por lo que el texto, foco y posición del cursor permanecen visibles.
      requestAnimationFrame(()=>{
        if(document.activeElement!==search){
          search.focus({preventScroll:true});
        }
        const cursor = search.value.length;
        try{ search.setSelectionRange(cursor,cursor); }catch(error){}
      });
    };
  }
  const cargoFilterEl = document.getElementById('cargoFilter');
  if(cargoFilterEl){ cargoFilterEl.onchange = (e)=>{ state.ui.cargoFilter = e.target.value; renderContentOnly(); }; }

  const docStatus = document.getElementById('docStatusFilter');

function renderContentOnly(){
  const c = document.getElementById('content');
  if(state.ui.tab==='servicios') c.innerHTML = viewServicios();
  else if(state.ui.tab==='trabajadores') c.innerHTML = viewTrabajadores();
  else if(state.ui.tab==='llamados') c.innerHTML = viewLlamados();
  else if(state.ui.tab==='pasajes') c.innerHTML = viewPasajes();
  applyRoleUi();
}

async function saveWorkerFromForm(){
  const form = document.getElementById('workerForm');
  const id = form.dataset.workerId;
  const isNew = form.dataset.isNew === 'true';
  const nombre = document.getElementById('f-nombre').value.trim();
  if(!nombre){ alert('El nombre es obligatorio.'); return; }

  const saveBtn = document.querySelector('[data-action="save-worker"]');
  const cancelBtn = document.querySelector('.modal-foot [data-action="close-modal"]');
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Guardando...'; }
  if(cancelBtn){ cancelBtn.disabled = true; }

  const existingWorker = isNew ? null : state.workers.find(w=>w.id===id);
  const failedFiles = [];

  // ---- Exámenes: leer campos, y guardar/eliminar archivos ANTES de confirmar el nombre adjunto ----
  const examCardsEls = document.querySelectorAll('#examList .exam-card');
  const examenes = [];
  for(const card of examCardsEls){
    const tipo = card.dataset.examType;
    const fecha = card.querySelector('.exam-fecha').value;
    const vencimiento = card.querySelector('.exam-venc').value;
    const fileInput = card.querySelector('.exam-file');
    const existing = (existingWorker ? (existingWorker.examenes||[]) : []).find(x=>x.tipo===tipo) || {};
    let archivoNombre = existing.archivoNombre || '';
    let archivoTipo = existing.archivoTipo || '';

    if(fileInput && fileInput._pendingRemove){
      try{ await window.amecoAccessApi.deleteWorkerDocument(examDocStoragePath(id, tipo)); }catch(e){ /* puede no existir */ }
      try{ await window.storage.delete(examDocKey(id, tipo), true); }catch(e){ /* puede no existir, no es grave */ }
      archivoNombre = ''; archivoTipo = '';
    } else if(fileInput && fileInput._pendingFile){
      const key = examDocKey(id, tipo);
      try{
        const uploaded = await window.amecoAccessApi.uploadWorkerDocument(
          examDocStoragePath(id, tipo),
          fileInput._pendingFile.data,
          fileInput._pendingFile.mime
        );
        await window.storage.set(key, JSON.stringify({
          nombre: fileInput._pendingFile.nombre,
          mime: fileInput._pendingFile.mime,
          storagePath: uploaded.storagePath,
          sizeBytes: uploaded.sizeBytes,
          uploadedAt: new Date().toISOString()
        }), true);
        archivoNombre = fileInput._pendingFile.nombre;
        archivoTipo = fileInput._pendingFile.mime;
      }catch(err){
        console.error('Error guardando examen', key, err);
        failedFiles.push(tipo+' ('+fileInput._pendingFile.nombre+')');
        // se mantiene el archivo anterior (si había) ya que el nuevo no se pudo guardar
      }
    }
    examenes.push({tipo, fecha, vencimiento, archivoNombre, archivoTipo});
  }

  // Acreditaciones
  const acreditaciones = Array.from(document.querySelectorAll('#acredList .repeat-row2')).map(row=>({
    faena: row.querySelector('.acred-faena').value,
    estado: row.querySelector('.acred-estado').value,
    vencimiento: row.querySelector('.acred-venc').value
  }));

  // ---- Certificaciones de equipos: ahora soportan varios archivos por certificación ----
  const certBlockEls = document.querySelectorAll('#certList .cert-block');
  const certificaciones = [];
  const existingCerts = existingWorker ? (existingWorker.certificaciones||[]) : [];
  for(const block of certBlockEls){
    const certId = block.dataset.certId;
    const equipo = block.querySelector('.cert-equipo').value;
    const fecha = block.querySelector('.cert-fecha').value;
    const vencimiento = block.querySelector('.cert-venc').value;
    const existing = existingCerts.find(c=>c.id===certId) || {};
    const existingFiles = existing.archivos || [];
    const removedIds = block._removedFileIds || new Set();
    const pendingFiles = block._pendingFiles || [];

    for(const fid of removedIds){
      try{ await window.amecoAccessApi.deleteWorkerDocument(certDocStoragePath(id, certId, fid)); }catch(e){ /* puede no existir */ }
      try{ await window.storage.delete(certDocKey(id, certId, fid), true); }catch(e){ /* puede no existir */ }
    }
    let finalFiles = existingFiles.filter(f=>!removedIds.has(f.id));
    for(const pf of pendingFiles){
      const key = certDocKey(id, certId, pf.id);
      try{
        const uploaded = await window.amecoAccessApi.uploadWorkerDocument(
          certDocStoragePath(id, certId, pf.id),
          pf.data,
          pf.mime
        );
        await window.storage.set(key, JSON.stringify({
          nombre: pf.nombre,
          mime: pf.mime,
          storagePath: uploaded.storagePath,
          sizeBytes: uploaded.sizeBytes,
          uploadedAt: new Date().toISOString()
        }), true);
        finalFiles.push({id: pf.id, nombre: pf.nombre, mime: pf.mime});
      }catch(err){
        console.error('Error guardando archivo de certificación', key, err);
        failedFiles.push(equipo+' ('+pf.nombre+')');
      }
    }
    certificaciones.push({id: certId, equipo, fecha, vencimiento, archivos: finalFiles});
  }

  // ---- Otros exámenes / documentos adicionales (mismo tratamiento que exámenes fijos) ----
  const examExtraEls = document.querySelectorAll('#examExtraList [data-extra-id]');
  const examenesExtra = [];
  const existingExtra = existingWorker ? (existingWorker.examenesExtra||[]) : [];
  for(const card of examExtraEls){
    const extraId = card.dataset.extraId;
    const nombreExtra = card.querySelector('.exam-extra-nombre').value.trim();
    if(!nombreExtra) continue; // se descartan filas vacías sin nombre
    const fecha = card.querySelector('.exam-extra-fecha').value;
    const vencimiento = card.querySelector('.exam-extra-venc').value;
    const fileInput = card.querySelector('.exam-extra-file');
    const existing = existingExtra.find(x=>x.id===extraId) || {};
    let archivoNombre = existing.archivoNombre || '';
    let archivoTipo = existing.archivoTipo || '';

    if(fileInput && fileInput._pendingRemove){
      try{ await window.amecoAccessApi.deleteWorkerDocument(examExtraDocStoragePath(id, extraId)); }catch(e){ /* puede no existir */ }
      try{ await window.storage.delete(examExtraDocKey(id, extraId), true); }catch(e){ /* puede no existir */ }
      archivoNombre = ''; archivoTipo = '';
    } else if(fileInput && fileInput._pendingFile){
      const key = examExtraDocKey(id, extraId);
      try{
        const uploaded = await window.amecoAccessApi.uploadWorkerDocument(
          examExtraDocStoragePath(id, extraId),
          fileInput._pendingFile.data,
          fileInput._pendingFile.mime
        );
        await window.storage.set(key, JSON.stringify({
          nombre: fileInput._pendingFile.nombre,
          mime: fileInput._pendingFile.mime,
          storagePath: uploaded.storagePath,
          sizeBytes: uploaded.sizeBytes,
          uploadedAt: new Date().toISOString()
        }), true);
        archivoNombre = fileInput._pendingFile.nombre;
        archivoTipo = fileInput._pendingFile.mime;
      }catch(err){
        console.error('Error guardando documento adicional', key, err);
        failedFiles.push(nombreExtra+' ('+fileInput._pendingFile.nombre+')');
      }
    }
    examenesExtra.push({id: extraId, nombre: nombreExtra, fecha, vencimiento, archivoNombre, archivoTipo});
  }

  const data = {
    id, nombre,
    rut: document.getElementById('f-rut').value.trim(),
    cargo: document.getElementById('f-cargo').value,
    telefono: document.getElementById('f-telefono').value.trim(),
    correo: document.getElementById('f-correo').value.trim(),
    ciudad: document.getElementById('f-ciudad').value.trim(),
    empresa: document.getElementById('f-empresa').value.trim(),
    turno: {
      fechaInicioCiclo: document.getElementById('f-cicloinicio').value || todayStr(),
      diasTrabajo: parseInt(document.getElementById('f-diastrabajo').value)||14,
      diasDescanso: parseInt(document.getElementById('f-diasdescanso').value)||14
    },
    examenes, acreditaciones, certificaciones, examenesExtra
  };

  if(isNew){
    data.overrides = {};
    state.workers.push(data);
  } else {
    const existing = state.workers.find(w=>w.id===id);
    data.overrides = existing.overrides || {};
    Object.assign(existing, data);
  }
  state.ui.modal = null;
  render();
  await persist();

  await recordAudit(
    isNew ? 'WORKER_CREATED' : 'WORKER_UPDATED',
    'worker',
    id,
    (isNew ? 'Se creó el trabajador ' : 'Se editó el trabajador ')+(data.nombre||id)+'.',
    {rut: data.rut||'', cargo: data.cargo||''}
  );

  if(failedFiles.length){
    alert('Se guardó la ficha, pero estos archivos no se pudieron subir (probablemente pesan demasiado): \n\n'+failedFiles.join('\n')+'\n\nVuelve a abrir la ficha e inténtalo de nuevo, idealmente con un archivo más liviano (menos de 3.5 MB).');
  }
}

loadData();
</script>
