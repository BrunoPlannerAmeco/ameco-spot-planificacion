<!DOCTYPE html>
<!-- AMECO Spot Planner v3.0.0 — rebuild basado en control_personal (15) -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMECO Spot Planner — Gestión de Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
  :root{
    --bg:#f2f3ef;
    --panel:#ffffff;
    --steel:#232c35;
    --steel-2:#2f3944;
    --ink:#1b1f23;
    --sub:#6b7178;
    --line:#dfe1db;
    --accent:#e2571f;
    --accent-ink:#7a2c0d;
    --amber:#e0951a;
    --good:#2f8f4e;
    --good-bg:#e6f4ea;
    --warn:#b9790f;
    --warn-bg:#fbf0dc;
    --bad:#c8342f;
    --bad-bg:#faeaea;
    --grey-bg:#eceeea;
    --radius:10px;
    --shadow:0 1px 2px rgba(20,20,15,.06), 0 6px 20px rgba(20,20,15,.05);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3,.disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
  .disp{text-transform:uppercase;font-weight:700;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:13px;}

  #shell{display:flex;min-height:100vh;}

  #sidebar{width:220px;flex:0 0 220px;background:var(--steel);color:#e9ebe6;display:flex;flex-direction:column;padding:18px 0;}
  .brand{padding:0 20px 18px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px;}
  .brand .tag{font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.03em;color:#fff;line-height:1.05;}
  .brand .sub{font-size:11px;color:#9aa1a6;margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#c7cbc4;font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:.15s;}
  .nav-item:hover{background:rgba(255,255,255,.04);color:#fff;}
  .nav-item.active{background:rgba(226,87,31,.14);border-left-color:var(--accent);color:#fff;}
  .nav-item .ic{width:16px;text-align:center;font-size:14px;}
  .nav-count{margin-left:auto;background:rgba(255,255,255,.1);border-radius:20px;padding:1px 7px;font-size:11px;font-family:'JetBrains Mono';}
  .nav-count.alert{background:var(--accent);color:#fff;}
  .sidebar-foot{margin-top:auto;padding:14px 20px 0 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8c939a;line-height:1.5;}

  #main{flex:1;min-width:0;display:flex;flex-direction:column;}
  #topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:14px;}
  #topbar h1{font-size:22px;margin:0;font-weight:700;color:var(--steel);}
  .search-box{flex:1;max-width:340px;position:relative;}
  .search-box input{width:100%;padding:8px 12px 8px 30px;border:1px solid var(--line);border-radius:8px;background:var(--bg);}
  .search-box .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:12px;}
  .btn{border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:#c94a17;}
  .btn-ghost{background:var(--grey-bg);color:var(--ink);}
  .btn-ghost:hover{background:#e2e4de;}
  .btn-danger{background:var(--bad-bg);color:var(--bad);}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
  #content{flex:1;padding:22px 26px;overflow:auto;}
  .save-pill{font-size:11px;color:var(--sub);margin-left:auto;display:flex;align-items:center;gap:6px;}
  .dot-live{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block;}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .kpi .num{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:1;color:var(--steel);}
  .kpi .lbl{font-size:12px;color:var(--sub);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .kpi.warn .num{color:var(--warn);}
  .kpi.bad .num{color:var(--bad);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;}
  .panel-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .panel-head h2{font-size:16px;margin:0;color:var(--steel);font-weight:700;}
  .panel-body{padding:6px 0;}
  .alert-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid #f0f1ec;font-size:13px;}
  .alert-row:last-child{border-bottom:none;}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .chip.good{background:var(--good-bg);color:var(--good);}
  .chip.warn{background:var(--warn-bg);color:var(--warn);}
  .chip.bad{background:var(--bad-bg);color:var(--bad);}
  .chip.grey{background:var(--grey-bg);color:var(--sub);}
  .empty{padding:30px 18px;text-align:center;color:var(--sub);font-size:13px;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.12s;}
  .wcard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .wcard-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .wcard .name{font-weight:700;font-size:15px;color:var(--steel);}
  .wcard .cargo{font-size:12px;color:var(--sub);margin-top:1px;}
  .wcard .rut{font-size:11.5px;color:var(--sub);margin-top:6px;}
  .status-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;margin-top:3px;}
  .sticker-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
  .sticker{width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.15);display:inline-block;}
  .sticker-empty{font-size:11px;color:var(--sub);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--sub);padding:9px 14px;border-bottom:1px solid var(--line);background:#fafaf8;position:sticky;top:0;}
  td{padding:9px 14px;border-bottom:1px solid #f0f1ec;font-size:13px;vertical-align:middle;}
  tr:hover td:not(.daycell){background:#fafaf8;}
  .table-wrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);}

  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  select, .filter-bar input{padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:var(--panel);}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,22,20,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal{background:var(--panel);border-radius:14px;width:660px;max-width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal-sm{width:400px;}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--panel);z-index:2;}
  .modal-head h2{margin:0;font-size:18px;color:var(--steel);}
  .modal-close{background:none;border:none;font-size:20px;color:var(--sub);}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px;}
  .field input, .field select, .field textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:var(--bg);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .section-title{font-size:13px;font-weight:700;color:var(--steel);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .section-title:first-child{border-top:none;padding-top:0;margin-top:0;}
  .repeat-row2{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;background:var(--bg);padding:8px;border-radius:8px;}
  .icon-btn{background:none;border:none;color:var(--bad);font-size:15px;padding:2px 6px;}
  .link-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:12.5px;padding:0;}

  .exam-card{background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:10px;}
  .exam-card-title{font-weight:700;font-size:13px;color:var(--steel);margin-bottom:8px;}
  .exam-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  .exam-card-fields label{display:block;font-size:10px;color:var(--sub);text-transform:uppercase;margin-bottom:3px;}
  .exam-card-fields input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);}
  .file-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:8px;}
  .file-row input[type=file]{display:none;}
  .file-pill-label{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;}
  .file-pill-label:hover{border-color:var(--accent);}
  .file-name{font-size:12px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-chip-list{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
  .file-chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:3px 4px 3px 9px;font-size:11.5px;}
  .file-chip-name{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .cert-block{background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:10px;}
  .cert-top-row{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
  .cert-top-row select, .cert-top-row input{padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--panel);}

  .cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .cal-toolbar .month-lbl{font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:var(--steel);min-width:180px;text-align:center;text-transform:capitalize;}
  .legend{display:flex;gap:14px;margin-left:auto;font-size:12px;color:var(--sub);align-items:center;}
  .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px;}
  .grid-table{border-collapse:collapse;font-size:11.5px;user-select:none;}
  .drag-highlight{outline:2px dashed #1b1f23;outline-offset:-3px;}
  .grid-table th, .grid-table td{border:1px solid #eceeea;padding:0;text-align:center;}
  .grid-table th{background:#fafaf8;padding:6px 2px;font-weight:600;color:var(--sub);position:sticky;top:0;z-index:1;}
  .grid-table td.namecell, .grid-table th.namecell{position:sticky;left:0;background:var(--panel);z-index:2;text-align:left;padding:7px 12px;font-weight:600;min-width:170px;border-right:2px solid var(--line);}
  .grid-table th.namecell{z-index:3;background:#fafaf8;}
  .daycell{width:26px;height:32px;cursor:pointer;position:relative;}
  .daycell:hover{outline:2px solid var(--accent);outline-offset:-2px;}
  .st-trabajo{background:#2f3944;}
  .st-descanso{background:#e7e8e3;}
  .st-extra{background:var(--accent);}
  .st-permiso{background:#c8342f33;}
  .weekend-col{background-color:#f6f2ea;}

  .helptext{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.5;}
  .doc-cell-link{font-size:11px;color:var(--accent);font-weight:600;cursor:pointer;}
  .doc-cell-none{font-size:11px;color:#b7bab3;}
  .tbl-worker-link{cursor:pointer;color:var(--steel);border-bottom:1px dashed var(--accent);}
  .tbl-worker-link:hover{color:var(--accent);}

  .ring-extra{box-shadow: inset 0 0 0 2px #ffffff;}
  .ring-permiso{box-shadow: inset 0 0 0 2px var(--bad);}
  .daycell-label{font-size:8.5px;font-weight:800;color:#fff;line-height:32px;display:block;text-align:center;letter-spacing:.01em;text-shadow:0 1px 1px rgba(0,0,0,.4);pointer-events:none;}

  .size-toggle{display:flex;gap:2px;background:var(--grey-bg);border-radius:8px;padding:2px;margin-left:10px;}
  .size-toggle button{background:none;border:none;padding:6px 11px;font-size:12px;font-weight:600;border-radius:6px;color:var(--sub);}
  .size-toggle button.active-size{background:var(--panel);color:var(--steel);box-shadow:var(--shadow);}

  .grid-table.size-comfortable .daycell{width:36px;height:42px;}
  .grid-table.size-comfortable .daycell-label{font-size:10.5px;line-height:42px;}
  .grid-table.size-comfortable th{font-size:12px;padding:8px 3px;}
  .grid-table.size-comfortable .namecell{font-size:13.5px;min-width:190px;}
  .grid-table.size-large{font-size:13px;}
  .grid-table.size-large .daycell{width:48px;height:54px;}
  .grid-table.size-large .daycell-label{font-size:13px;line-height:54px;font-weight:800;}
  .grid-table.size-large th{font-size:13px;padding:10px 4px;}
  .grid-table.size-large .namecell{font-size:15px;min-width:210px;}

  .worker-link-btn{display:block;margin-top:4px;font-size:11px;}

  .month-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
  .month-cal-weekday{font-size:11px;font-weight:700;color:var(--sub);text-align:center;text-transform:uppercase;padding-bottom:2px;}
  .daycell-lg{border-radius:9px;min-height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;padding:4px;gap:2px;}
  .daycell-lg:hover{outline:2px solid var(--accent);outline-offset:-2px;}
  .daycell-lg .daynum{position:absolute;top:4px;left:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.75);}
  .daycell-lg.st-descanso .daynum{color:#9a9d94;}
  .daycell-lg .biglabel{font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.35);}
  .daycell-lg.st-descanso .biglabel{color:#464a41;text-shadow:none;}
  .daycell-lg .faename{font-size:9px;color:#fff;text-align:center;line-height:1.15;text-shadow:0 1px 1px rgba(0,0,0,.35);padding:0 3px;word-break:break-word;}
  .faena-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:var(--sub);}
  .fl-item{display:flex;align-items:center;gap:5px;}
  .fl-sw{width:12px;height:12px;border-radius:3px;display:inline-block;}
  .fl-btn{border:1px solid transparent;background:none;cursor:pointer;padding:4px 10px;border-radius:20px;font:inherit;color:var(--sub);}
  .fl-btn:hover{background:var(--grey-bg);}
  .fl-btn.fl-active{background:var(--steel);color:#fff;}
  .fl-btn.fl-active .fl-sw{box-shadow:0 0 0 2px #fff;}
  .fl-clear{border:1px solid var(--line);background:var(--panel);cursor:pointer;padding:4px 10px;border-radius:20px;font:inherit;color:var(--bad);font-weight:600;}

  .bulk-toolbar{display:flex;gap:8px;align-items:center;margin:6px 0 4px;}
  .bulk-count{font-size:12px;color:var(--sub);margin-left:auto;}
  .bulk-list-wrap{max-height:220px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:4px;background:var(--panel);}
  .bulk-worker-row{display:flex;align-items:center;gap:9px;padding:7px 12px;border-bottom:1px solid #f0f1ec;font-size:13px;cursor:pointer;}
  .bulk-worker-row:last-child{border-bottom:none;}
  .bulk-worker-row:hover{background:#fafaf8;}
  .bulk-worker-row .w-cargo{margin-left:auto;color:var(--sub);font-size:11.5px;}

  /* ============================= FIREBASE LOGIN ============================= */
  [hidden]{display:none !important;}
  .auth-gate{
    position:fixed; inset:0; z-index:1000;
    display:grid; place-items:center; padding:24px;
    background:
      radial-gradient(circle at 82% 12%, rgba(226,87,31,.22), transparent 32%),
      linear-gradient(145deg,#1d252d,#303b45);
  }
  .auth-card{
    width:min(420px,100%);
    background:var(--panel);
    border:1px solid rgba(255,255,255,.45);
    border-radius:16px;
    padding:30px;
    box-shadow:0 28px 80px rgba(0,0,0,.34);
  }
  .auth-brand{
    font-family:'Barlow Condensed',sans-serif;
    font-size:31px; font-weight:800; color:var(--steel);
  }
  .auth-sub{font-size:12px;color:var(--sub);margin:3px 0 24px;}
  .auth-form{display:grid;gap:14px;}
  .auth-form .field{margin:0;}
  .auth-form input{background:#fff;padding:11px 12px;}
  .auth-submit{width:100%;justify-content:center;margin-top:2px;}
  .auth-error{min-height:18px;font-size:12px;font-weight:600;color:var(--bad);}
  .auth-foot{
    border-top:1px solid var(--line); margin-top:19px; padding-top:15px;
    color:var(--sub); font-size:11px; text-align:center;
  }
  .session-email{
    color:var(--sub); font-size:11px; max-width:190px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cloud-pill{
    font-size:11px; color:var(--sub); display:flex; align-items:center; gap:6px;
  }

</style>

<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAXGIXn5dpaoPfezHGnLR7fI_DQdcMjG6U",
    authDomain: "ameco-spot-planificacion.firebaseapp.com",
    databaseURL: "https://ameco-spot-planificacion-default-rtdb.firebaseio.com",
    projectId: "ameco-spot-planificacion",
    storageBucket: "ameco-spot-planificacion.firebasestorage.app",
    messagingSenderId: "409635036525",
    appId: "1:409635036525:web:0ede33638be61942940e64"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  const storageRoot = "amecoSpotPlanner/legacyStorage";

  let resolveAuth;
  const authReady = new Promise(resolve => { resolveAuth = resolve; });
  let authResolved = false;

  function encodeKey(key){
    return btoa(unescape(encodeURIComponent(String(key))))
      .replaceAll("/", "_").replaceAll("+", "-").replaceAll("=", "");
  }
  function decodeKey(value){
    let encoded = value.replaceAll("_", "/").replaceAll("-", "+");
    while(encoded.length % 4) encoded += "=";
    return decodeURIComponent(escape(atob(encoded)));
  }
  function keyRef(key){
    return db.ref(storageRoot + "/" + encodeKey(key));
  }

  function regimenToCycle(regimen){
    if(regimen === "7x7") return {diasTrabajo:7,diasDescanso:7};
    if(regimen === "5x2") return {diasTrabajo:5,diasDescanso:2};
    return {diasTrabajo:14,diasDescanso:14};
  }

  async function migrateExistingCloudData(){
    const [workersSnap, sitesSnap, accSnap, callsSnap, ticketsSnap] = await Promise.all([
      db.ref("amecoSpotPlanner/workers").once("value"),
      db.ref("amecoSpotPlanner/sites").once("value"),
      db.ref("amecoSpotPlanner/accreditations").once("value"),
      db.ref("amecoSpotPlanner/contacts").once("value"),
      db.ref("amecoSpotPlanner/tickets").once("value")
    ]);

    const rawWorkers = Object.values(workersSnap.val() || {});
    const rawSites = Object.values(sitesSnap.val() || {});
    const rawAccreditations = Object.values(accSnap.val() || {});
    const rawCalls = Object.values(callsSnap.val() || {});
    const rawTickets = Object.values(ticketsSnap.val() || {});

    if(!rawWorkers.length && !rawSites.length && !rawAccreditations.length &&
       !rawCalls.length && !rawTickets.length){
      return null;
    }

    const workers = rawWorkers.map(worker => {
      const cycle = regimenToCycle(worker.turno && worker.turno.regimen);
      const embeddedAccreditations = rawAccreditations
        .filter(item => item.trabajadorId === worker.id)
        .map(item => {
          const site = rawSites.find(s => s.id === item.faenaId);
          return {
            faena: site ? site.nombre : (item.faena || ""),
            estado: item.estado === "aprobada" ? "Acreditado" :
                    ["en_revision","en_carga","recopilando_documentos"].includes(item.estado) ? "En trámite" :
                    "No acreditado",
            vencimiento: item.vencimiento || ""
          };
        });

      return {
        id: worker.id,
        nombre: worker.nombre || "",
        rut: worker.rut || "",
        telefono: worker.telefono || "",
        correo: worker.correo || "",
        ciudad: worker.ciudad || "",
        cargo: worker.cargo || "",
        empresa: worker.empresa || "",
        turno: {
          fechaInicioCiclo: (worker.turno && worker.turno.fechaInicioCiclo) || new Date().toISOString().slice(0,10),
          diasTrabajo: (worker.turno && worker.turno.diasTrabajo) || cycle.diasTrabajo,
          diasDescanso: (worker.turno && worker.turno.diasDescanso) || cycle.diasDescanso
        },
        overrides: worker.overrides || {},
        examenes: worker.examenes || [
          {tipo:"Preocupacional",fecha:"",vencimiento:""},
          {tipo:"Alcohol y Drogas",fecha:"",vencimiento:""},
          {tipo:"Psicosensotécnico",fecha:"",vencimiento:""}
        ],
        examenesExtra: worker.examenesExtra || [],
        acreditaciones: worker.acreditaciones || embeddedAccreditations,
        certificaciones: worker.certificaciones || []
      };
    });

    const faenas = rawSites.map(site => site.nombre).filter(Boolean);
    const llamados = rawCalls.map(item => ({
      id: item.id || ("l_" + Date.now()),
      workerId: item.trabajadorId || item.workerId || "",
      fecha: (item.fecha || "").slice(0,10),
      hora: item.hora || "",
      resultado: item.resultado || "pendiente",
      nota: item.observaciones || item.nota || ""
    }));
    const pasajes = rawTickets.map(item => ({
      id: item.id || ("p_" + Date.now()),
      workerId: item.trabajadorId || item.workerId || "",
      faena: item.faena || "",
      fechaViaje: item.fechaViaje || "",
      origen: item.origen || "",
      destino: item.destino || "",
      estado: item.estado || "pendiente",
      nota: item.observaciones || item.nota || ""
    }));

    return {
      workers,
      faenas: faenas.length ? faenas : ["Spence","Centinela","Sierra Gorda","Gabriela Mistral","Antucoya"],
      cargos: ["Supervisor","Operador AT","Operador AC","Rigger","Alzahombre","Operador Grúa Horquilla","Otro"],
      equipos: ["Grúa Horquilla","Grúa Pluma","Camión Pluma","Manlift / Alzahombre","Minicargador","Grúa Telescópica","Camión Grúa","Otro"],
      llamados,
      pasajes
    };
  }

  window.storage = {
    async get(key, shared){
      await authReady;
      const snapshot = await keyRef(key).once("value");
      if(snapshot.exists()) return {key, value:snapshot.val(), shared:true};

      if(key === "faena_personal_db_v1"){
        const migrated = await migrateExistingCloudData();
        if(migrated){
          const value = JSON.stringify(migrated);
          await keyRef(key).set(value);
          return {key, value, shared:true};
        }
      }
      throw new Error("not found");
    },
    async set(key, value, shared){
      await authReady;
      await keyRef(key).set(value);
      return {key, value, shared:true};
    },
    async delete(key, shared){
      await authReady;
      await keyRef(key).remove();
      return {key, deleted:true, shared:true};
    },
    async list(prefix, shared){
      await authReady;
      const snapshot = await db.ref(storageRoot).once("value");
      const values = snapshot.val() || {};
      const keys = Object.keys(values).map(decodeKey)
        .filter(key => !prefix || key.startsWith(prefix));
      return {keys, prefix, shared:true};
    }
  };

  function setAuthScreen(user){
    const gate = document.getElementById("authGate");
    const shell = document.getElementById("shell");
    const email = document.getElementById("sessionEmail");

    if(!gate || !shell) return;
    if(user){
      gate.hidden = true;
      shell.style.display = "flex";
      if(email) email.textContent = user.email || "Usuario";
    }else{
      gate.hidden = false;
      shell.style.display = "none";
    }
  }

  auth.onAuthStateChanged(user => {
    window.amecoCurrentUser = user || null;
    if(user && !authResolved){
      authResolved = true;
      resolveAuth(user);
    }
    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", () => setAuthScreen(user), {once:true});
    }else{
      setAuthScreen(user);
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("authForm");
    if(!form) return;

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const error = document.getElementById("authError");
      const button = document.getElementById("authSubmit");
      error.textContent = "";
      button.disabled = true;
      button.textContent = "Ingresando...";

      try{
        await auth.signInWithEmailAndPassword(
          document.getElementById("authEmail").value.trim(),
          document.getElementById("authPassword").value
        );
      }catch(err){
        error.textContent =
          err.code === "auth/invalid-credential"
            ? "Correo o contraseña incorrectos."
            : "No fue posible iniciar sesión.";
        button.disabled = false;
        button.textContent = "Iniciar sesión";
      }
    });
  });

  window.amecoLogout = () => auth.signOut().then(() => location.reload());
})();
</script>

</head>
<body>

</div>

    </div>

  </div>
  <div id="main">
    <div id="topbar"></div>
    <div id="content"></div>
  </div>
</div>
<div id="modalRoot"></div>

<script>
/* ============================= DATA LAYER ============================= */
const STORAGE_KEY = 'faena_personal_db_v1';

/* Persistencia cloud: Firebase Realtime Database mediante window.storage. */
let STORAGE_MODE = 'firebase';
const EXAM_TYPES = ['Preocupacional','Alcohol y Drogas','Psicosensotécnico'];
const DEFAULT_FAENAS = ['Spence','Centinela','Sierra Gorda','Gabriela Mistral','Antucoya'];
const DEFAULT_CARGOS = ['Supervisor','Operador AT','Operador AC','Rigger','Alzahombre','Operador Grúa Horquilla','Otro'];
const DEFAULT_EQUIPOS = ['Grúa Horquilla','Grúa Pluma','Camión Pluma','Manlift / Alzahombre','Minicargador','Grúa Telescópica','Camión Grúa','Otro'];
const FAENA_COLORS = ['#e2571f','#2f6f9e','#2f8f4e','#8a5fc2','#c8342f','#b9790f','#1b8fa0','#7a4a2e'];
const MAX_FILE_BYTES = 3.5 * 1024 * 1024; // 3.5MB por archivo (el sistema de almacenamiento tiene un tope de 5MB por valor; al codificar en base64 el archivo pesa ~35% más, así que 3.5MB es prácticamente el máximo seguro)

let state = {
  workers: [],
  faenas: [...DEFAULT_FAENAS],
  cargos: [...DEFAULT_CARGOS],
  equipos: [...DEFAULT_EQUIPOS],
  llamados: [],
  pasajes: [],
  ui:{ tab:'dashboard', search:'', modal:null, calMonth: new Date().getMonth(), calYear: new Date().getFullYear(), docFilter:'all', docTypeFilter:'all', acredFaenaFilter:'all', certEquipoFilter:'all', gridSize:'compact', cargoFilter:'all', turnoFaenaFilter:null, llamadaFilter:'all', llamadaSearch:'', pasajeFilter:'all', pasajeSearch:'' },
  saving:false
};
let bulkSelected = new Set();
let importState = null; // {headers:[], rows:[[...]], mapping:{campo: indiceColumna}}

const IMPORT_FIELDS = [
  {key:'nombre', label:'Nombre completo', required:true},
  {key:'rut', label:'RUT'},
  {key:'telefono', label:'Teléfono'},
  {key:'correo', label:'Correo'},
  {key:'ciudad', label:'Ciudad'},
  {key:'cargo', label:'Cargo'},
  {key:'empresa', label:'Empresa / contratista'}
];

function normalizeRut(rut){
  return (rut||'').toString().replace(/\./g,'').replace(/\s/g,'').toUpperCase();
}

function guessImportMapping(headers){
  const lc = headers.map(h=>(h||'').toString().toLowerCase());
  const find = (keywords)=>{
    for(let i=0;i<lc.length;i++){ if(keywords.some(k=>lc[i].includes(k))) return i; }
    return -1;
  };
  return {
    nombre: find(['nombre','trabajador']),
    rut: find(['rut']),
    telefono: find(['tel','fono','celular']),
    correo: find(['correo','email','mail']),
    ciudad: find(['ciudad']),
    cargo: find(['cargo','puesto','funcion','función']),
    empresa: find(['empresa','contratista','razon'])
  };
}

function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function slugify(s){ return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').toLowerCase(); }
function examDocKey(workerId, tipo){ return 'doc__'+workerId+'__exam__'+slugify(tipo); }
function certDocKey(workerId, certId, fileId){ return fileId ? ('doc__'+workerId+'__cert__'+certId+'__'+fileId) : ('doc__'+workerId+'__cert__'+certId); }
function examExtraDocKey(workerId, extraId){ return 'doc__'+workerId+'__examextra__'+extraId; }

function seedData(){ return []; }

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.workers = parsed.workers || [];
      state.faenas = parsed.faenas && parsed.faenas.length ? parsed.faenas : [...DEFAULT_FAENAS];
      state.cargos = parsed.cargos && parsed.cargos.length ? parsed.cargos : [...DEFAULT_CARGOS];
      state.equipos = parsed.equipos && parsed.equipos.length ? parsed.equipos : [...DEFAULT_EQUIPOS];
      state.llamados = parsed.llamados || [];
      state.pasajes = parsed.pasajes || [];
      state.workers.forEach(w=>{
        if(!w.certificaciones) w.certificaciones = [];
        w.certificaciones.forEach(c=>{
          if(!c.archivos){
            c.archivos = c.archivoNombre ? [{id:'', nombre:c.archivoNombre, mime:c.archivoTipo||''}] : [];
            delete c.archivoNombre; delete c.archivoTipo;
          }
        });
        if(!w.examenesExtra) w.examenesExtra = [];
      });
    } else {
      state.workers = seedData();
      state.llamados = []; state.pasajes = [];
      await persist();
    }
  }catch(e){
    state.workers = seedData();
    state.llamados = []; state.pasajes = [];
    try{ await persist(); }catch(e2){}
  }
  render();
}

let saveTimeout=null;
function persist(){
  return new Promise((resolve)=>{
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async ()=>{
      state.saving = true; renderSavePill();
      try{
        await window.storage.set(STORAGE_KEY, JSON.stringify({workers:state.workers, faenas:state.faenas, cargos:state.cargos, equipos:state.equipos, llamados:state.llamados, pasajes:state.pasajes}), true);
      }catch(e){ console.error('Error al guardar', e); }
      state.saving = false; renderSavePill();
      resolve();
    }, 350);
  });
}

// Guardado inmediato (botón Guardar): salta el debounce y confirma o avisa el error
async function persistNow(){
  clearTimeout(saveTimeout);
  state.saving = true; renderSavePill();
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify({workers:state.workers, faenas:state.faenas, cargos:state.cargos, equipos:state.equipos, llamados:state.llamados, pasajes:state.pasajes}), true);
    state.saving = false; renderSavePill();
    return true;
  }catch(e){
    console.error('Error al guardar', e);
    state.saving = false; renderSavePill();
    alert('No se pudo guardar. Revisa tu conexión e inténtalo de nuevo.');
    return false;
  }
}

/* ============================= EXPORTACIÓN A EXCEL (formato profesional, ExcelJS) ============================= */
async function exportToExcel(){
  if(typeof ExcelJS === 'undefined'){
    alert('La librería de Excel no cargó (revisa tu conexión a internet) — recarga la página e inténtalo de nuevo.');
    return;
  }
  const hoy = todayStr();
  const wb = new ExcelJS.Workbook();
  wb.creator = 'AMECO Spot Planner';
  wb.created = new Date();

  // Paleta corporativa (misma del dashboard)
  const C = {
    steel:'FF232C35', accent:'FFE2571F', white:'FFFFFFFF', light:'FFF7F7F4',
    good:'FFE6F4EA', goodTx:'FF2F8F4E', warn:'FFFBF0DC', warnTx:'FF9A6608',
    bad:'FFFAEAEA', badTx:'FFC8342F', grey:'FFECEEEA', greyTx:'FF6B7178',
    line:'FFDFE1DB', darkCell:'FF2F3944', restCell:'FFE7E8E3'
  };
  const thinB = { style:'thin', color:{argb:C.line} };
  const allBorders = { top:thinB, bottom:thinB, left:thinB, right:thinB };
  const baseFont = { name:'Arial', size:10 };

  function fillCell(cell, argb){ cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb}}; }
  function styleHeaderRow(row){
    row.eachCell(c=>{
      fillCell(c, C.steel);
      c.font = Object.assign({}, baseFont, {color:{argb:C.white}, bold:true});
      c.border = allBorders;
      c.alignment = {vertical:'middle', horizontal:'left'};
    });
    row.height = 20;
  }
  function styleDataRow(row){
    row.eachCell(c=>{
      c.font = Object.assign({}, baseFont);
      c.border = allBorders;
      c.alignment = {vertical:'middle'};
    });
  }
  function statusStyle(cell, label){
    const map = {
      'Vigente':[C.good, C.goodTx], 'Acreditado':[C.good, C.goodTx], 'Confirmado':[C.good, C.goodTx], 'Emitido':[C.good, C.goodTx],
      'Por vencer':[C.warn, C.warnTx], 'En trámite':[C.warn, C.warnTx], 'No contesta':[C.warn, C.warnTx], 'Solicitado':[C.warn, C.warnTx],
      'Vencido':[C.bad, C.badTx], 'Rechazó':[C.bad, C.badTx], 'Cancelado':[C.bad, C.badTx],
      'Sin dato':[C.grey, C.greyTx], 'Pendiente':[C.grey, C.greyTx], 'No acreditado':[C.grey, C.greyTx]
    };
    const s = map[label];
    if(s){ fillCell(cell, s[0]); cell.font = Object.assign({}, baseFont, {color:{argb:s[1]}, bold:true}); }
  }
  function sheetTitle(ws, title, subtitle, lastCol){
    ws.mergeCells(1,1,1,lastCol);
    const t = ws.getCell(1,1);
    t.value = title;
    t.font = {name:'Arial', size:15, bold:true, color:{argb:C.white}};
    fillCell(t, C.steel);
    t.alignment = {vertical:'middle', horizontal:'left', indent:1};
    ws.getRow(1).height = 30;
    ws.mergeCells(2,1,2,lastCol);
    const s = ws.getCell(2,1);
    s.value = subtitle;
    s.font = {name:'Arial', size:9, color:{argb:C.white}, italic:true};
    fillCell(s, C.accent);
    s.alignment = {vertical:'middle', horizontal:'left', indent:1};
    ws.getRow(2).height = 16;
    ws.addRow([]);
  }

  /* ---------- Cálculo de indicadores (mismos del dashboard) ---------- */
  const totalW = state.workers.length;
  const vencidos = state.workers.filter(w=>workerWorstExam(w)==='bad').length;
  const porVencer = state.workers.filter(w=>workerWorstExam(w)==='warn').length;
  const enFaenaHoy = state.workers.filter(w=>{const t=dayStatus(w, hoy).tipo; return t==='trabajo'||t==='extra';}).length;
  let acredProblema = 0;
  state.workers.forEach(w=>(w.acreditaciones||[]).forEach(a=>{
    if(a.estado==='Acreditado' && a.vencimiento){
      const st = examStatus(a.vencimiento).status;
      if(st==='vencido'||st==='por-vencer') acredProblema++;
    }
  }));
  const now = new Date();
  const monthPrefix = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let heMes = 0, permisosMes = 0;
  state.workers.forEach(w=>{
    Object.entries(w.overrides||{}).forEach(([fecha, ov])=>{
      if(fecha.startsWith(monthPrefix)){
        if(ov.tipo==='extra') heMes++;
        else if(ov.tipo==='permiso') permisosMes++;
      }
    });
  });
  const en7 = fmt(addDays(new Date(), 7));
  const pasajesUrgentes = (state.pasajes||[]).filter(p=>(p.estado==='pendiente'||p.estado==='solicitado') && p.fechaViaje >= hoy && p.fechaViaje <= en7).length;
  const llamadosTotal = (state.llamados||[]).length;
  const llamadosConfirmados = (state.llamados||[]).filter(l=>l.resultado==='confirmado').length;
  const pendCalls = (state.llamados||[]).filter(l=>l.resultado==='pendiente'||l.resultado==='no_contesta').length;
  const pendTickets = (state.pasajes||[]).filter(p=>p.estado==='pendiente'||p.estado==='solicitado').length;
  const sinExamenes = state.workers.filter(w=>(w.examenes||[]).every(e=>!e.vencimiento)).length;

  /* ---------- Hoja 1: Resumen ejecutivo ---------- */
  const wsR = wb.addWorksheet('Resumen', {views:[{showGridLines:false}]});
  wsR.columns = [{width:3},{width:46},{width:16},{width:3},{width:34},{width:14}];
  sheetTitle(wsR, 'AMECO SPOT PLANNER — INFORME DE GESTIÓN DE PERSONAL', 'Generado el '+hoy+' · Documento de uso interno', 6);

  const secRow = wsR.addRow(['', 'INDICADORES OPERACIONALES', '', '', 'ACREDITADOS POR FAENA', '']);
  [2,5].forEach(ci=>{
    const c = secRow.getCell(ci);
    c.font = {name:'Arial', size:10, bold:true, color:{argb:C.accent}};
  });

  const kpis = [
    ['Trabajadores registrados', totalW, null],
    ['En faena hoy', enFaenaHoy, null],
    ['Trabajadores con exámenes por vencer (≤30 días)', porVencer, porVencer>0?'warn':null],
    ['Trabajadores con examen vencido', vencidos, vencidos>0?'bad':null],
    ['Trabajadores sin exámenes registrados', sinExamenes, sinExamenes>0?'warn':null],
    ['Acreditaciones por vencer o vencidas', acredProblema, acredProblema>0?'warn':null],
    ['Días de hora extra este mes', heMes, null],
    ['Días de permiso este mes', permisosMes, null],
    ['Llamados pendientes / sin respuesta', pendCalls, pendCalls>0?'warn':null],
    ['Tasa de confirmación de llamados', llamadosTotal ? Math.round(llamadosConfirmados/llamadosTotal*100)+'%' : '—', null],
    ['Pasajes pendientes de emitir', pendTickets, pendTickets>0?'warn':null],
    ['Pasajes urgentes (viaje ≤7 días, sin emitir)', pasajesUrgentes, pasajesUrgentes>0?'bad':null]
  ];
  const faenaCounts = state.faenas.map(f=>[f, state.workers.filter(w=>(w.acreditaciones||[]).some(a=>a.faena===f && a.estado==='Acreditado')).length]);
  const nRows = Math.max(kpis.length, faenaCounts.length);
  for(let i=0;i<nRows;i++){
    const k = kpis[i] || ['','',null];
    const f = faenaCounts[i] || ['',''];
    const row = wsR.addRow(['', k[0], k[1], '', f[0], f[1]]);
    [2,3].forEach(ci=>{ if(k[0]!==''){ const c = row.getCell(ci); c.font = Object.assign({}, baseFont); c.border = allBorders; fillCell(c, i%2 ? C.light : C.white); }});
    if(k[0]!==''){
      const vc = row.getCell(3);
      vc.alignment = {horizontal:'center', vertical:'middle'};
      vc.font = Object.assign({}, baseFont, {bold:true, size:11});
      if(k[2]==='warn'){ fillCell(vc, C.warn); vc.font.color = {argb:C.warnTx}; }
      if(k[2]==='bad'){ fillCell(vc, C.bad); vc.font.color = {argb:C.badTx}; }
    }
    [5,6].forEach(ci=>{ if(f[0]!==''){ const c = row.getCell(ci); c.font = Object.assign({}, baseFont); c.border = allBorders; fillCell(c, i%2 ? C.light : C.white); }});
    if(f[0]!==''){ const fc = row.getCell(6); fc.alignment={horizontal:'center'}; fc.font = Object.assign({}, baseFont, {bold:true}); }
  }

  /* ---------- Helper para hojas de datos ---------- */
  function dataSheet(name, subtitle, headers, rows, widths, statusColIdx){
    const ws = wb.addWorksheet(name, {views:[{showGridLines:false, state:'frozen', ySplit:4}]});
    ws.columns = widths.map(w=>({width:w}));
    sheetTitle(ws, name.toUpperCase(), subtitle+' · Generado el '+hoy, headers.length);
    const hr = ws.addRow(headers);
    styleHeaderRow(hr);
    rows.forEach((r, i)=>{
      const row = ws.addRow(r);
      styleDataRow(row);
      row.eachCell(c=>{ if(i%2) fillCell(c, C.light); });
      if(statusColIdx){ statusStyle(row.getCell(statusColIdx), r[statusColIdx-1]); }
    });
    ws.autoFilter = { from: {row:4, column:1}, to: {row:4+rows.length, column:headers.length} };
    return ws;
  }

  /* ---------- Hoja 2: Trabajadores ---------- */
  dataSheet('Trabajadores', 'Nómina de personal registrado',
    ['Nombre','RUT','Cargo','Teléfono','Correo','Ciudad','Empresa','Inicio ciclo','Días trabajo','Días descanso'],
    state.workers.map(w=>[w.nombre, w.rut, w.cargo, w.telefono, w.correo, w.ciudad, w.empresa||'', (w.turno&&w.turno.fechaInicioCiclo)||'', (w.turno&&w.turno.diasTrabajo)||14, (w.turno&&w.turno.diasDescanso)||14]),
    [28,14,22,16,26,14,18,12,11,12]);

  /* ---------- Hoja 3: Exámenes ---------- */
  const examRows = [];
  state.workers.forEach(w=>{
    (w.examenes||[]).forEach(e=>examRows.push([w.nombre, w.cargo, e.tipo, e.fecha||'', e.vencimiento||'', examStatus(e.vencimiento).label, e.archivoNombre||'']));

  setTimeout(()=>URL.revokeObjectURL(url), 10000);
}

/* ============================= DATE HELPERS ============================= */
function fmt(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function daysBetween(a,b){ return Math.round((b-a)/(1000*60*60*24)); }
function todayStr(){ return fmt(new Date()); }
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_CORTO = ['D','L','M','M','J','V','S'];

function examStatus(vencStr){
  if(!vencStr) return {status:'sin-dato', label:'Sin dato', cls:'grey'};
  const venc = parseDate(vencStr);
  const diff = daysBetween(new Date(new Date().toDateString()), venc);
  if(diff < 0) return {status:'vencido', label:'Vencido', cls:'bad', diff};
  if(diff <= 30) return {status:'por-vencer', label:'Por vencer', cls:'warn', diff};
  return {status:'vigente', label:'Vigente', cls:'good', diff};
}
function acredStatus(a){
  if(a.estado === 'Acreditado' && a.vencimiento){
    const es = examStatus(a.vencimiento);
    if(es.status==='vencido') return {label:'Vencido', cls:'bad'};
    if(es.status==='por-vencer') return {label:'Por vencer', cls:'warn'};
    return {label:'Acreditado', cls:'good'};
  }
  if(a.estado === 'Acreditado') return {label:'Acreditado', cls:'good'};
  if(a.estado === 'En trámite') return {label:'En trámite', cls:'warn'};
  return {label:'No acreditado', cls:'grey'};
}
function workerWorstExam(w){
  let worst = 'good'; let order = {bad:3,warn:2,'sin-dato':1,good:0};
  (w.examenes||[]).forEach(e=>{
    const s = examStatus(e.vencimiento).status;
    const key = s==='vencido'?'bad':s==='por-vencer'?'warn':s==='sin-dato'?'sin-dato':'good';
    if(order[key] > order[worst]) worst = key;
  });
  return worst;
}
function faenaColor(faena){
  const idx = state.faenas.indexOf(faena);
  return FAENA_COLORS[idx>=0 ? idx % FAENA_COLORS.length : 0];
}
function faenaAbbrev(faena){
  return (faena||'').replace(/\s+/g,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').slice(0,3).toUpperCase();
}

/* ============================= SHIFT (14x14) LOGIC ============================= */
function shiftBaseStatus(worker, dateStr){
  const t = worker.turno || {fechaInicioCiclo: todayStr(), diasTrabajo:14, diasDescanso:14};
  if(!t.fechaInicioCiclo) return 'descanso';
  const start = parseDate(t.fechaInicioCiclo);
  const d = parseDate(dateStr);
  const cycle = (t.diasTrabajo||14) + (t.diasDescanso||14);
  let diff = daysBetween(start, d) % cycle;
  if(diff < 0) diff += cycle;
  return diff < (t.diasTrabajo||14) ? 'trabajo' : 'descanso';
}
function dayStatus(worker, dateStr){
  const ov = (worker.overrides||{})[dateStr];
  const base = shiftBaseStatus(worker, dateStr);
  if(ov && ov.tipo) return {tipo: ov.tipo, base, faena: ov.faena||'', nota: ov.nota||''};
  return {tipo: base, base, faena:'', nota:''};
}

/* ============================= DRAG-FILL (copiar celda como en Excel) ============================= */
let dragState = null; // {workerId, sourceDate, sourceInfo, lastDate, moved}
let justDragged = false;
let lastAction = null; // {workers:[{id, overrides}]} snapshot para "Deshacer"

function snapshotOverrides(workerIds){
  return workerIds.map(id=>{
    const w = state.workers.find(x=>x.id===id);
    return {id, overrides: JSON.parse(JSON.stringify((w && w.overrides) || {}))};
  });
}

async function performUndo(){
  if(!lastAction){ alert('No hay cambios recientes para deshacer.'); return; }
  lastAction.forEach(item=>{
    const w = state.workers.find(x=>x.id===item.id);
    if(w) w.overrides = item.overrides;
  });
  lastAction = null;
  render();
  await persist();
}

document.addEventListener('keydown', (e)=>{
  const isUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key==='z' || e.key==='Z');
  if(!isUndo) return;
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return; // deja el undo nativo del campo de texto
  e.preventDefault();
  performUndo();
});

document.addEventListener('mousedown', (e)=>{
  if(e.button !== 0) return;
  const cell = e.target.closest('.daycell');
  if(!cell) return;
  const workerId = cell.dataset.id;
  const date = cell.dataset.date;
  const w = state.workers.find(x=>x.id===workerId);
  if(!w) return;
  const info = dayStatus(w, date);
  dragState = { workerId, sourceDate: date, sourceInfo: {tipo: info.tipo, faena: info.faena, nota: info.nota}, lastDate: date, moved: false };
});

document.addEventListener('mouseover', (e)=>{
  if(!dragState) return;
  const cell = e.target.closest('.daycell');
  if(!cell || cell.dataset.id !== dragState.workerId) return;
  dragState.lastDate = cell.dataset.date;
  dragState.moved = true;
  highlightDragRange(dragState.workerId, dragState.sourceDate, dragState.lastDate);
});

document.addEventListener('mouseup', async ()=>{
  if(!dragState) return;
  if(dragState.moved){
    lastAction = snapshotOverrides([dragState.workerId]);
    applyDragFill(dragState);
    justDragged = true;
    clearDragHighlight();
    render();
    await persist();
  } else {
    clearDragHighlight();
  }
  dragState = null;
});

function highlightDragRange(workerId, d1, d2){
  clearDragHighlight();
  const lo = d1 < d2 ? d1 : d2;
  const hi = d1 < d2 ? d2 : d1;
  document.querySelectorAll('.daycell[data-id="'+workerId+'"]').forEach(td=>{
    const d = td.dataset.date;
    if(d >= lo && d <= hi) td.classList.add('drag-highlight');
  });
}
function clearDragHighlight(){
  document.querySelectorAll('.drag-highlight').forEach(td=>td.classList.remove('drag-highlight'));
}
function applyDragFill(ds){
  const w = state.workers.find(x=>x.id===ds.workerId);
  if(!w) return;
  const lo = ds.sourceDate < ds.lastDate ? ds.sourceDate : ds.lastDate;
  const hi = ds.sourceDate < ds.lastDate ? ds.lastDate : ds.sourceDate;
  w.overrides = w.overrides || {};
  let cur = parseDate(lo);
  const end = parseDate(hi);
  while(cur <= end){
    const dateStr = fmt(cur);
    const base = shiftBaseStatus(w, dateStr);
    const tipo = ds.sourceInfo.tipo, faena = ds.sourceInfo.faena||'', nota = ds.sourceInfo.nota||'';
    if(tipo===base && !faena && !nota) delete w.overrides[dateStr];
    else w.overrides[dateStr] = {tipo, faena, nota};
    cur = addDays(cur, 1);
  }
}

/* ============================= FILE / DOCUMENT HELPERS ============================= */
function readFileAsBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function viewDocument(key, fallbackName){
  try{
    const res = await window.storage.get(key, true);
    if(!res || !res.value){ alert('No se encontró el archivo guardado. Vuelve a subirlo desde la ficha del trabajador.'); return; }
    const parsed = JSON.parse(res.value);
    const byteChars = atob(parsed.data);
    const bytes = new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const blob = new Blob([bytes], {type: parsed.mime || 'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel='noopener';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
  }catch(e){
    console.error(e);
    alert('No se encontró el archivo guardado (puede que la subida haya fallado en su momento). Vuelve a subirlo desde la ficha del trabajador.');
  }
}

  const faenaCounts = state.faenas.map(f=>{

    return {faena:f, n};
  });

  const pendingCalls = (state.llamados||[]).filter(l=>l.resultado==='pendiente'||l.resultado==='no_contesta')
    .map(l=>Object.assign({}, l, {w: state.workers.find(x=>x.id===l.workerId)}))
    .filter(l=>l.w)
    .sort((a,b)=> (a.fecha||'').localeCompare(b.fecha||''));

  const pendingCallsHtml = pendingCalls.length ? pendingCalls.slice(0,8).map(l=>{
    const st = LLAMADA_STATUS[l.resultado] || LLAMADA_STATUS.pendiente;
    return '<div class="alert-row"><span class="chip '+st.cls+'">'+st.label+'</span>'+
      '<div style="flex:1"><b>'+escHtml(l.w.nombre)+'</b> <span style="color:var(--sub)">'+(l.nota?'— '+escHtml(l.nota):'')+'</span></div>'+
      '<div class="mono" style="color:var(--sub)">'+(l.fecha||'')+'</div>'+
      '<button class="link-btn" data-action="open-llamada" data-id="'+l.id+'">Ver →</button></div>';
  }).join('') : '<div class="empty">No hay llamados pendientes. Todo al día ✓</div>';

  const pendingTicketsList = (state.pasajes||[]).filter(p=>p.estado==='pendiente'||p.estado==='solicitado')
    .map(p=>Object.assign({}, p, {w: state.workers.find(x=>x.id===p.workerId)}))
    .filter(p=>p.w)
    .sort((a,b)=> (a.fechaViaje||'').localeCompare(b.fechaViaje||''));

  const pendingTicketsHtml = pendingTicketsList.length ? pendingTicketsList.slice(0,8).map(p=>{
    const st = PASAJE_STATUS[p.estado] || PASAJE_STATUS.pendiente;
    const tramo = (p.origen||'—')+' → '+(p.destino||'—');
    return '<div class="alert-row"><span class="chip '+st.cls+'">'+st.label+'</span>'+
      '<div style="flex:1"><b>'+escHtml(p.w.nombre)+'</b> <span style="color:var(--sub)">— '+escHtml(tramo)+'</span></div>'+
      '<div class="mono" style="color:var(--sub)">'+(p.fechaViaje||'')+'</div>'+
      '<button class="link-btn" data-action="open-pasaje" data-id="'+p.id+'">Ver →</button></div>';
  }).join('') : '<div class="empty">No hay pasajes pendientes. Todo al día ✓</div>';

  return '<div class="kpi-row">'+
      '<div class="kpi"><div class="num">'+total+'</div><div class="lbl">Trabajadores</div></div>'+
      '<div class="kpi"><div class="num">'+enFaenaHoy+'</div><div class="lbl">En faena hoy</div></div>'+
      '<div class="kpi warn"><div class="num">'+porVencer+'</div><div class="lbl">Exámenes por vencer</div></div>'+
      '<div class="kpi bad"><div class="num">'+vencidos+'</div><div class="lbl">Trabajadores con examen vencido</div></div>'+
    '</div>'+
    '<div class="kpi-row">'+
      '<div class="kpi '+(acredProblema?'warn':'')+'"><div class="num">'+acredProblema+'</div><div class="lbl">Acreditaciones por vencer/vencidas</div></div>'+
      '<div class="kpi"><div class="num">'+heMes+'</div><div class="lbl">Días de hora extra este mes</div></div>'+
      '<div class="kpi '+(pasajesUrgentes?'bad':'')+'"><div class="num">'+pasajesUrgentes+'</div><div class="lbl">Pasajes sin emitir (próx. 7 días)</div></div>'+
      '<div class="kpi '+(sinExamenes?'warn':'')+'"><div class="num">'+(tasaConfirmacion!==null ? tasaConfirmacion+'%' : '—')+'</div><div class="lbl">Tasa confirmación llamados'+(sinExamenes?(' · '+sinExamenes+' sin exámenes'):'')+'</div></div>'+
    '</div>'+
    '<div class="panel"><div class="panel-head"><h2>Alertas de documentación</h2></div><div class="panel-body">'+alertsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Llamados pendientes</h2><button class="link-btn" data-action="new-llamada">+ Registrar llamado</button></div><div class="panel-body">'+pendingCallsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Pasajes pendientes</h2><button class="link-btn" data-action="new-pasaje">+ Registrar pasaje</button></div><div class="panel-body">'+pendingTicketsHtml+'</div></div>'+
    '<div class="panel"><div class="panel-head"><h2>Acreditados por faena</h2></div>'+
      '<div class="panel-body" style="padding:16px 18px;display:flex;gap:24px;flex-wrap:wrap;">'+
        faenaCounts.map(f=>
          '<div style="min-width:120px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'+
          '<span class="sticker" style="background:'+faenaColor(f.faena)+'"></span>'+
          '<span style="font-weight:600;font-size:13px;">'+escHtml(f.faena)+'</span></div>'+
          '<div class="disp" style="font-size:24px;color:var(--steel);">'+f.n+'</div></div>'
        ).join('')+
      '</div></div>';
}

/* ============================= VIEW: TRABAJADORES ============================= */
function workerCardHtml(w){
  const worst = workerWorstExam(w);
  const dotColor = worst==='bad'?'var(--bad)':worst==='warn'?'var(--amber)':worst==='sin-dato'?'#c7cac2':'var(--good)';
  const stickers = (w.acreditaciones||[]).filter(a=>a.estado==='Acreditado').map(a=>'<span class="sticker" style="background:'+faenaColor(a.faena)+'" title="'+escAttr(a.faena)+'"></span>').join('');
  return '<div class="wcard" data-action="open-worker" data-id="'+w.id+'">'+
    '<div class="wcard-top"><div><div class="name">'+escHtml(w.nombre)+'</div><div class="cargo">'+escHtml(w.cargo||'—')+'</div></div>'+
    '<span class="status-dot" style="background:'+dotColor+'" title="Estado de documentos"></span></div>'+
    '<div class="rut mono">'+escHtml(w.rut||'Sin RUT')+'</div>'+
    '<div class="sticker-row">'+(stickers || '<span class="sticker-empty">Sin acreditaciones</span>')+'</div></div>';
}

function viewTrabajadores(){
  const q = (state.ui.search||'').toLowerCase();
  const cargoFilter = state.ui.cargoFilter || 'all';
  let list = state.workers.filter(w=> !q || w.nombre.toLowerCase().includes(q) || (w.rut||'').toLowerCase().includes(q) || (w.cargo||'').toLowerCase().includes(q));
  if(cargoFilter!=='all') list = list.filter(w=>w.cargo===cargoFilter);
  if(!list.length) return '<div class="empty panel" style="padding:40px;">No hay trabajadores que coincidan. <button class="btn btn-accent" style="margin-top:10px" data-action="new-worker">+ Agregar trabajador</button></div>';

  // Si hay un cargo específico filtrado, se muestra como una sola grilla (ya viene agrupado de por sí)
  if(cargoFilter!=='all'){
    return '<div class="card-grid">'+list.map(workerCardHtml).join('')+'</div>';
  }

  // Sin filtro: se agrupa por cargo (en el orden definido en Cargos) para facilitar la búsqueda visual
  const groupOrder = [...state.cargos];
  const grouped = {};
  list.forEach(w=>{
    const key = w.cargo && groupOrder.includes(w.cargo) ? w.cargo : (w.cargo || 'Sin cargo asignado');
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(w);
  });
  const orderedKeys = [...groupOrder.filter(c=>grouped[c]), ...Object.keys(grouped).filter(k=>!groupOrder.includes(k))];

  return orderedKeys.map(key=>
    '<div style="margin-bottom:22px;">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'+
        '<h2 style="font-size:15px;color:var(--steel);margin:0;font-weight:700;">'+escHtml(key)+'</h2>'+
        '<span class="nav-count" style="background:var(--grey-bg);color:var(--sub);">'+grouped[key].length+'</span>'+
      '</div>'+
      '<div class="card-grid">'+grouped[key].map(workerCardHtml).join('')+'</div>'+
    '</div>'
  ).join('');
}

/* ============================= VIEW: DOCUMENTOS ============================= */
function viewDocumentos(){
  let rows = state.workers.map(w=>({w, exams: EXAM_TYPES.map(t=> (w.examenes||[]).find(e=>e.tipo===t) || {tipo:t, fecha:'', vencimiento:''}) }));

  if(state.ui.docTypeFilter!=='all' || state.ui.docFilter!=='all'){
    rows = rows.filter(r=> r.exams.some(e=>{
        if(state.ui.docTypeFilter!=='all' && e.tipo!==state.ui.docTypeFilter) return false;
        const st = examStatus(e.vencimiento).status;
        const stKey = st==='vencido'?'vencido':st==='por-vencer'?'por-vencer':st==='sin-dato'?'sin-dato':'vigente';
        if(state.ui.docFilter!=='all' && stKey!==state.ui.docFilter) return false;
        return true;
      })
    );
  }

  const filterBar = '<div class="filter-bar">'+
      '<select id="docTypeFilter"><option value="all" '+(state.ui.docTypeFilter==='all'?'selected':'')+'>Todos los exámenes</option>'+
        EXAM_TYPES.map(t=>'<option value="'+t+'" '+(state.ui.docTypeFilter===t?'selected':'')+'>'+t+'</option>').join('')+
      '</select>'+
      '<select id="docStatusFilter"><option value="all" '+(state.ui.docFilter==='all'?'selected':'')+'>Todos los estados</option>'+
        '<option value="vigente" '+(state.ui.docFilter==='vigente'?'selected':'')+'>Vigente</option>'+
        '<option value="por-vencer" '+(state.ui.docFilter==='por-vencer'?'selected':'')+'>Por vencer (≤30 días)</option>'+
        '<option value="vencido" '+(state.ui.docFilter==='vencido'?'selected':'')+'>Vencido</option>'+
        '<option value="sin-dato" '+(state.ui.docFilter==='sin-dato'?'selected':'')+'>Sin dato</option>'+
      '</select>'+
    '</div>';

  if(!rows.length) return filterBar+'<div class="empty panel" style="padding:40px;">No hay resultados para este filtro.</div>';

  const tableHtml = '<div class="table-wrap"><table>'+
    '<thead><tr><th>Trabajador</th><th>Cargo</th>'+EXAM_TYPES.map(t=>'<th>'+t+'</th>').join('')+'</tr></thead>'+
    '<tbody>'+rows.map(r=>
        '<tr><td><b class="tbl-worker-link" data-action="open-worker" data-id="'+r.w.id+'" title="Abrir ficha para cargar o revisar documentos">'+escHtml(r.w.nombre)+'</b></td><td>'+escHtml(r.w.cargo||'—')+'</td>'+
        r.exams.map(e=>{
            const st = examStatus(e.vencimiento);
            const docLink = e.archivoNombre ? '<span class="doc-cell-link" data-action="view-doc-table" data-key="'+examDocKey(r.w.id, e.tipo)+'">\uD83D\uDCCE Ver archivo</span>' : '<span class="doc-cell-none">Sin archivo</span>';
            return '<td><span class="chip '+st.cls+'">'+st.label+'</span>'+
              '<div class="mono" style="font-size:11px;color:var(--sub);margin-top:3px;">'+(e.vencimiento ? 'vence '+e.vencimiento : 'sin registro')+'</div>'+
              '<div style="margin-top:4px;">'+docLink+'</div></td>';
          }).join('')+
        '</tr>'
    ).join('')+
    '</tbody></table></div>'+
    '<div style="margin-top:10px;"><button class="link-btn" data-action="goto-worker-from-doc">Subir o reemplazar un documento desde la ficha del trabajador →</button></div>';

  // Otros documentos / exámenes adicionales (agregados libremente por cada trabajador)
  const extraRows = state.workers.flatMap(w=>(w.examenesExtra||[]).map(item=>({w, item})));
  let extraHtml = '';
  if(extraRows.length){
    extraHtml = '<div class="panel" style="margin-top:20px;">'+
      '<div class="panel-head"><h2>Otros documentos y exámenes adicionales</h2></div>'+
      '<div class="table-wrap" style="border:none;box-shadow:none;border-radius:0;"><table>'+
        '<thead><tr><th>Trabajador</th><th>Cargo</th><th>Documento</th><th>Fecha</th><th>Vence</th><th>Estado</th><th>Archivo</th></tr></thead>'+
        '<tbody>'+extraRows.map(({w,item})=>{
          const st = examStatus(item.vencimiento);
          const docLink = item.archivoNombre ? '<span class="doc-cell-link" data-action="view-doc-table" data-key="'+examExtraDocKey(w.id, item.id)+'">\uD83D\uDCCE Ver</span>' : '<span class="doc-cell-none">Sin archivo</span>';
          return '<tr><td><b class="tbl-worker-link" data-action="open-worker" data-id="'+w.id+'" title="Abrir ficha para cargar o revisar documentos">'+escHtml(w.nombre)+'</b></td><td>'+escHtml(w.cargo||'—')+'</td><td>'+escHtml(item.nombre)+'</td>'+
            '<td class="mono">'+(item.fecha||'—')+'</td><td class="mono">'+(item.vencimiento||'—')+'</td>'+
            '<td><span class="chip '+st.cls+'">'+st.label+'</span></td><td>'+docLink+'</td></tr>';
        }).join('')+
        '</tbody></table></div></div>';
  }

  return filterBar + tableHtml + extraHtml;
}

function viewAcreditaciones(){

    rows = rows.filter(w=>(w.acreditaciones||[]).some(a=>a.faena===state.ui.acredFaenaFilter));

/* ============================= VIEW: LLAMADOS ============================= */
const LLAMADA_STATUS = {
  pendiente: {label:'Pendiente', cls:'grey'},
  confirmado: {label:'Confirmado', cls:'good'},
  no_contesta: {label:'No contesta', cls:'warn'},
  rechazado: {label:'Rechazó', cls:'bad'}
};

function viewLlamados(){
  const q = (state.ui.llamadaSearch||'').toLowerCase();
  const filter = state.ui.llamadaFilter || 'all';

  let list = (state.llamados||[]).map(l=>{
    const w = state.workers.find(x=>x.id===l.workerId);
    return Object.assign({}, l, {workerNombre: w ? w.nombre : '(trabajador eliminado)', workerCargo: w ? w.cargo : ''});
  });
  if(q) list = list.filter(l=>l.workerNombre.toLowerCase().includes(q));
  if(filter!=='all') list = list.filter(l=>l.resultado===filter);
  list.sort((a,b)=> (b.fecha||'').localeCompare(a.fecha||'') || (b.hora||'').localeCompare(a.hora||''));

  const filterBar = '<div class="filter-bar">'+
      '<input type="text" id="llamadaSearchInput" placeholder="Buscar trabajador..." value="'+escAttr(state.ui.llamadaSearch)+'" style="max-width:220px;">'+
      '<select id="llamadaFilterSelect">'+
        '<option value="all" '+(filter==='all'?'selected':'')+'>Todos los resultados</option>'+
        Object.keys(LLAMADA_STATUS).map(k=>'<option value="'+k+'" '+(filter===k?'selected':'')+'>'+LLAMADA_STATUS[k].label+'</option>').join('')+
      '</select>'+
    '</div>';

  if(!list.length) return filterBar + '<div class="empty panel" style="padding:40px;">No hay llamados que coincidan. <button class="btn btn-accent" style="margin-top:10px" data-action="new-llamada">+ Registrar llamado</button></div>';

  return filterBar + '<div class="table-wrap"><table>'+
    '<thead><tr><th>Fecha</th><th>Trabajador</th><th>Cargo</th><th>Resultado</th><th>Nota</th><th></th></tr></thead>'+
    '<tbody>'+list.map(l=>{
      const st = LLAMADA_STATUS[l.resultado] || LLAMADA_STATUS.pendiente;
      return '<tr>'+
        '<td class="mono">'+(l.fecha||'—')+(l.hora?(' '+l.hora):'')+'</td>'+
        '<td><b>'+escHtml(l.workerNombre)+'</b></td>'+
        '<td>'+escHtml(l.workerCargo||'—')+'</td>'+
        '<td><span class="chip '+st.cls+'">'+st.label+'</span></td>'+
        '<td style="max-width:280px;">'+escHtml(l.nota||'')+'</td>'+
        '<td style="white-space:nowrap;"><button class="link-btn" data-action="open-llamada" data-id="'+l.id+'">Editar</button> '+
        '<button class="icon-btn" data-action="delete-llamada" data-id="'+l.id+'" title="Eliminar">✕</button></td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

/* ============================= VIEW: PASAJES ============================= */
const PASAJE_STATUS = {
  pendiente: {label:'Pendiente', cls:'grey'},
  solicitado: {label:'Solicitado', cls:'warn'},
  emitido: {label:'Emitido', cls:'good'},
  cancelado: {label:'Cancelado', cls:'bad'}
};

function viewPasajes(){
  const q = (state.ui.pasajeSearch||'').toLowerCase();
  const filter = state.ui.pasajeFilter || 'all';

  let list = (state.pasajes||[]).map(p=>{
    const w = state.workers.find(x=>x.id===p.workerId);
    return Object.assign({}, p, {workerNombre: w ? w.nombre : '(trabajador eliminado)', workerCargo: w ? w.cargo : ''});
  });
  if(q) list = list.filter(p=>p.workerNombre.toLowerCase().includes(q));
  if(filter!=='all') list = list.filter(p=>p.estado===filter);
  list.sort((a,b)=> (a.fechaViaje||'').localeCompare(b.fechaViaje||''));

  const filterBar = '<div class="filter-bar">'+
      '<input type="text" id="pasajeSearchInput" placeholder="Buscar trabajador..." value="'+escAttr(state.ui.pasajeSearch)+'" style="max-width:220px;">'+
      '<select id="pasajeFilterSelect">'+
        '<option value="all" '+(filter==='all'?'selected':'')+'>Todos los estados</option>'+
        Object.keys(PASAJE_STATUS).map(k=>'<option value="'+k+'" '+(filter===k?'selected':'')+'>'+PASAJE_STATUS[k].label+'</option>').join('')+
      '</select>'+
    '</div>';

  if(!list.length) return filterBar + '<div class="empty panel" style="padding:40px;">No hay pasajes que coincidan. <button class="btn btn-accent" style="margin-top:10px" data-action="new-pasaje">+ Registrar pasaje</button></div>';

  return filterBar + '<div class="table-wrap"><table>'+
    '<thead><tr><th>Fecha viaje</th><th>Trabajador</th><th>Cargo</th><th>Tramo</th><th>Faena</th><th>Estado</th><th>Nota</th><th></th></tr></thead>'+
    '<tbody>'+list.map(p=>{
      const st = PASAJE_STATUS[p.estado] || PASAJE_STATUS.pendiente;
      const tramo = (p.origen||'—')+' → '+(p.destino||'—');
      return '<tr>'+
        '<td class="mono">'+(p.fechaViaje||'—')+'</td>'+
        '<td><b>'+escHtml(p.workerNombre)+'</b></td>'+
        '<td>'+escHtml(p.workerCargo||'—')+'</td>'+
        '<td>'+escHtml(tramo)+'</td>'+
        '<td>'+escHtml(p.faena||'—')+'</td>'+
        '<td><span class="chip '+st.cls+'">'+st.label+'</span></td>'+
        '<td style="max-width:220px;">'+escHtml(p.nota||'')+'</td>'+
        '<td style="white-space:nowrap;"><button class="link-btn" data-action="open-pasaje" data-id="'+p.id+'">Editar</button> '+
        '<button class="icon-btn" data-action="delete-pasaje" data-id="'+p.id+'" title="Eliminar">✕</button></td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

/* ============================= VIEW: TURNOS ============================= */
function viewTurnos(){
  const y = state.ui.calYear, m = state.ui.calMonth;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = MESES[m] + ' ' + y;
  const size = state.ui.gridSize || 'compact';
  const faenaFilter = state.ui.turnoFaenaFilter || null;

  let headerCells = '';
  for(let d=1; d<=daysInMonth; d++){
    const wd = new Date(y,m,d).getDay();
    headerCells += '<th class="'+(wd===0||wd===6?'weekend-col':'')+'">'+d+'<br><span style="font-weight:400;">'+DIAS_CORTO[wd]+'</span></th>';
  }

  let workersToShow = state.workers;
  if(faenaFilter){
    workersToShow = state.workers.filter(w=>{
      for(let d=1; d<=daysInMonth; d++){
        if(dayStatus(w, fmt(new Date(y,m,d))).faena === faenaFilter) return true;
      }
      return false;
    });
  }

  const rows = workersToShow.map(w=>{
    let cells = '';
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = fmt(new Date(y,m,d));
      const info = dayStatus(w, dateStr);
      let cls = 'daycell';
      let style = '';
      if(info.faena){
        style = 'background:'+faenaColor(info.faena)+';';
        if(info.tipo==='extra') cls += ' ring-extra';
        else if(info.tipo==='permiso') cls += ' ring-permiso';
      } else {
        cls += info.tipo==='trabajo' ? ' st-trabajo' : info.tipo==='extra' ? ' st-extra' : info.tipo==='permiso' ? ' st-permiso' : ' st-descanso';
      }
      const title = dateStr+' — '+info.tipo+(info.faena?(' · '+info.faena):'')+(info.nota?(' · '+info.nota):'');
      let label = '', labelStyle = '';
      if(info.faena){ label = faenaAbbrev(info.faena); }
      else if(info.tipo==='trabajo'){ label = 'T'; }
      else if(info.tipo==='descanso'){ label = 'D'; labelStyle = 'color:#5b5f57;text-shadow:none;'; }
      else if(info.tipo==='extra'){ label = 'HE'; }
      else if(info.tipo==='permiso'){ label = 'P'; labelStyle = 'color:#7a1f1f;text-shadow:none;'; }
      const labelHtml = label ? '<span class="daycell-label" style="'+labelStyle+'">'+label+'</span>' : '';
      cells += '<td class="'+cls+'" style="'+style+'" title="'+escAttr(title)+'" data-action="edit-day" data-id="'+w.id+'" data-date="'+dateStr+'">'+labelHtml+'</td>';
    }
    return '<tr><td class="namecell">'+escHtml(w.nombre)+'<div style="font-weight:400;font-size:11px;color:var(--sub);">'+escHtml(w.cargo||'')+'</div>'+
      '<button type="button" class="link-btn worker-link-btn" data-action="view-worker-month" data-id="'+w.id+'">Ver mes ampliado →</button>'+
      '</td>'+cells+'</tr>';
  }).join('');

  const faenaLegend = state.faenas.map(f=>{
    const active = faenaFilter === f;
    return '<button type="button" class="fl-item fl-btn'+(active?' fl-active':'')+'" data-action="filter-turno-faena" data-faena="'+escAttr(f)+'" title="Filtrar por '+escAttr(f)+' este mes">'+
      '<span class="fl-sw" style="background:'+faenaColor(f)+'"></span>'+escHtml(f)+
    '</button>';
  }).join('') + (faenaFilter ? '<button type="button" class="fl-item fl-clear" data-action="clear-turno-faena-filter">✕ Quitar filtro</button>' : '');

  const filterNotice = faenaFilter
    ? '<div class="helptext" style="color:var(--accent-ink);font-weight:600;margin-bottom:4px;">Mostrando '+workersToShow.length+' trabajador(es) asignado(s) a "'+escHtml(faenaFilter)+'" en '+monthLabel+'.</div>'
    : '';

  return '<div class="cal-toolbar">'+
      '<button class="btn btn-ghost btn-sm" data-action="cal-prev">← Mes anterior</button>'+
      '<div class="month-lbl">'+monthLabel+'</div>'+
      '<button class="btn btn-ghost btn-sm" data-action="cal-next">Mes siguiente →</button>'+
      '<div class="size-toggle">'+
        '<button type="button" class="'+(size==='compact'?'active-size':'')+'" data-action="grid-size" data-size="compact">Compacta</button>'+
        '<button type="button" class="'+(size==='comfortable'?'active-size':'')+'" data-action="grid-size" data-size="comfortable">Cómoda</button>'+
        '<button type="button" class="'+(size==='large'?'active-size':'')+'" data-action="grid-size" data-size="large">Grande</button>'+
      '</div>'+
      '<button class="btn btn-accent btn-sm" data-action="open-bulk" style="margin-left:14px;">+ Editar varios días</button>'+
      '<button class="btn btn-ghost btn-sm" data-action="undo-last">↺ Deshacer (Ctrl+Z)</button>'+
      '<div class="legend">'+
        '<span><span class="sw" style="background:#2f3944"></span>T = Trabajo</span>'+
        '<span><span class="sw" style="background:#e7e8e3;border:1px solid #ccc"></span>D = Descanso</span>'+
        '<span><span class="sw" style="background:#fff;box-shadow:inset 0 0 0 2px #999"></span>HE = hora extra</span>'+
        '<span><span class="sw" style="background:#fff;box-shadow:inset 0 0 0 2px var(--bad)"></span>P = permiso</span>'+
      '</div></div>'+
    '<div class="faena-legend">'+faenaLegend+'</div>'+
    filterNotice+
    '<div class="helptext">Haz clic en un día para editarlo individualmente, o arrastra de un día a otro para copiar el mismo estado a los días intermedios. Haz clic en el nombre de una faena para ver solo a quienes están asignados a ella este mes. Usa "Compacta / Cómoda / Grande" para ajustar el tamaño, o "Ver mes ampliado" para revisar a una persona en grande. Si te equivocas, usa "Deshacer" (Ctrl+Z).</div>'+
    '<div class="table-wrap" style="max-height:74vh;"><table class="grid-table size-'+size+'">'+
      '<thead><tr><th class="namecell">Trabajador</th>'+headerCells+'</tr></thead>'+
      '<tbody>'+(rows || '<tr><td class="namecell" style="color:var(--sub)">Sin trabajadores asignados a esta faena este mes</td></tr>')+'</tbody>'+
    '</table></div>';
}

function renderModal(){
  const root = document.getElementById('modalRoot');
  if(!state.ui.modal){ root.innerHTML=''; return; }
  if(state.ui.modal.type==='worker') root.innerHTML = workerModalHtml(state.ui.modal.workerId);
  else if(state.ui.modal.type==='day') root.innerHTML = dayModalHtml(state.ui.modal.workerId, state.ui.modal.date);
  else if(state.ui.modal.type==='addFaena') root.innerHTML = addSimpleListModalHtml('Agregar faena','new-faena-name','save-faena');
  else if(state.ui.modal.type==='addEquipo') root.innerHTML = addSimpleListModalHtml('Agregar tipo de equipo','new-equipo-name','save-equipo');
  else if(state.ui.modal.type==='bulk') root.innerHTML = bulkModalHtml();
  else if(state.ui.modal.type==='workerMonth') root.innerHTML = workerMonthModalHtml();
  else if(state.ui.modal.type==='llamada') root.innerHTML = llamadaModalHtml(state.ui.modal.llamadaId);
  else if(state.ui.modal.type==='pasaje') root.innerHTML = pasajeModalHtml(state.ui.modal.pasajeId);
  else if(state.ui.modal.type==='import') root.innerHTML = importModalHtml();
}

function importModalHtml(){
  if(!importState){
    return '<div class="modal-overlay" data-action="close-modal-overlay"><div class="modal modal-sm">'+
      '<div class="modal-head"><h2>Importar desde Excel</h2><button class="modal-close" data-action="close-modal">✕</button></div>'+
      '<div class="modal-body">'+
        '<div class="helptext">Sube tu archivo Excel (.xlsx) o CSV con la información de tus trabajadores. En el siguiente paso podrás indicar qué columna corresponde a cada dato.</div>'+
        '<div class="field"><label>Archivo</label><input type="file" id="importFileInput" accept=".xlsx,.xls,.csv"></div>'+
      '</div>'+
      '<div class="modal-foot"><div></div><button class="btn btn-ghost" data-action="close-modal">Cancelar</button></div>'+
    '</div></div>';
  }

  const headers = importState.headers;
  const optionsBase = ['<option value="-1">No importar</option>'].concat(
    headers.map((h,i)=>'<option value="'+i+'">'+escHtml(h || ('Columna '+(i+1)))+'</option>')
  );
  const fieldRows = IMPORT_FIELDS.map(f=>{
    const selected = importState.mapping[f.key] ?? -1;
    const options = optionsBase.map(opt=>{
      const valMatch = opt.match(/value="(-?\d+)"/);
      const val = valMatch ? parseInt(valMatch[1]) : -1;
      return val===selected ? opt.replace('<option ', '<option selected ') : opt;
    }).join('');
    return '<div class="field-row" style="grid-template-columns:1fr 1fr;align-items:center;margin-bottom:8px;">'+
      '<div style="font-weight:600;font-size:13px;">'+f.label+(f.required?' *':'')+'</div>'+
      '<select class="import-map-select" data-field="'+f.key+'">'+options+'</select>'+
    '</div>';
  }).join('');

  const previewRows = importState.rows.slice(0,3).map(row=>{
    return '<tr>'+IMPORT_FIELDS.map(f=>{
      const idx = importState.mapping[f.key];
      const val = (idx!=null && idx>=0) ? (row[idx]||'') : '';
      return '<td style="font-size:12px;">'+escHtml(String(val))+'</td>';
    }).join('')+'</tr>';
  }).join('');

  return '<div class="modal-overlay" data-action="close-modal-overlay"><div class="modal" style="width:720px;">'+
    '<div class="modal-head"><h2>Importar desde Excel</h2><button class="modal-close" data-action="close-modal">✕</button></div>'+
    '<div class="modal-body">'+
      '<div class="helptext">Detectamos '+importState.rows.length+' filas de datos. Indica qué columna de tu Excel corresponde a cada dato (deja "No importar" en lo que no tengas).</div>'+
      fieldRows+
      '<div class="section-title">Vista previa (primeras 3 filas)</div>'+
      '<div class="table-wrap"><table><thead><tr>'+IMPORT_FIELDS.map(f=>'<th>'+f.label+'</th>').join('')+'</tr></thead><tbody>'+previewRows+'</tbody></table></div>'+
      '<div class="helptext" style="margin-top:10px;">Si el RUT de una fila coincide con un trabajador que ya tienes cargado, se actualizarán sus datos personales (sin borrar exámenes, turnos ni certificaciones). Si no coincide con nadie, se creará un trabajador nuevo.</div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" data-action="import-back">← Elegir otro archivo</button>'+
      '<div style="display:flex;gap:8px;"><button class="btn btn-ghost" data-action="close-modal">Cancelar</button><button class="btn btn-accent" data-action="import-confirm">Importar '+importState.rows.length+' trabajadores</button></div>'+
    '</div></div></div>';
}

function workerMonthModalHtml(){
  const modal = state.ui.modal;
  const w = state.workers.find(x=>x.id===modal.workerId);
  if(!w) return '';
  const y = modal.year, m = modal.month;
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstWd = new Date(y, m, 1).getDay();
  const monthLabel = MESES[m] + ' ' + y;

  let cellsHtml = '';
  for(let i=0;i<firstWd;i++) cellsHtml += '<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = fmt(new Date(y,m,d));
    const info = dayStatus(w, dateStr);
    let cls = 'daycell daycell-lg';
    let style = '';
    if(info.faena){
      style = 'background:'+faenaColor(info.faena)+';';
      if(info.tipo==='extra') cls += ' ring-extra';
      else if(info.tipo==='permiso') cls += ' ring-permiso';
    } else {
      cls += info.tipo==='trabajo' ? ' st-trabajo' : info.tipo==='extra' ? ' st-extra' : info.tipo==='permiso' ? ' st-permiso' : ' st-descanso';
    }
    let big = '';
    if(info.faena) big = faenaAbbrev(info.faena);
    else if(info.tipo==='trabajo') big = 'T';
    else if(info.tipo==='descanso') big = 'D';
    else if(info.tipo==='extra') big = 'HE';
    else if(info.tipo==='permiso') big = 'P';
    const title = dateStr+' — '+info.tipo+(info.faena?(' · '+info.faena):'')+(info.nota?(' · '+info.nota):'');
    cellsHtml += '<div class="'+cls+'" style="'+style+'" data-action="edit-day" data-id="'+w.id+'" data-date="'+dateStr+'" title="'+escAttr(title)+'">'+
        '<span class="daynum">'+d+'</span><span class="biglabel">'+big+'</span>'+
        (info.faena ? '<span class="faename">'+escHtml(info.faena)+'</span>' : '')+
        (info.nota ? '<span class="faename" style="opacity:.85;">'+escHtml(info.nota)+'</span>' : '')+
      '</div>';
  }
  const weekdayHeaders = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>'<div class="month-cal-weekday">'+d+'</div>').join('');

  return '<div class="modal-overlay" data-action="close-modal-overlay"><div class="modal" style="width:780px;">'+
    '<div class="modal-head"><h2>'+escHtml(w.nombre)+'</h2><button class="modal-close" data-action="close-modal">✕</button></div>'+
    '<div class="modal-body">'+
      '<div class="cal-toolbar" style="margin-bottom:2px;">'+
        '<button class="btn btn-ghost btn-sm" data-action="wm-prev">← Mes anterior</button>'+
        '<div class="month-lbl" style="min-width:150px;">'+monthLabel+'</div>'+
        '<button class="btn btn-ghost btn-sm" data-action="wm-next">Mes siguiente →</button>'+
      '</div>'+
      '<div class="helptext">Haz clic en un día para editarlo, o arrastra de un día a otro para copiar el mismo estado a los días intermedios.</div>'+
      '<div class="month-cal-grid">'+weekdayHeaders+cellsHtml+'</div>'+
    '</div>'+
    '<div class="modal-foot"><div></div><button class="btn btn-ghost" data-action="close-modal">Cerrar</button></div>'+
  '</div></div>';
}

function certFileChipHtml(workerId, certId, file){
